<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>KOLMARD | Supermercado Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --rose-primary: #E11D48; }
        body { 
            font-family: 'Outfit', sans-serif; 
            background-color: #F8FAFC; 
            -webkit-tap-highlight-color: transparent; 
        }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-reveal {
            animation: fadeInUp 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            opacity: 0;
        }

        .glass-header {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
        }

        .glass-dock {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(0,0,0,0.05);
        }

        .cat-pill { transition: all 0.2s ease; }
        .cat-pill.active { 
            background: var(--rose-primary); 
            color: white; 
            box-shadow: 0 4px 12px rgba(225, 29, 72, 0.2);
        }

        .product-card {
            border-radius: 20px;
            transition: transform 0.2s ease;
        }
        .product-card:active { transform: scale(0.95); }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .side-panel {
            transition: transform 0.5s cubic-bezier(0.32, 0.72, 0, 1);
        }
    </style>
</head>
<body class="pb-32">

    <header class="sticky top-0 z-50 glass-header px-6 pt-10 pb-4">
        <div class="flex justify-between items-center mb-5">
            <div class="animate-reveal">
                <span class="text-rose-600 font-bold text-[9px] uppercase tracking-[0.25em] flex items-center gap-1">
                    <span class="w-1.5 h-1.5 bg-rose-600 rounded-full animate-pulse"></span> Supermercado Premium
                </span>
                <h1 class="text-2xl font-black text-gray-900 tracking-tighter italic uppercase">KOLMA<span class="text-rose-600">RD</span></h1>
            </div>
            <button onclick="toggleProfile()" class="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center relative border border-white">
                <i data-lucide="user" class="w-5 h-5 text-gray-600"></i>
                <span id="user-dot" class="absolute top-0 right-0 w-2.5 h-2.5 bg-green-500 rounded-full border-2 border-white hidden"></span>
            </button>
        </div>
        
        <div class="relative animate-reveal" style="animation-delay: 0.1s">
            <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"></i>
            <input type="text" id="search-input" oninput="filterProducts()" placeholder="Buscar productos en el súper..." 
                class="w-full bg-gray-100 p-3.5 pl-11 rounded-xl outline-none font-medium text-gray-700 text-sm focus:bg-white focus:ring-1 focus:ring-rose-500/20 transition-all">
        </div>

        <div class="flex gap-2 overflow-x-auto mt-4 pb-1 no-scrollbar animate-reveal" style="animation-delay: 0.2s">
            <button onclick="filterByCategory('Todos')" class="cat-pill active whitespace-nowrap px-5 py-2 rounded-full text-[10px] font-black uppercase tracking-widest">Todos</button>
            <button onclick="filterByCategory('Bebidas')" class="cat-pill whitespace-nowrap px-5 py-2 bg-white border border-gray-100 rounded-full text-[10px] font-bold text-gray-400 uppercase tracking-widest">Bebidas</button>
            <button onclick="filterByCategory('Snacks')" class="cat-pill whitespace-nowrap px-5 py-2 bg-white border border-gray-100 rounded-full text-[10px] font-bold text-gray-400 uppercase tracking-widest">Snacks</button>
            <button onclick="filterByCategory('Hogar')" class="cat-pill whitespace-nowrap px-5 py-2 bg-white border border-gray-100 rounded-full text-[10px] font-bold text-gray-400 uppercase tracking-widest">Hogar</button>
        </div>
    </header>

    <section class="px-6 mt-4 animate-reveal" style="animation-delay: 0.3s">
        <div class="w-full h-32 bg-gray-900 rounded-[2rem] p-6 text-white relative overflow-hidden shadow-xl">
            <div class="relative z-10 flex flex-col justify-center h-full">
                <h2 class="text-xl font-black italic uppercase leading-none">Pide ahora mismo</h2>
                <p class="text-rose-500 text-[10px] font-black uppercase tracking-widest mt-1">¿Qué estás esperando?</p>
            </div>
            <div class="absolute -right-4 -top-4 w-24 h-24 bg-rose-600/10 rounded-full blur-2xl"></div>
            <i data-lucide="zap" class="absolute right-6 top-1/2 -translate-y-1/2 w-12 h-12 text-white/5 rotate-12"></i>
        </div>
    </section>

    <main class="px-6 mt-8">
        <div class="flex justify-between items-center mb-5">
            <h3 class="font-black text-xs text-gray-400 uppercase tracking-[0.2em]">Selección para ti</h3>
        </div>
        <div id="product-grid" class="grid grid-cols-2 gap-4">
            <div class="col-span-2 py-10 flex flex-col items-center">
                <div class="w-6 h-6 border-2 border-rose-500 border-t-transparent rounded-full animate-spin mb-2"></div>
                <p class="text-[9px] font-bold text-gray-400 uppercase tracking-widest">Sincronizando inventario...</p>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 glass-dock px-6 pt-3 pb-8 flex justify-between items-center z-[60] safe-area-bottom">
        <button onclick="location.reload()" class="flex flex-col items-center gap-1 text-rose-600">
            <i data-lucide="home" class="w-5 h-5"></i>
            <span class="text-[8px] font-black uppercase tracking-tighter">Inicio</span>
        </button>
        
        <button onclick="toggleWallet()" class="flex flex-col items-center gap-1 text-gray-400 opacity-60">
            <i data-lucide="wallet" class="w-5 h-5"></i>
            <span class="text-[8px] font-black uppercase tracking-tighter">Wallet</span>
        </button>

        <button onclick="toggleCart()" class="bg-gray-900 text-white w-14 h-14 rounded-2xl shadow-xl relative -mt-10 border-4 border-white flex items-center justify-center active:scale-90 transition-transform">
            <i data-lucide="shopping-cart" class="w-5 h-5"></i>
            <span id="cart-badge" class="absolute -top-1 -right-1 bg-rose-600 text-white text-[9px] font-black h-5 w-5 rounded-full flex items-center justify-center border-2 border-white hidden">0</span>
        </button>

        <button onclick="toggleOrders()" class="flex flex-col items-center gap-1 text-gray-400">
            <i data-lucide="package" class="w-5 h-5"></i>
            <span class="text-[8px] font-black uppercase tracking-tighter">Pedidos</span>
        </button>

        <button onclick="toggleProfile()" class="flex flex-col items-center gap-1 text-gray-400">
            <i data-lucide="user-cog" class="w-5 h-5"></i>
            <span class="text-[8px] font-black uppercase tracking-tighter">Perfil</span>
        </button>
    </nav>

    <script>
        const CONFIG = { shop: 'q0q09e-cp.myshopify.com', token: 'a171ee1eaf68d9b7ca5234b4c45a9b0c' };
        let allProducts = [], cart = JSON.parse(localStorage.getItem('kolmard_cart')) || [];

        async function initApp() {
            const query = `{ products(first: 40) { edges { node { id title images(first: 1) { edges { node { url } } } variants(first: 1) { edges { node { id price { amount } } } } } } } }`;
            try {
                const response = await fetch(`https://${CONFIG.shop}/api/2024-01/graphql.json`, { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json', 'X-Shopify-Storefront-Access-Token': CONFIG.token }, 
                    body: JSON.stringify({ query }) 
                });
                const res = await response.json();
                allProducts = res.data.products.edges.map(e => ({ 
                    id: e.node.id, 
                    variantId: e.node.variants.edges[0].node.id, 
                    name: e.node.title, 
                    price: parseFloat(e.node.variants.edges[0].node.price.amount), 
                    image: e.node.images.edges[0]?.node.url || '' 
                }));
                renderProducts(allProducts);
                updateCartUI();
            } catch (e) { console.error("Error cargando el supermercado"); }
        }

        function renderProducts(list) {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = list.map((p, index) => `
                <div class="product-card animate-reveal bg-white p-3 shadow-sm border border-gray-50 flex flex-col" style="animation-delay: ${index * 0.05}s">
                    <div class="relative w-full aspect-square mb-3 bg-gray-50 rounded-xl overflow-hidden flex items-center justify-center p-3">
                        <img src="${p.image}" class="max-w-full max-h-full object-contain mix-blend-multiply">
                        <button onclick="addToCart('${p.id}')" class="absolute bottom-1.5 right-1.5 bg-gray-900 text-white w-8 h-8 rounded-lg flex items-center justify-center shadow-lg active:bg-rose-600 transition-colors">
                            <i data-lucide="plus" class="w-4 h-4"></i>
                        </button>
                    </div>
                    <div class="px-1">
                        <h3 class="text-[10px] font-bold text-gray-700 uppercase truncate leading-tight">${p.name}</h3>
                        <p class="text-rose-600 font-black text-sm italic mt-0.5">RD$${p.price.toLocaleString()}</p>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function filterByCategory(cat) {
            document.querySelectorAll('.cat-pill').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            if(cat === 'Todos') renderProducts(allProducts);
            else renderProducts(allProducts.filter(p => p.name.toLowerCase().includes(cat.toLowerCase())));
        }

        function filterProducts() {
            const term = document.getElementById('search-input').value.toLowerCase();
            renderProducts(allProducts.filter(p => p.name.toLowerCase().includes(term)));
        }

        function updateCartUI() {
            const badge = document.getElementById('cart-badge');
            badge.innerText = cart.length;
            badge.classList.toggle('hidden', cart.length === 0);
        }

        function addToCart(id) {
            const p = allProducts.find(i => i.id === id);
            cart.push({ ...p, cid: Date.now() });
            localStorage.setItem('kolmard_cart', JSON.stringify(cart));
            updateCartUI();
        }

        // Placeholders para navegación futura
        function toggleWallet() { alert("Próximamente: Wallet de Puntos de Recompensa 🎁"); }
        function toggleOrders() { alert("Historial de pedidos en mantenimiento 📦"); }
        function toggleProfile() { alert("Inicia sesión desde el botón de la esquina superior 👤"); }
        function toggleCart() { alert("Abriendo carrito... (Usa el código del bloque anterior para completar la integración)"); }

        initApp();
    </script>
</body>
</html>
