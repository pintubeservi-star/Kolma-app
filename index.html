<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>KOLMARD | Express Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --rose-primary: #E11D48; }
        body { 
            font-family: 'Outfit', sans-serif; 
            background-color: #FDFDFD; 
            -webkit-tap-highlight-color: transparent; 
            user-select: none;
        }
        
        /* Animación de entrada en cascada */
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-reveal {
            animation: slideUp 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            opacity: 0;
        }

        /* Efectos de vidrio realistas */
        .glass-header {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(15px) saturate(180%);
            -webkit-backdrop-filter: blur(15px) saturate(180%);
        }

        .glass-dock {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(0,0,0,0.05);
        }

        /* Botón de categorías activo */
        .cat-active {
            background: var(--rose-primary) !important;
            color: white !important;
            box-shadow: 0 8px 20px rgba(225, 29, 72, 0.3);
            transform: translateY(-2px);
        }

        /* Optimización de scroll en móvil */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Feedback táctil */
        .btn-touch:active { transform: scale(0.92); opacity: 0.8; }
        
        .product-card {
            border-radius: 28px;
            transition: all 0.3s ease;
        }

        .side-panel {
            transition: transform 0.5s cubic-bezier(0.32, 0.72, 0, 1);
            will-change: transform;
        }
    </style>
</head>
<body class="pb-32">

    <header class="sticky top-0 z-50 glass-header px-6 pt-12 pb-4 border-b border-gray-50">
        <div class="flex justify-between items-center mb-5">
            <div class="animate-reveal" style="animation-delay: 0.1s">
                <span class="flex items-center gap-1 text-rose-600 font-bold text-[10px] uppercase tracking-[0.2em] mb-1">
                    <i data-lucide="zap" class="w-3 h-3 fill-rose-600"></i> Express Cotuí
                </span>
                <h1 class="text-3xl font-black text-gray-900 tracking-tighter italic uppercase">KOLMA<span class="text-rose-600">RD</span></h1>
            </div>
            <button onclick="toggleProfile()" class="btn-touch w-12 h-12 bg-white rounded-full flex items-center justify-center shadow-sm border border-gray-100 relative animate-reveal" style="animation-delay: 0.2s">
                <i data-lucide="user" class="w-5 h-5 text-gray-800"></i>
                <span id="user-dot" class="absolute top-0 right-0 w-3 h-3 bg-green-500 rounded-full border-2 border-white hidden"></span>
            </button>
        </div>
        
        <div class="relative animate-reveal" style="animation-delay: 0.3s">
            <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400"></i>
            <input type="text" id="search-input" oninput="filterProducts()" placeholder="Busca en el colmado..." 
                class="w-full bg-gray-100/50 p-4 pl-12 rounded-2xl outline-none font-semibold text-gray-700 border-2 border-transparent focus:bg-white focus:border-rose-500/10 transition-all text-base">
        </div>

        <div class="flex gap-3 overflow-x-auto mt-5 pb-2 no-scrollbar animate-reveal" style="animation-delay: 0.4s">
            <button onclick="filterByCategory('Todos')" class="cat-active whitespace-nowrap px-6 py-2.5 rounded-full text-xs font-extrabold uppercase italic tracking-widest">Todos</button>
            <button onclick="filterByCategory('Bebidas')" class="whitespace-nowrap px-6 py-2.5 bg-gray-100 rounded-full text-xs font-bold text-gray-500 uppercase tracking-widest border border-transparent">Bebidas</button>
            <button onclick="filterByCategory('Snacks')" class="whitespace-nowrap px-6 py-2.5 bg-gray-100 rounded-full text-xs font-bold text-gray-500 uppercase tracking-widest border border-transparent">Snacks</button>
            <button onclick="filterByCategory('Hogar')" class="whitespace-nowrap px-6 py-2.5 bg-gray-100 rounded-full text-xs font-bold text-gray-500 uppercase tracking-widest border border-transparent">Hogar</button>
        </div>
    </header>

    <section class="px-6 mt-6 animate-reveal" style="animation-delay: 0.5s">
        <div class="w-full h-36 bg-gradient-to-br from-rose-600 to-rose-500 rounded-[2.5rem] p-8 text-white relative overflow-hidden shadow-xl shadow-rose-200">
            <div class="relative z-10 flex flex-col justify-center h-full">
                <h2 class="text-2xl font-black italic uppercase leading-none mb-1">Pide ahora mismo</h2>
                <p class="text-white/80 text-[11px] font-bold uppercase tracking-[0.15em]">¿Qué estás esperando?</p>
            </div>
            <div class="absolute -right-4 -bottom-4 w-32 h-32 bg-white/10 rounded-full blur-2xl"></div>
            <i data-lucide="shopping-cart" class="absolute right-6 top-1/2 -translate-y-1/2 w-16 h-16 text-white/10 rotate-12"></i>
        </div>
    </section>

    <main class="px-6 mt-10">
        <div id="product-grid" class="grid grid-cols-2 gap-5">
            <div class="col-span-2 py-20 text-center text-gray-300">
                <div class="w-8 h-8 border-4 border-rose-500 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
                <p class="text-[10px] font-bold uppercase tracking-widest">Cargando Colmado...</p>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 glass-dock px-10 pt-4 pb-10 flex justify-between items-center z-[60] safe-area-bottom">
        <button onclick="location.reload()" class="btn-touch flex flex-col items-center gap-1 text-rose-600">
            <i data-lucide="home" class="w-6 h-6"></i>
            <span class="text-[9px] font-black uppercase tracking-tighter">Inicio</span>
        </button>
        
        <button onclick="toggleCart()" class="btn-touch bg-gray-900 text-white w-16 h-16 rounded-[2rem] shadow-2xl relative -mt-14 border-[6px] border-white flex items-center justify-center">
            <i data-lucide="shopping-bag" class="w-6 h-6"></i>
            <span id="cart-badge" class="absolute -top-1 -right-1 bg-rose-600 text-white text-[10px] font-black h-6 w-6 rounded-full flex items-center justify-center border-2 border-white hidden animate-pulse">0</span>
        </button>

        <button onclick="toggleProfile()" class="btn-touch flex flex-col items-center gap-1 text-gray-400">
            <i data-lucide="layout-grid" class="w-6 h-6"></i>
            <span class="text-[9px] font-black uppercase tracking-tighter">Perfil</span>
        </button>
    </nav>

    <div id="profile-panel" class="fixed inset-0 z-[100] side-panel translate-x-full">
        <div class="absolute inset-0 bg-black/40 backdrop-blur-md" onclick="toggleProfile()"></div>
        <div class="absolute right-0 top-0 bottom-0 w-[88%] bg-white p-8 flex flex-col shadow-2xl rounded-l-[3rem]">
            <div class="flex justify-between items-center mb-10">
                <h2 id="auth-title" class="text-2xl font-black uppercase italic tracking-tighter text-gray-900">Mi Cuenta</h2>
                <button onclick="toggleProfile()" class="btn-touch w-12 h-12 bg-gray-50 rounded-full flex items-center justify-center text-gray-400">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
            </div>

            <div id="auth-box" class="space-y-6">
                <button onclick="window.location.href='https://q0q09e-cp.myshopify.com/account/login'" 
                    class="btn-touch w-full flex items-center justify-center gap-4 bg-white border-2 border-gray-100 p-5 rounded-[1.8rem] shadow-sm">
                    <img src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png" class="w-6 h-6" alt="Google">
                    <span class="text-sm font-bold text-gray-800 uppercase italic">Seguir con Google</span>
                </button>

                <div class="flex items-center gap-4 py-2">
                    <div class="flex-grow h-px bg-gray-100"></div>
                    <span class="text-[9px] font-black text-gray-300 uppercase tracking-widest whitespace-nowrap">Datos de acceso</span>
                    <div class="flex-grow h-px bg-gray-100"></div>
                </div>

                <div class="space-y-4">
                    <div id="reg-name-field" class="hidden">
                        <input type="text" id="auth-fname" placeholder="Nombre completo" class="w-full p-5 bg-gray-50 rounded-2xl font-bold outline-none border-2 border-transparent focus:border-rose-500/20 text-sm">
                    </div>
                    <input type="email" id="auth-email" placeholder="Email" class="w-full p-5 bg-gray-50 rounded-2xl font-bold outline-none border-2 border-transparent focus:border-rose-500/20 text-sm">
                    <div id="reg-pass-field">
                        <input type="password" id="auth-pass" placeholder="Contraseña" class="w-full p-5 bg-gray-50 rounded-2xl font-bold outline-none border-2 border-transparent focus:border-rose-500/20 text-sm">
                    </div>
                    <button onclick="handleAuthSubmit()" id="btn-main-auth" class="btn-touch w-full bg-rose-600 py-5 rounded-[1.8rem] text-white font-black uppercase italic tracking-tighter shadow-lg shadow-rose-200">Iniciar Sesión</button>
                </div>

                <button id="switch-to-reg" onclick="switchAuth('register')" class="block w-full text-[10px] font-black text-rose-600 uppercase tracking-widest text-center mt-4">¿No tienes cuenta? Regístrate</button>
                <button id="switch-to-login" onclick="switchAuth('login')" class="hidden block w-full text-[10px] font-black text-gray-900 uppercase tracking-widest text-center mt-4">Ya tengo cuenta • Volver</button>
            </div>

            <div id="auth-welcome" class="hidden space-y-6">
                <div class="p-10 bg-gray-900 rounded-[2.5rem] text-white relative overflow-hidden">
                    <p class="text-[10px] font-black uppercase text-rose-500 tracking-[0.2em] mb-2">Bienvenido</p>
                    <p id="display-email" class="font-black text-xl truncate italic uppercase leading-none"></p>
                </div>
                <button onclick="logout()" class="w-full py-5 bg-gray-50 rounded-2xl font-black text-gray-400 uppercase text-[10px] tracking-widest">Cerrar Sesión</button>
            </div>
        </div>
    </div>

    <div id="cart-modal" class="fixed inset-0 bg-black/60 z-[110] hidden backdrop-blur-xl flex items-end">
        <div class="absolute inset-0" onclick="toggleCart()"></div>
        <div class="relative bg-white w-full rounded-t-[3.5rem] p-8 max-h-[88vh] flex flex-col z-10 shadow-2xl">
            <div class="w-16 h-1.5 bg-gray-100 rounded-full mx-auto mb-8"></div>
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-3xl font-black uppercase italic tracking-tighter">Mi Pedido</h2>
                <button onclick="toggleCart()" class="text-gray-300"><i data-lucide="chevron-down" class="w-8 h-8"></i></button>
            </div>
            
            <div id="cart-items" class="flex-grow overflow-y-auto space-y-4 mb-8 no-scrollbar"></div>

            <div class="bg-gray-50 p-8 rounded-[2.5rem] mb-6">
                <div class="flex justify-between items-center mb-2">
                    <span class="text-gray-400 font-bold uppercase text-[10px] tracking-widest">Subtotal</span>
                    <span id="subtotal-val" class="font-black text-gray-900 text-sm">RD$0</span>
                </div>
                <div class="flex justify-between items-center mb-4 text-green-600">
                    <span class="font-bold uppercase text-[10px] tracking-widest">Delivery</span>
                    <span class="font-black text-sm uppercase">Gratis</span>
                </div>
                <div class="flex justify-between items-center pt-4 border-t border-gray-200">
                    <span class="text-gray-900 font-black uppercase italic text-lg">Total</span>
                    <span id="cart-total" class="text-3xl font-black text-rose-600 tracking-tighter italic">RD$0</span>
                </div>
            </div>

            <button onclick="checkout()" id="btn-pay" class="btn-touch w-full bg-rose-600 py-6 rounded-[2rem] font-black text-white text-xl uppercase italic shadow-2xl shadow-rose-200">Completar Pago</button>
        </div>
    </div>

    <script>
        const CONFIG = { shop: 'q0q09e-cp.myshopify.com', token: 'a171ee1eaf68d9b7ca5234b4c45a9b0c' };
        let allProducts = [], cart = JSON.parse(localStorage.getItem('kolmard_cart')) || [];
        
        async function initApp() {
            const query = `{ products(first: 50) { edges { node { id title images(first: 1) { edges { node { url } } } variants(first: 1) { edges { node { id price { amount } } } } } } } }`;
            try {
                const response = await fetch(`https://${CONFIG.shop}/api/2024-01/graphql.json`, { method: 'POST', headers: { 'Content-Type': 'application/json', 'X-Shopify-Storefront-Access-Token': CONFIG.token }, body: JSON.stringify({ query }) });
                const res = await response.json();
                allProducts = res.data.products.edges.map(e => ({ 
                    id: e.node.id, 
                    variantId: e.node.variants.edges[0].node.id, 
                    name: e.node.title, 
                    price: parseFloat(e.node.variants.edges[0].node.price.amount), 
                    image: e.node.images.edges[0]?.node.url || '' 
                }));
                renderProducts(allProducts);
                updateCartUI();
                checkSession();
            } catch (e) { document.getElementById('product-grid').innerHTML = '<p class="col-span-2 text-center text-gray-400 font-bold uppercase py-10">Error de conexión</p>'; }
        }

        function renderProducts(list) {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = list.map((p, index) => `
                <div class="product-card animate-reveal bg-white p-5 shadow-sm border border-gray-50 flex flex-col items-center" style="animation-delay: ${index * 0.08}s">
                    <div class="relative w-full aspect-square mb-4 bg-gray-50/50 rounded-[2rem] overflow-hidden flex items-center justify-center p-5">
                        <img src="${p.image}" class="max-w-full max-h-full object-contain drop-shadow-md">
                        <button onclick="addToCart('${p.id}')" class="btn-touch absolute bottom-3 right-3 bg-rose-600 text-white w-10 h-10 rounded-2xl flex items-center justify-center shadow-lg shadow-rose-200 transition-transform">
                            <i data-lucide="plus" class="w-5 h-5"></i>
                        </button>
                    </div>
                    <div class="w-full text-center">
                        <h3 class="text-[10px] font-black text-gray-800 uppercase tracking-tighter mb-1 truncate">${p.name}</h3>
                        <span class="text-rose-600 font-black text-base italic">RD$${p.price.toLocaleString()}</span>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        // BUSQUEDA Y CATEGORÍAS
        function filterProducts() {
            const term = document.getElementById('search-input').value.toLowerCase();
            const filtered = allProducts.filter(p => p.name.toLowerCase().includes(term));
            renderProducts(filtered);
        }

        function filterByCategory(cat) {
            document.querySelectorAll('.whitespace-nowrap').forEach(btn => btn.classList.remove('cat-active'));
            event.target.classList.add('cat-active');
            
            if(cat === 'Todos') renderProducts(allProducts);
            else {
                const filtered = allProducts.filter(p => p.name.toLowerCase().includes(cat.toLowerCase().slice(2) || cat.toLowerCase()));
                renderProducts(filtered);
            }
        }

        // LÓGICA DE AUTH
        function switchAuth(mode) {
            document.getElementById('reg-name-field').classList.toggle('hidden', mode !== 'register');
            document.getElementById('switch-to-reg').classList.toggle('hidden', mode === 'register');
            document.getElementById('switch-to-login').classList.toggle('hidden', mode === 'login');
            document.getElementById('btn-main-auth').innerText = mode === 'login' ? 'Entrar Ahora' : 'Crear Cuenta VIP';
        }

        async function handleAuthSubmit() {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;
            if(!email || !pass) return alert("Completa los datos");
            
            const btn = document.getElementById('btn-main-auth');
            btn.innerHTML = `<div class="w-6 h-6 border-4 border-white/20 border-t-white rounded-full animate-spin mx-auto"></div>`;
            
            // Reutilización de tu lógica de Shopify original
            const query = `mutation { customerAccessTokenCreate(input: {email: "${email}", password: "${pass}"}) { customerAccessToken { accessToken } customerUserErrors { message } } }`;
            
            try {
                const response = await fetch(`https://${CONFIG.shop}/api/2024-01/graphql.json`, { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json', 'X-Shopify-Storefront-Access-Token': CONFIG.token }, 
                    body: JSON.stringify({ query }) 
                });
                const res = await response.json();
                const token = res.data.customerAccessTokenCreate?.customerAccessToken?.accessToken;
                
                if(token) {
                    localStorage.setItem('k_token', token);
                    localStorage.setItem('k_email', email);
                    location.reload();
                } else {
                    alert("Credenciales inválidas");
                    btn.innerText = "Reintentar";
                }
            } catch (e) { alert("Error de red"); }
        }

        function checkSession() {
            if(localStorage.getItem('k_token')) {
                document.getElementById('auth-box').classList.add('hidden');
                document.getElementById('auth-welcome').classList.remove('hidden');
                document.getElementById('display-email').innerText = localStorage.getItem('k_email');
                document.getElementById('user-dot').classList.remove('hidden');
            }
        }

        // CARRITO
        function addToCart(id) {
            const p = allProducts.find(i => i.id === id);
            cart.push({ ...p, cid: Date.now() });
            localStorage.setItem('kolmard_cart', JSON.stringify(cart));
            updateCartUI();
        }

        function updateCartUI() {
            const badge = document.getElementById('cart-badge');
            const total = cart.reduce((s, i) => s + i.price, 0);
            badge.innerText = cart.length;
            badge.classList.toggle('hidden', cart.length === 0);
            
            document.getElementById('cart-items').innerHTML = cart.map(i => `
                <div class="flex items-center gap-5 bg-gray-50 p-6 rounded-[2.5rem] border border-white shadow-sm animate-reveal">
                    <img src="${i.image}" class="w-14 h-14 object-contain">
                    <div class="flex-grow">
                        <p class="text-[10px] font-black uppercase text-gray-900 leading-none mb-1">${i.name}</p>
                        <p class="text-rose-600 font-black text-sm italic">RD$${i.price.toLocaleString()}</p>
                    </div>
                    <button onclick="removeFromCart(${i.cid})" class="text-gray-300 btn-touch"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
                </div>
            `).join('');
            
            document.getElementById('subtotal-val').innerText = `RD$${total.toLocaleString()}`;
            document.getElementById('cart-total').innerText = `RD$${total.toLocaleString()}`;
            lucide.createIcons();
        }

        function removeFromCart(cid) { cart = cart.filter(i => i.cid !== cid); localStorage.setItem('kolmard_cart', JSON.stringify(cart)); updateCartUI(); }
        function logout() { localStorage.clear(); location.reload(); }
        function toggleProfile() { document.getElementById('profile-panel').classList.toggle('active'); document.getElementById('profile-panel').classList.toggle('translate-x-full'); }
        function toggleCart() { document.getElementById('cart-modal').classList.toggle('hidden'); }

        async function checkout() {
            const token = localStorage.getItem('k_token');
            if(!token) { toggleCart(); toggleProfile(); return alert("Inicia sesión para pagar"); }
            const lines = cart.map(item => ({ merchandiseId: item.variantId, quantity: 1 }));
            const mutation = `mutation { cartCreate(input: { buyerIdentity: { customerAccessToken: "${token}" }, lines: ${JSON.stringify(lines).replace(/"([^"]+)":/g, '$1:')} }) { cart { checkoutUrl } } }`;
            const response = await fetch(`https://${CONFIG.shop}/api/2024-01/graphql.json`, { method: 'POST', headers: { 'Content-Type': 'application/json', 'X-Shopify-Storefront-Access-Token': CONFIG.token }, body: JSON.stringify({ query: mutation }) });
            const res = await response.json();
            if(res.data.cartCreate.cart.checkoutUrl) window.location.href = res.data.cartCreate.cart.checkoutUrl;
        }

        initApp();
        lucide.createIcons();
    </script>
</body>
</html>
