<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kolma RD | Compra Fácil</title>
    <style>
        :root { --rojo: #e63946; --blanco: #ffffff; }
        body { font-family: sans-serif; margin: 0; background: #f4f4f4; text-align: center; }
        nav { background: var(--rojo); color: white; padding: 15px; font-weight: bold; font-size: 1.2rem; }
        .hero { background: white; padding: 20px; border-bottom: 1px solid #ddd; margin-bottom: 20px; }
        #shop-container { max-width: 1000px; margin: 0 auto; min-height: 200px; }
        .error-msg { color: #666; padding: 20px; font-size: 0.9rem; }
        /* Spinner simple */
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid var(--rojo); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<nav>KOLMA RD</nav>

<div class="hero">
    <h1>🛒 Compra Fácil</h1>
    <p>Calidad directo a tu casa en Cotuí</p>
</div>

<div id="shop-container">
    <div id="loading-state">
        <div class="loader"></div>
        <p id="status-text">Abriendo el colmado...</p>
    </div>
</div>

<script src="https://sdks.shopifycloud.com/buy-button/latest/buy-button-storefront.min.js"></script>

<script type="text/javascript">
    function initShop() {
        // Validación de que el SDK cargó
        if (!window.ShopifyBuy || !window.ShopifyBuy.UI) {
            document.getElementById('status-text').innerHTML = "Error al conectar. Recarga la página.";
            return;
        }

        var client = ShopifyBuy.buildClient({
            domain: 'q0q09e-cp.myshopify.com',
            storefrontAccessToken: 'A171ee1eaf68d9b7ca5234b4c45a9b0c',
        });

        ShopifyBuy.UI.onReady(client).then(function (ui) {
            ui.createComponent('collection', {
                id: '304499130521', // <-- SI SIGUE CARGANDO, USA EL ID NUMÉRICO DE TU COLECCIÓN AQUÍ
                node: document.getElementById('shop-container'),
                moneyFormat: 'RD%24%7B%7Bamount%7D%7D',
                options: {
                    product: {
                        buttonDestination: 'cart',
                        styles: {
                            product: { 'background-color': '#fff', 'padding': '10px', 'border-radius': '8px' },
                            button: { 'background-color': '#e63946', 'font-weight': 'bold' }
                        },
                        text: { button: 'Añadir' }
                    },
                    cart: {
                        text: { title: 'Tu Pedido', button: 'Pedir Ahora' }
                    }
                }
            }).then(function() {
                document.getElementById('loading-state').style.display = 'none';
            });
        }).catch(function(err) {
            console.error("Error de Shopify:", err);
            document.getElementById('status-text').innerHTML = "No se pudieron cargar los productos. Revisa la conexión.";
        });
    }

    // Ejecutar después de que todo cargue
    window.onload = initShop;
</script>

</body>
</html>
