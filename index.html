<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KOLMARD | Pedidos Directos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; background-color: #F8F9FA; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .category-pill.active { background-color: #dc2626; color: white; border-color: #dc2626; box-shadow: 0 10px 15px -3px rgba(220, 38, 38, 0.3); }
        .product-card { transition: all 0.2s ease; background: white; border-radius: 2.5rem; border: 1px solid #fff; }
        .product-card:active { transform: scale(0.95); }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .animate-slide-up { animation: slideUp 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="pb-28">

    <header class="bg-red-600 pt-8 pb-12 px-6 sticky top-0 z-40 rounded-b-[3.5rem] shadow-2xl border-b-[6px] border-yellow-400">
        <div class="flex justify-between items-center mb-6 text-white">
            <div>
                <h1 class="text-3xl font-black italic tracking-tighter uppercase">KOLMA<span class="text-yellow-400">RD</span></h1>
                <p class="text-[10px] font-bold opacity-90 flex items-center gap-1 uppercase tracking-widest">
                    <i data-lucide="map-pin" class="w-3 h-3 text-yellow-400"></i> Cotuí, RD
                </p>
            </div>
            <button onclick="toggleCart()" class="relative p-3 bg-white/20 rounded-2xl backdrop-blur-xl border border-white/30">
                <i data-lucide="shopping-basket" class="w-7 h-7"></i>
                <span id="cart-badge" class="absolute -top-2 -right-2 bg-yellow-400 text-red-700 text-[11px] font-black rounded-full h-6 w-6 flex items-center justify-center border-2 border-red-600 hidden">0</span>
            </button>
        </div>
        <div class="relative">
            <input type="text" id="search" oninput="handleSearch()" placeholder="¿Qué necesitas hoy?" 
                class="w-full p-4 pl-12 rounded-2xl border-none shadow-inner focus:ring-4 focus:ring-yellow-400/50 outline-none text-gray-800 font-bold">
            <i data-lucide="search" class="absolute left-4 top-4 text-gray-400 w-5 h-5"></i>
        </div>
    </header>

    <div class="px-6 -mt-6 relative z-50">
        <div id="category-list" class="flex gap-3 overflow-x-auto no-scrollbar py-2">
            <button onclick="filterByCategory('All', this)" class="category-pill active bg-white text-gray-700 px-8 py-3.5 rounded-2xl text-[11px] font-black shadow-xl shrink-0 border border-gray-100 uppercase tracking-tighter">TODO</button>
        </div>
    </div>

    <main class="px-6 mt-8">
        <h2 id="view-title" class="text-2xl font-black text-gray-900 tracking-tight mb-6">Pasillo Principal</h2>
        <div id="product-grid" class="grid grid-cols-2 gap-5 text-center">
            <div class="col-span-2 py-20"><div class="animate-spin rounded-full h-10 w-10 border-b-2 border-red-600 mx-auto"></div></div>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-xl border-t border-gray-100 px-10 py-5 flex justify-between items-center z-50 rounded-t-[2.5rem] shadow-2xl">
        <div onclick="location.reload()" class="flex flex-col items-center text-red-600 cursor-pointer">
            <i data-lucide="home" class="w-7 h-7"></i>
            <span class="text-[10px] font-black mt-1 uppercase">Inicio</span>
        </div>
        <div onclick="toggleCart()" class="flex flex-col items-center text-gray-300">
            <i data-lucide="shopping-cart" class="w-7 h-7"></i>
            <span class="text-[10px] font-black mt-1 uppercase">Carrito</span>
        </div>
        <div class="flex flex-col items-center text-gray-300">
            <i data-lucide="user" class="w-7 h-7"></i>
            <span class="text-[10px] font-black mt-1 uppercase">Perfil</span>
        </div>
    </nav>

    <div id="cart-modal" class="fixed inset-0 bg-black/70 z-[60] hidden backdrop-blur-md p-4">
        <div class="bg-white w-full max-w-md mx-auto h-[88vh] mt-8 rounded-[3.5rem] overflow-hidden flex flex-col animate-slide-up shadow-2xl">
            <div class="p-8 border-b flex justify-between items-center bg-gray-50/50">
                <h2 class="text-2xl font-black text-gray-900 tracking-tighter">Tu Compra</h2>
                <button onclick="toggleCart()" class="bg-gray-200 p-3 rounded-full text-gray-600">&times;</button>
            </div>
            <div id="cart-items" class="flex-grow overflow-y-auto p-8 space-y-4 no-scrollbar"></div>
            <div class="p-8 bg-white border-t border-gray-100 shadow-[0_-15px_40px_rgba(0,0,0,0.05)]">
                <div class="flex justify-between text-3xl font-black mb-8 text-gray-900 tracking-tighter">
                    <span>Total</span>
                    <span id="cart-total" class="text-red-600">RD$0</span>
                </div>
                <button id="checkout-btn" onclick="checkout()" class="w-full bg-red-600 hover:bg-red-700 py-6 rounded-[2.5rem] font-black text-white text-lg shadow-2xl flex justify-center items-center gap-3 active:scale-95 transition-all">
                    CONFIRMAR PEDIDO <i data-lucide="check-circle" class="w-6 h-6"></i>
                </button>
                <p class="text-[10px] text-center text-gray-400 mt-4 font-bold uppercase tracking-widest">Pago manual al recibir en Cotuí</p>
            </div>
        </div>
    </div>

    <script>
        const CONFIG = {
            shop: 'q0q09e-cp.myshopify.com',
            token: 'a171ee1eaf68d9b7ca5234b4c45a9b0c'
        };

        let allProducts = [];
        let cart = [];

        async function initApp() {
            const query = `{
                collections(first: 20) { edges { node { title } } }
                products(first: 100) {
                    edges {
                        node {
                            id
                            title
                            productType
                            images(first: 1) { edges { node { url } } }
                            variants(first: 1) { edges { node { id price { amount } } } }
                        }
                    }
                }
            }`;

            try {
                const response = await fetch(`https://${CONFIG.shop}/api/2024-01/graphql.json`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-Shopify-Storefront-Access-Token': CONFIG.token },
                    body: JSON.stringify({ query })
                });
                const { data } = await response.json();
                renderCategories(data.collections.edges.map(e => e.node.title));
                allProducts = data.products.edges.map(e => ({
                    id: e.node.id,
                    variantId: e.node.variants.edges[0].node.id,
                    name: e.node.title,
                    type: e.node.productType || 'General',
                    price: parseFloat(e.node.variants.edges[0].node.price.amount),
                    image: e.node.images.edges[0]?.node.url || 'https://via.placeholder.com/200'
                }));
                renderProducts(allProducts);
            } catch (err) { console.error(err); }
        }

        function renderCategories(list) {
            const container = document.getElementById('category-list');
            list.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = "category-pill bg-white text-gray-500 px-8 py-3.5 rounded-2xl text-[11px] font-black shadow-lg border border-gray-100 shrink-0 uppercase transition-all";
                btn.innerText = cat;
                btn.onclick = (e) => {
                    document.querySelectorAll('.category-pill').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    filterByCategory(cat);
                };
                container.appendChild(btn);
            });
        }

        function renderProducts(list) {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = list.map(p => `
                <div class="product-card p-5 flex flex-col justify-between shadow-sm">
                    <img src="${p.image}" class="w-full h-36 object-contain mb-4 rounded-xl">
                    <div>
                        <h3 class="text-[10px] font-black text-gray-800 h-8 overflow-hidden uppercase leading-none mb-3">${p.name}</h3>
                        <div class="flex justify-between items-center">
                            <span class="text-red-600 font-extrabold text-sm tracking-tighter">RD$${p.price.toLocaleString()}</span>
                            <button onclick="addToCart('${p.id}')" class="bg-red-600 text-white p-3 rounded-2xl shadow-xl active:scale-75 transition-all">
                                <i data-lucide="plus" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function filterByCategory(cat) {
            document.getElementById('view-title').innerText = cat === 'All' ? 'Pasillo Principal' : cat;
            const filtered = cat === 'All' ? allProducts : allProducts.filter(p => p.type === cat || p.name.includes(cat));
            renderProducts(filtered);
        }

        function handleSearch() {
            const val = document.getElementById('search').value.toLowerCase();
            renderProducts(allProducts.filter(p => p.name.toLowerCase().includes(val)));
        }

        function addToCart(id) {
            const p = allProducts.find(i => i.id === id);
            cart.push({ ...p, cid: Date.now() });
            updateCartUI();
        }

        function updateCartUI() {
            const list = document.getElementById('cart-items');
            const badge = document.getElementById('cart-badge');
            badge.innerText = cart.length;
            badge.classList.toggle('hidden', cart.length === 0);
            list.innerHTML = cart.map(i => `
                <div class="flex items-center gap-5 bg-gray-50 p-5 rounded-[2.5rem] border border-white">
                    <img src="${i.image}" class="w-14 h-14 object-contain">
                    <div class="flex-grow">
                        <p class="text-[10px] font-black text-gray-900 uppercase leading-none">${i.name}</p>
                        <p class="text-red-600 font-black text-sm mt-1">RD$${i.price.toLocaleString()}</p>
                    </div>
                    <button onclick="removeFromCart(${i.cid})" class="text-gray-300 hover:text-red-600"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
                </div>
            `).join('');
            const total = cart.reduce((s, i) => s + i.price, 0);
            document.getElementById('cart-total').innerText = `RD$${total.toLocaleString()}`;
            lucide.createIcons();
        }

        function removeFromCart(cid) {
            cart = cart.filter(i => i.cid !== cid);
            updateCartUI();
        }

        function toggleCart() { document.getElementById('cart-modal').classList.toggle('hidden'); }

        // --- ENVIAR ORDEN A SHOPIFY PARA GESTIÓN MANUAL ---
        async function checkout() {
            if (!cart.length) return;
            const btn = document.getElementById('checkout-btn');
            btn.disabled = true;
            btn.innerText = "ENVIANDO PEDIDO...";

            const lineItems = cart.map(item => ({ variantId: item.variantId, quantity: 1 }));

            const query = `
                mutation checkoutCreate($input: CheckoutCreateInput!) {
                    checkoutCreate(input: $input) {
                        checkout { webUrl id }
                    }
                }
            `;

            try {
                const response = await fetch(`https://${CONFIG.shop}/api/2024-01/graphql.json`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-Shopify-Storefront-Access-Token': CONFIG.token },
                    body: JSON.stringify({ query, variables: { input: { lineItems } } })
                });
                
                const { data } = await response.json();
                
                // Redirigimos al checkout real. 
                // Al tener activado el "Pago Manual" en Shopify, el cliente solo pone su dirección y da a "Completar pedido".
                if (data.checkoutCreate.checkout.webUrl) {
                    window.location.href = data.checkoutCreate.checkout.webUrl;
                }
            } catch (err) {
                alert("Error al procesar el pedido.");
                btn.disabled = false;
                btn.innerText = "CONFIRMAR PEDIDO";
            }
        }

        initApp();
        lucide.createIcons();
    </script>
</body>
</html>
