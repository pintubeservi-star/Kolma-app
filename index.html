<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KOLMARD | Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #F3F4F6; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .nav-dock { bottom: 20px; left: 20px; right: 20px; border-radius: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .side-panel { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); transform: translateX(100%); }
        .side-panel.active { transform: translateX(0); }
        .loader { border-top-color: transparent; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        /* Estilo para las pestañas de selección */
        .auth-tab.active { color: #E11D48; border-bottom: 3px solid #E11D48; }
    </style>
</head>
<body class="pb-32">

    <header class="sticky top-0 z-40 px-6 pt-12 pb-6 bg-white/70 backdrop-blur-xl border-b border-gray-100">
        <div class="flex justify-between items-center">
            <div>
                <span class="text-[10px] font-bold text-rose-500 uppercase tracking-[0.2em] mb-1 block">Supermercado Digital</span>
                <h1 class="text-3xl font-extrabold tracking-tighter text-gray-900 italic uppercase">KOLMA<span class="text-rose-600">RD</span></h1>
            </div>
            <div class="flex gap-3">
                <button onclick="toggleProfile()" class="p-3 bg-gray-100 rounded-2xl text-gray-500 relative">
                    <i data-lucide="user" class="w-6 h-6"></i>
                    <span id="user-dot" class="absolute top-2 right-2 w-2.5 h-2.5 bg-green-500 rounded-full border-2 border-white hidden"></span>
                </button>
                <button onclick="toggleCart()" class="relative p-3 bg-rose-600 rounded-2xl text-white shadow-lg shadow-rose-200">
                    <i data-lucide="shopping-bag" class="w-5 h-5"></i>
                    <span id="cart-badge" class="absolute -top-1 -right-1 bg-yellow-400 text-rose-900 text-[10px] font-black h-5 w-5 rounded-full flex items-center justify-center border-2 border-white hidden">0</span>
                </button>
            </div>
        </div>
    </header>

    <section class="px-6 mt-6">
        <div class="w-full h-32 bg-gradient-to-br from-rose-600 to-rose-400 rounded-[2.5rem] p-6 text-white relative overflow-hidden shadow-xl shadow-rose-100">
            <div class="relative z-10 text-left">
                <h2 class="text-xl font-bold leading-tight uppercase italic">Delivery Express</h2>
                <p class="text-white/80 text-[10px] mt-1 uppercase font-bold tracking-widest">Todo Cotuí en 30 min</p>
            </div>
            <i data-lucide="zap" class="absolute right-[-10px] top-[-10px] w-32 h-32 text-white/10 rotate-12"></i>
        </div>
    </section>

    <main class="px-6 mt-8">
        <h3 class="text-xl font-black text-gray-800 tracking-tight mb-6 uppercase">Productos Hoy</h3>
        <div id="product-grid" class="grid grid-cols-2 gap-4"></div>
    </main>

    <nav class="fixed nav-dock glass flex justify-around items-center py-4 z-50">
        <button onclick="location.reload()" class="text-rose-600"><i data-lucide="layout-grid" class="w-6 h-6"></i></button>
        <button onclick="toggleCart()" class="text-gray-400"><i data-lucide="shopping-cart" class="w-6 h-6"></i></button>
        <button onclick="toggleProfile()" class="text-gray-400"><i data-lucide="user-circle" class="w-6 h-6"></i></button>
    </nav>

    <div id="profile-panel" class="fixed inset-0 z-[70] side-panel">
        <div class="absolute inset-0 bg-black/20 backdrop-blur-sm" onclick="toggleProfile()"></div>
        <div class="absolute right-0 top-0 bottom-0 w-[85%] bg-white p-8 flex flex-col shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-black uppercase italic">Cuenta</h2>
                <button onclick="toggleProfile()" class="text-3xl text-gray-300">&times;</button>
            </div>

            <div id="auth-selector" class="flex border-b border-gray-100 mb-8">
                <button onclick="setAuthMode('login')" id="tab-login" class="auth-tab flex-1 py-3 text-[10px] font-black uppercase tracking-widest active">Iniciar Sesión</button>
                <button onclick="setAuthMode('register')" id="tab-register" class="auth-tab flex-1 py-3 text-[10px] font-black uppercase tracking-widest text-gray-400">Crear Cuenta</button>
            </div>
            
            <div id="auth-box" class="space-y-5">
                <div id="field-firstname" class="hidden">
                    <label class="text-[10px] font-bold uppercase ml-2 text-gray-400 italic">Nombre Completo</label>
                    <input type="text" id="reg-firstname" placeholder="Ej. Juan Pérez" class="w-full p-4 bg-gray-50 rounded-2xl outline-none font-bold mt-1 border border-transparent focus:border-rose-200">
                </div>
                <div>
                    <label class="text-[10px] font-bold uppercase ml-2 text-gray-400 italic">Correo Electrónico</label>
                    <input type="email" id="auth-email" placeholder="tu@email.com" class="w-full p-4 bg-gray-50 rounded-2xl outline-none font-bold mt-1 border border-transparent focus:border-rose-200">
                </div>
                <div id="field-pass">
                    <label class="text-[10px] font-bold uppercase ml-2 text-gray-400 italic">Contraseña</label>
                    <input type="password" id="auth-pass" placeholder="••••••••" class="w-full p-4 bg-gray-50 rounded-2xl outline-none font-bold mt-1 border border-transparent focus:border-rose-200">
                </div>

                <button onclick="submitAuth()" id="btn-auth-main" class="w-full bg-black py-5 rounded-2xl text-white font-bold uppercase tracking-tighter shadow-xl mt-4">Entrar</button>
                
                <button id="btn-recover" onclick="setAuthMode('recover')" class="w-full text-[9px] font-bold text-gray-400 uppercase tracking-widest mt-2">¿Olvidaste tu contraseña?</button>
            </div>

            <div id="auth-welcome" class="hidden space-y-6 text-left">
                <div class="p-8 bg-rose-600 rounded-[2.5rem] text-white shadow-xl relative overflow-hidden">
                    <p class="text-[10px] font-bold uppercase opacity-80 mb-1">Cliente VIP</p>
                    <p id="display-email" class="font-black text-lg truncate italic uppercase"></p>
                    <i data-lucide="check-circle" class="absolute right-[-10px] top-[-10px] w-20 h-20 text-white/10"></i>
                </div>
                <div class="flex items-center gap-3 p-4 bg-green-50 rounded-2xl border border-green-100">
                    <i data-lucide="zap" class="w-5 h-5 text-green-600"></i>
                    <p class="text-[10px] font-bold text-green-700 uppercase">Pasarela de pago conectada</p>
                </div>
                <button onclick="logout()" class="w-full py-4 border-2 border-gray-100 rounded-2xl font-bold text-gray-400 uppercase text-[10px] mt-auto">Cerrar Sesión</button>
            </div>
        </div>
    </div>

    <div id="cart-modal" class="fixed inset-0 bg-black/40 z-[60] hidden backdrop-blur-md flex items-end">
        <div class="absolute inset-0" onclick="toggleCart()"></div>
        <div class="relative bg-white w-full rounded-t-[3rem] p-8 max-h-[85vh] flex flex-col z-10 shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-black uppercase italic">Tu Pedido</h2>
                <button onclick="toggleCart()" class="text-3xl text-gray-300">&times;</button>
            </div>
            <div id="cart-items" class="flex-grow overflow-y-auto space-y-4 mb-6 pr-2"></div>
            <div class="flex justify-between items-end mb-4 px-2">
                <span class="text-gray-400 font-bold uppercase text-xs">Total</span>
                <span id="cart-total" class="text-3xl font-black text-rose-600">RD$0</span>
            </div>
            <button onclick="checkout()" id="btn-pay" class="w-full bg-rose-600 py-5 rounded-2xl font-bold text-white text-lg uppercase italic shadow-xl">Completar Pedido</button>
        </div>
    </div>

    <script>
        const CONFIG = { shop: 'q0q09e-cp.myshopify.com', token: 'a171ee1eaf68d9b7ca5234b4c45a9b0c' };
        let allProducts = [], cart = JSON.parse(localStorage.getItem('kolmard_cart')) || [];
        let authMode = 'login';

        async function initApp() {
            const query = `{ products(first: 50) { edges { node { id title images(first: 1) { edges { node { url } } } variants(first: 1) { edges { node { id price { amount } } } } } } } }`;
            try {
                const response = await fetch(`https://${CONFIG.shop}/api/2024-01/graphql.json`, { method: 'POST', headers: { 'Content-Type': 'application/json', 'X-Shopify-Storefront-Access-Token': CONFIG.token }, body: JSON.stringify({ query }) });
                const res = await response.json();
                allProducts = res.data.products.edges.map(e => ({ id: e.node.id, variantId: e.node.variants.edges[0].node.id, name: e.node.title, price: parseFloat(e.node.variants.edges[0].node.price.amount), image: e.node.images.edges[0]?.node.url || '' }));
                renderProducts(allProducts);
                updateCartUI();
                checkSession();
            } catch (e) { console.log(e); }
        }

        function renderProducts(list) {
            document.getElementById('product-grid').innerHTML = list.map(p => `
                <div class="bg-white p-4 rounded-[2rem] shadow-sm border border-gray-50 flex flex-col items-center">
                    <img src="${p.image}" class="w-24 h-24 object-contain mb-4">
                    <div class="w-full text-left">
                        <h3 class="text-[10px] font-black text-gray-800 uppercase truncate mb-1">${p.name}</h3>
                        <div class="flex justify-between items-center mt-2">
                            <span class="text-rose-600 font-black text-sm">RD$${p.price.toLocaleString()}</span>
                            <button onclick="addToCart('${p.id}')" class="bg-gray-900 text-white p-2.5 rounded-xl"><i data-lucide="plus" class="w-4 h-4"></i></button>
                        </div>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        // --- SISTEMA DE AUTENTICACIÓN (NUEVO CONTROL DE VISIBILIDAD) ---
        function setAuthMode(mode) {
            authMode = mode;
            // Manejo de pestañas
            document.getElementById('tab-login').classList.toggle('active', mode === 'login');
            document.getElementById('tab-register').classList.toggle('active', mode === 'register');
            document.getElementById('tab-login').classList.toggle('text-gray-400', mode !== 'login');
            document.getElementById('tab-register').classList.toggle('text-gray-400', mode !== 'register');

            // Ocultar/Mostrar campos según elección
            document.getElementById('field-firstname').classList.toggle('hidden', mode !== 'register');
            document.getElementById('field-pass').classList.toggle('hidden', mode === 'recover');
            document.getElementById('btn-recover').classList.toggle('hidden', mode !== 'login');
            
            // Texto del botón
            const btnText = { login: 'Iniciar Sesión', register: 'Crear Mi Cuenta', recover: 'Recuperar Contraseña' };
            document.getElementById('btn-auth-main').innerText = btnText[mode];
        }

        async function submitAuth() {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;
            const fname = document.getElementById('reg-firstname').value;
            const btn = document.getElementById('btn-auth-main');
            
            if(!email || (authMode !== 'recover' && !pass)) return alert("Completa los datos");
            btn.innerHTML = `<div class="w-5 h-5 border-2 border-white loader rounded-full mx-auto"></div>`;

            let query = '';
            if(authMode === 'login') {
                query = `mutation { customerAccessTokenCreate(input: {email: "${email}", password: "${pass}"}) { customerAccessToken { accessToken } customerUserErrors { message } } }`;
            } else if(authMode === 'register') {
                query = `mutation { customerCreate(input: {firstName: "${fname}", email: "${email}", password: "${pass}"}) { customer { id } customerUserErrors { message } } }`;
            } else {
                query = `mutation { customerRecover(email: "${email}") { customerUserErrors { message } } }`;
            }

            try {
                const response = await fetch(`https://${CONFIG.shop}/api/2024-01/graphql.json`, { method: 'POST', headers: { 'Content-Type': 'application/json', 'X-Shopify-Storefront-Access-Token': CONFIG.token }, body: JSON.stringify({ query }) });
                const res = await response.json();
                
                if(authMode === 'login') {
                    const token = res.data.customerAccessTokenCreate.customerAccessToken?.accessToken;
                    if(token) { localStorage.setItem('k_token', token); localStorage.setItem('k_email', email); checkSession(); toggleProfile(); }
                    else alert("Datos incorrectos");
                } else if(authMode === 'register') {
                    const errors = res.data.customerCreate.customerUserErrors;
                    if(errors.length > 0) alert(errors[0].message);
                    else { alert("¡Cuenta creada! Ya puedes iniciar sesión."); setAuthMode('login'); }
                } else {
                    alert("Si el correo existe, recibirás instrucciones.");
                }
            } catch (e) { alert("Error de red"); }
            btn.innerText = authMode === 'login' ? 'Iniciar Sesión' : (authMode === 'register' ? 'Crear Mi Cuenta' : 'Recuperar Contraseña');
        }

        function checkSession() {
            const token = localStorage.getItem('k_token');
            if(token) {
                document.getElementById('auth-selector').classList.add('hidden');
                document.getElementById('auth-box').classList.add('hidden');
                document.getElementById('auth-welcome').classList.remove('hidden');
                document.getElementById('display-email').innerText = localStorage.getItem('k_email');
                document.getElementById('user-dot').classList.remove('hidden');
            }
        }

        function logout() { localStorage.clear(); location.reload(); }
        function toggleProfile() { document.getElementById('profile-panel').classList.toggle('active'); }
        function toggleCart() { document.getElementById('cart-modal').classList.toggle('hidden'); }

        // --- CARRITO ---
        function addToCart(id) {
            const p = allProducts.find(i => i.id === id);
            cart.push({ ...p, cid: Date.now() });
            localStorage.setItem('kolmard_cart', JSON.stringify(cart));
            updateCartUI();
        }

        function updateCartUI() {
            const badge = document.getElementById('cart-badge');
            badge.innerText = cart.length; badge.classList.toggle('hidden', cart.length === 0);
            document.getElementById('cart-items').innerHTML = cart.map(i => `<div class="flex items-center gap-4 bg-gray-50 p-4 rounded-2xl border border-white">
                <div class="flex-grow"><p class="text-[10px] font-black uppercase text-gray-900">${i.name}</p><p class="text-rose-600 font-black text-sm">RD$${i.price.toLocaleString()}</p></div>
                <button onclick="removeFromCart(${i.cid})" class="text-gray-300"><i data-lucide="trash-2" class="w-4 h-4 text-gray-400"></i></button></div>`).join('');
            document.getElementById('cart-total').innerText = `RD$${cart.reduce((s, i) => s + i.price, 0).toLocaleString()}`;
            lucide.createIcons();
        }

        function removeFromCart(cid) { cart = cart.filter(i => i.cid !== cid); localStorage.setItem('kolmard_cart', JSON.stringify(cart)); updateCartUI(); }

        // --- CHECKOUT ---
        async function checkout() {
            const token = localStorage.getItem('k_token');
            if(!token) { toggleCart(); toggleProfile(); return alert("Inicia sesión para pagar."); }

            const lines = cart.map(item => ({ merchandiseId: item.variantId, quantity: 1 }));
            const mutation = `mutation { cartCreate(input: { buyerIdentity: { customerAccessToken: "${token}" }, lines: ${JSON.stringify(lines).replace(/"([^"]+)":/g, '$1:')} }) { cart { checkoutUrl } } }`;
            
            try {
                const response = await fetch(`https://${CONFIG.shop}/api/2024-01/graphql.json`, { method: 'POST', headers: { 'Content-Type': 'application/json', 'X-Shopify-Storefront-Access-Token': CONFIG.token }, body: JSON.stringify({ query: mutation }) });
                const res = await response.json();
                if(res.data.cartCreate.cart.checkoutUrl) window.location.href = res.data.cartCreate.cart.checkoutUrl;
            } catch (e) { alert("Error"); }
        }

        initApp();
        lucide.createIcons();
    </script>
</body>
</html>
