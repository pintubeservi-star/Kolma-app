<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>KOLMARD | Premium Express</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --rose-primary: #E11D48; --rose-soft: #FFF1F2; }
        body { font-family: 'Outfit', sans-serif; background-color: #F8FAFC; -webkit-tap-highlight-color: transparent; }
        .glass-nav { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-top: 1px solid rgba(0,0,0,0.05); }
        .category-pill { transition: all 0.2s ease; border: 1.5px solid transparent; }
        .category-pill.active { background-color: var(--rose-primary); color: white; box-shadow: 0 4px 12px rgba(225, 29, 72, 0.25); }
        .product-card { transition: transform 0.2s ease; border-radius: 24px; }
        .product-card:active { transform: scale(0.96); }
        .side-panel { transition: transform 0.5s cubic-bezier(0.32, 0.72, 0, 1); }
        .side-panel.active { transform: translateX(0); }
        .safe-area-bottom { padding-bottom: env(safe-area-inset-bottom); }
        /* Animación de entrada */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-item { animation: fadeIn 0.4s ease forwards; }
    </style>
</head>
<body class="pb-24">

    <header class="sticky top-0 z-50 bg-white/90 backdrop-blur-md px-6 pt-12 pb-4">
        <div class="flex justify-between items-end mb-4">
            <div>
                <div class="flex items-center gap-1 text-rose-600 font-bold text-[11px] uppercase tracking-widest">
                    <i data-lucide="map-pin" class="w-3 h-3"></i> Cotuí, RD
                </div>
                <h1 class="text-3xl font-black text-gray-900 leading-none">KOLMA<span class="text-rose-600">RD</span></h1>
            </div>
            <button onclick="toggleProfile()" class="w-12 h-12 bg-gray-100 rounded-full flex items-center justify-center relative border-2 border-white shadow-sm">
                <i data-lucide="user" class="w-6 h-6 text-gray-600"></i>
                <span id="user-dot" class="absolute top-0 right-0 w-3 h-3 bg-green-500 rounded-full border-2 border-white hidden"></span>
            </button>
        </div>
        
        <div class="relative group">
            <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400 group-focus-within:text-rose-500 transition-colors"></i>
            <input type="text" id="search-input" oninput="filterProducts()" placeholder="¿Qué se te antoja hoy?" 
                class="w-full bg-gray-100 p-4 pl-12 rounded-2xl outline-none font-medium text-gray-700 border-2 border-transparent focus:bg-white focus:border-rose-500/20 transition-all">
        </div>

        <div class="flex gap-3 overflow-x-auto mt-5 pb-2 no-scrollbar">
            <button onclick="filterByCategory('Todos')" class="category-pill active whitespace-nowrap px-6 py-2.5 rounded-full text-sm font-bold">Todos</button>
            <button onclick="filterByCategory('Bebidas')" class="category-pill whitespace-nowrap px-6 py-2.5 bg-white border border-gray-100 rounded-full text-sm font-bold text-gray-500">🥤 Bebidas</button>
            <button onclick="filterByCategory('Snacks')" class="category-pill whitespace-nowrap px-6 py-2.5 bg-white border border-gray-100 rounded-full text-sm font-bold text-gray-500">🍟 Snacks</button>
            <button onclick="filterByCategory('Hogar')" class="category-pill whitespace-nowrap px-6 py-2.5 bg-white border border-gray-100 rounded-full text-sm font-bold text-gray-500">🏠 Hogar</button>
        </div>
    </header>

    <section class="px-6 mt-4">
        <div class="w-full h-40 bg-gray-900 rounded-[2.5rem] p-8 text-white relative overflow-hidden shadow-xl shadow-rose-900/10">
            <div class="relative z-10 h-full flex flex-col justify-center">
                <span class="bg-rose-600 text-[10px] font-black px-3 py-1 rounded-full w-fit mb-2 uppercase tracking-tighter">Oferta del día</span>
                <h2 class="text-2xl font-bold italic uppercase leading-none">Envío Gratis</h2>
                <p class="text-white/60 text-xs font-medium mt-1">En tu primera orden con Google</p>
            </div>
            <div class="absolute right-[-20px] top-[-20px] w-48 h-48 bg-rose-600/20 rounded-full blur-3xl"></div>
            <i data-lucide="shopping-bag" class="absolute right-6 bottom-6 w-16 h-16 text-white/10 -rotate-12"></i>
        </div>
    </section>

    <main class="px-6 mt-8">
        <div class="flex justify-between items-end mb-6">
            <h3 class="font-extrabold text-xl text-gray-800 uppercase italic">Para tí</h3>
            <span class="text-rose-600 font-bold text-xs">Ver todo</span>
        </div>
        <div id="product-grid" class="grid grid-cols-2 gap-5">
            </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 glass-nav px-8 pt-4 pb-8 flex justify-between items-center z-[60] safe-area-bottom">
        <button onclick="location.reload()" class="flex flex-col items-center gap-1 text-rose-600">
            <i data-lucide="home" class="w-6 h-6"></i>
            <span class="text-[10px] font-bold uppercase">Inicio</span>
        </button>
        
        <button onclick="toggleCart()" class="bg-gray-900 text-white p-4 rounded-[2rem] shadow-2xl relative -mt-12 border-4 border-white active:scale-90 transition-transform">
            <i data-lucide="shopping-basket" class="w-7 h-7"></i>
            <span id="cart-badge" class="absolute -top-1 -right-1 bg-rose-600 text-white text-[10px] font-black h-6 w-6 rounded-full flex items-center justify-center border-2 border-white hidden animate-bounce">0</span>
        </button>

        <button onclick="toggleProfile()" class="flex flex-col items-center gap-1 text-gray-400">
            <i data-lucide="user-circle" class="w-6 h-6"></i>
            <span class="text-[10px] font-bold uppercase">Cuenta</span>
        </button>
    </nav>

    <div id="profile-panel" class="fixed inset-0 z-[100] side-panel translate-x-full">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-md" onclick="toggleProfile()"></div>
        <div class="absolute right-0 top-0 bottom-0 w-[90%] bg-white p-8 flex flex-col shadow-2xl rounded-l-[3rem]">
            
            <div class="flex justify-between items-center mb-10">
                <h2 id="auth-title" class="text-2xl font-black uppercase italic tracking-tighter">Mi Perfil</h2>
                <button onclick="toggleProfile()" class="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center text-gray-400">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>

            <div id="auth-box" class="space-y-5">
                <button onclick="window.location.href='https://q0q09e-cp.myshopify.com/account/login'" 
                    class="w-full flex items-center justify-center gap-4 bg-white border-2 border-gray-100 p-5 rounded-[1.5rem] shadow-sm active:bg-gray-50 transition-all">
                    <img src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png" class="w-6 h-6" alt="Google">
                    <span class="text-sm font-bold text-gray-800 uppercase italic">Entrar con Google</span>
                </button>

                <div class="relative py-4 flex items-center">
                    <div class="flex-grow border-t border-gray-100"></div>
                    <span class="px-4 text-[10px] font-bold text-gray-300 uppercase">Ó usa tu email</span>
                    <div class="flex-grow border-t border-gray-100"></div>
                </div>

                <div id="reg-name-field" class="hidden">
                    <input type="text" id="auth-fname" placeholder="Nombre completo" class="w-full p-5 bg-gray-50 rounded-2xl font-bold border-2 border-transparent focus:border-rose-500 outline-none transition-all">
                </div>
                <input type="email" id="auth-email" placeholder="Correo electrónico" class="w-full p-5 bg-gray-50 rounded-2xl font-bold border-2 border-transparent focus:border-rose-500 outline-none transition-all">
                <div id="reg-pass-field">
                    <input type="password" id="auth-pass" placeholder="Contraseña" class="w-full p-5 bg-gray-50 rounded-2xl font-bold border-2 border-transparent focus:border-rose-500 outline-none transition-all">
                </div>

                <button onclick="handleAuthSubmit()" id="btn-main-auth" class="w-full bg-rose-600 py-5 rounded-[1.5rem] text-white font-black uppercase italic tracking-tighter shadow-lg shadow-rose-200 active:scale-95 transition-transform">Iniciar Sesión</button>
                
                <div class="pt-6 space-y-4 text-center">
                    <button id="switch-to-reg" onclick="switchAuth('register')" class="text-[10px] font-black text-rose-600 uppercase tracking-widest underline decoration-2 offset-4">Crear cuenta nueva</button>
                    <button id="switch-to-login" onclick="switchAuth('login')" class="hidden text-[10px] font-black text-gray-900 uppercase">Ya tengo cuenta • Volver</button>
                </div>
            </div>

            <div id="auth-welcome" class="hidden space-y-6 animate-item">
                <div class="p-10 bg-gray-900 rounded-[3rem] text-white relative overflow-hidden">
                    <div class="relative z-10">
                        <p class="text-[10px] font-black uppercase text-rose-500 tracking-widest mb-1">Cliente VIP</p>
                        <p id="display-email" class="font-black text-xl truncate italic uppercase"></p>
                    </div>
                    <i data-lucide="star" class="absolute right-[-10px] top-[-10px] w-24 h-24 text-white/5 rotate-12"></i>
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-gray-50 p-6 rounded-3xl border border-gray-100">
                        <i data-lucide="package" class="w-6 h-6 text-rose-600 mb-2"></i>
                        <p class="text-[10px] font-black uppercase">Mis Pedidos</p>
                    </div>
                    <div class="bg-gray-50 p-6 rounded-3xl border border-gray-100">
                        <i data-lucide="map-pin" class="w-6 h-6 text-rose-600 mb-2"></i>
                        <p class="text-[10px] font-black uppercase">Direcciones</p>
                    </div>
                </div>

                <button onclick="logout()" class="w-full py-4 border-2 border-gray-100 rounded-2xl font-bold text-gray-400 uppercase text-[10px] mt-auto">Cerrar Sesión</button>
            </div>
        </div>
    </div>

    <div id="cart-modal" class="fixed inset-0 bg-black/60 z-[110] hidden backdrop-blur-md flex items-end">
        <div class="absolute inset-0" onclick="toggleCart()"></div>
        <div class="relative bg-white w-full rounded-t-[3.5rem] p-8 max-h-[90vh] flex flex-col z-10 shadow-2xl">
            <div class="w-12 h-1.5 bg-gray-200 rounded-full mx-auto mb-6"></div>
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-3xl font-black uppercase italic tracking-tighter">Tu Carrito</h2>
                <button onclick="toggleCart()" class="text-gray-300"><i data-lucide="chevron-down" class="w-8 h-8"></i></button>
            </div>
            
            <div id="cart-items" class="flex-grow overflow-y-auto space-y-4 mb-8 no-scrollbar">
                </div>

            <div class="bg-gray-50 p-6 rounded-[2rem] space-y-3 mb-6">
                <div class="flex justify-between items-center text-gray-400 font-bold text-xs uppercase">
                    <span>Subtotal</span>
                    <span id="subtotal-val">RD$0</span>
                </div>
                <div class="flex justify-between items-center text-green-600 font-bold text-xs uppercase">
                    <span>Delivery</span>
                    <span>Gratis</span>
                </div>
                <div class="flex justify-between items-center pt-3 border-t border-gray-200">
                    <span class="text-gray-900 font-black uppercase italic">Total</span>
                    <span id="cart-total" class="text-3xl font-black text-rose-600 tracking-tighter italic">RD$0</span>
                </div>
            </div>

            <button onclick="checkout()" id="btn-pay" class="w-full bg-rose-600 py-6 rounded-[2rem] font-black text-white text-xl uppercase italic shadow-2xl shadow-rose-200 active:scale-95 transition-all">Pagar Pedido</button>
        </div>
    </div>

    <script>
        const CONFIG = { 
            shop: 'q0q09e-cp.myshopify.com', 
            token: 'a171ee1eaf68d9b7ca5234b4c45a9b0c' 
        };
        
        let allProducts = [], cart = JSON.parse(localStorage.getItem('kolmard_cart')) || [];
        let currentMode = 'login';

        async function initApp() {
            const query = `{ products(first: 50) { edges { node { id title images(first: 1) { edges { node { url } } } variants(first: 1) { edges { node { id price { amount } } } } } } } }`;
            try {
                const response = await fetch(`https://${CONFIG.shop}/api/2024-01/graphql.json`, { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json', 'X-Shopify-Storefront-Access-Token': CONFIG.token }, 
                    body: JSON.stringify({ query }) 
                });
                const res = await response.json();
                allProducts = res.data.products.edges.map(e => ({ 
                    id: e.node.id, 
                    variantId: e.node.variants.edges[0].node.id, 
                    name: e.node.title, 
                    price: parseFloat(e.node.variants.edges[0].node.price.amount), 
                    image: e.node.images.edges[0]?.node.url || '' 
                }));
                renderProducts(allProducts);
                updateCartUI();
                checkSession();
            } catch (e) { console.log("Error al cargar productos", e); }
        }

        function renderProducts(list) {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = list.map((p, index) => `
                <div class="product-card bg-white p-5 shadow-sm border border-gray-100 flex flex-col animate-item" style="animation-delay: ${index * 0.05}s">
                    <div class="relative w-full aspect-square mb-4 bg-gray-50 rounded-2xl overflow-hidden flex items-center justify-center p-4">
                        <img src="${p.image}" class="max-w-full max-h-full object-contain" loading="lazy">
                        <button onclick="addToCart('${p.id}')" class="absolute bottom-2 right-2 bg-rose-600 text-white w-10 h-10 rounded-full flex items-center justify-center shadow-lg active:scale-125 transition-transform">
                            <i data-lucide="plus" class="w-5 h-5"></i>
                        </button>
                    </div>
                    <div class="px-1">
                        <h3 class="text-[11px] font-extrabold text-gray-800 uppercase truncate mb-1">${p.name}</h3>
                        <div class="flex justify-between items-center">
                            <span class="text-rose-600 font-black text-base italic">RD$${p.price.toLocaleString()}</span>
                        </div>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        // BUSCADOR Y FILTROS
        function filterProducts() {
            const term = document.getElementById('search-input').value.toLowerCase();
            const filtered = allProducts.filter(p => p.name.toLowerCase().includes(term));
            renderProducts(filtered);
        }

        function filterByCategory(cat) {
            // Animación de los botones de categoría
            document.querySelectorAll('.category-pill').forEach(btn => {
                btn.classList.remove('active', 'bg-rose-600', 'text-white');
                if(btn.innerText.includes(cat)) btn.classList.add('active');
            });
            // Lógica de filtrado (puedes expandir según tus tags en Shopify)
            if(cat === 'Todos') renderProducts(allProducts);
            else {
                const filtered = allProducts.filter(p => p.name.toLowerCase().includes(cat.toLowerCase().slice(2)));
                renderProducts(filtered);
            }
        }

        // AUTENTICACIÓN
        function switchAuth(mode) {
            currentMode = mode;
            document.getElementById('reg-name-field').classList.toggle('hidden', mode !== 'register');
            document.getElementById('reg-pass-field').classList.toggle('hidden', mode === 'recover');
            document.getElementById('switch-to-reg').classList.toggle('hidden', mode === 'register');
            document.getElementById('switch-to-login').classList.toggle('hidden', mode === 'login');
            document.getElementById('btn-main-auth').innerText = mode === 'login' ? 'Entrar Ahora' : 'Crear Cuenta VIP';
        }

        async function handleAuthSubmit() {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;
            const btn = document.getElementById('btn-main-auth');
            if(!email) return;

            btn.innerHTML = `<div class="w-6 h-6 border-4 border-white/30 border-t-white loader rounded-full mx-auto"></div>`;
            
            // Simulación de Mutation (idéntica a tu código previo)
            let query = currentMode === 'login' 
                ? `mutation { customerAccessTokenCreate(input: {email: "${email}", password: "${pass}"}) { customerAccessToken { accessToken } customerUserErrors { message } } }`
                : `mutation { customerCreate(input: {firstName: "${document.getElementById('auth-fname').value}", email: "${email}", password: "${pass}"}) { customer { id } customerUserErrors { message } } }`;

            try {
                const response = await fetch(`https://${CONFIG.shop}/api/2024-01/graphql.json`, { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json', 'X-Shopify-Storefront-Access-Token': CONFIG.token }, 
                    body: JSON.stringify({ query }) 
                });
                const res = await response.json();
                
                if(currentMode === 'login') {
                    const token = res.data.customerAccessTokenCreate?.customerAccessToken?.accessToken;
                    if(token) { 
                        localStorage.setItem('k_token', token); 
                        localStorage.setItem('k_email', email); 
                        location.reload(); 
                    } else alert("Error de acceso");
                } else {
                    alert("¡Listo! Ahora inicia sesión.");
                    switchAuth('login');
                }
            } catch(e) { console.error(e); }
            btn.innerText = "Reintentar";
        }

        function checkSession() {
            const token = localStorage.getItem('k_token');
            if(token) {
                document.getElementById('auth-box').classList.add('hidden');
                document.getElementById('auth-welcome').classList.remove('hidden');
                document.getElementById('display-email').innerText = localStorage.getItem('k_email');
                document.getElementById('user-dot').classList.remove('hidden');
            }
        }

        // CARRITO
        function addToCart(id) {
            const p = allProducts.find(i => i.id === id);
            cart.push({ ...p, cid: Date.now() });
            localStorage.setItem('kolmard_cart', JSON.stringify(cart));
            updateCartUI();
        }

        function updateCartUI() {
            const badge = document.getElementById('cart-badge');
            const total = cart.reduce((s, i) => s + i.price, 0);
            badge.innerText = cart.length;
            badge.classList.toggle('hidden', cart.length === 0);
            
            document.getElementById('cart-items').innerHTML = cart.map(i => `
                <div class="flex items-center gap-5 bg-white p-5 rounded-[2rem] border border-gray-100 shadow-sm animate-item">
                    <img src="${i.image}" class="w-16 h-16 object-contain">
                    <div class="flex-grow">
                        <p class="text-[10px] font-black uppercase text-gray-900 leading-none mb-1">${i.name}</p>
                        <p class="text-rose-600 font-black text-sm italic">RD$${i.price.toLocaleString()}</p>
                    </div>
                    <button onclick="removeFromCart(${i.cid})" class="text-gray-200 hover:text-rose-500 transition-colors"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
                </div>
            `).join('');
            
            document.getElementById('subtotal-val').innerText = `RD$${total.toLocaleString()}`;
            document.getElementById('cart-total').innerText = `RD$${total.toLocaleString()}`;
            lucide.createIcons();
        }

        async function checkout() {
            const token = localStorage.getItem('k_token');
            if(!token) { toggleCart(); toggleProfile(); return; }
            const lines = cart.map(item => ({ merchandiseId: item.variantId, quantity: 1 }));
            const mutation = `mutation { cartCreate(input: { buyerIdentity: { customerAccessToken: "${token}" }, lines: ${JSON.stringify(lines).replace(/"([^"]+)":/g, '$1:')} }) { cart { checkoutUrl } } }`;
            const response = await fetch(`https://${CONFIG.shop}/api/2024-01/graphql.json`, { method: 'POST', headers: { 'Content-Type': 'application/json', 'X-Shopify-Storefront-Access-Token': CONFIG.token }, body: JSON.stringify({ query: mutation }) });
            const res = await response.json();
            if(res.data.cartCreate.cart.checkoutUrl) window.location.href = res.data.cartCreate.cart.checkoutUrl;
        }

        function removeFromCart(cid) { cart = cart.filter(i => i.cid !== cid); localStorage.setItem('kolmard_cart', JSON.stringify(cart)); updateCartUI(); }
        function logout() { localStorage.clear(); location.reload(); }
        function toggleProfile() { document.getElementById('profile-panel').classList.toggle('active'); }
        function toggleCart() { document.getElementById('cart-modal').classList.toggle('hidden'); }

        initApp();
    </script>
</body>
</html>
