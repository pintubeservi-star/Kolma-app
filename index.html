<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KOLMARD | Supermercado Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; background-color: #F8F9FA; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .category-pill.active { background-color: #dc2626; color: white; border-color: #dc2626; box-shadow: 0 10px 20px -5px rgba(220, 38, 38, 0.4); }
        .product-card { transition: all 0.2s ease; background: white; border-radius: 2.5rem; padding: 1.25rem; border: 1px solid #fff; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02); }
        .product-card:active { transform: scale(0.95); background-color: #f9fafb; }
        @keyframes slideIn { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .animate-slide-in { animation: slideIn 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="pb-28">

    <header class="bg-red-600 pt-8 pb-12 px-6 sticky top-0 z-40 rounded-b-[3.5rem] shadow-2xl border-b-[6px] border-yellow-400">
        <div class="flex justify-between items-center mb-6 text-white">
            <div>
                <h1 class="text-3xl font-black italic tracking-tighter uppercase">KOLMA<span class="text-yellow-400">RD</span></h1>
                <div class="flex items-center gap-1 opacity-90 text-[10px] font-bold tracking-widest uppercase">
                    <i data-lucide="map-pin" class="w-3 h-3 text-yellow-400"></i> Cotuí, Sánchez Ramírez
                </div>
            </div>
            <button onclick="toggleCart()" class="relative p-3 bg-white/20 rounded-2xl backdrop-blur-xl border border-white/30 active:scale-90 transition-transform">
                <i data-lucide="shopping-basket" class="w-7 h-7 text-white"></i>
                <span id="cart-badge" class="absolute -top-2 -right-2 bg-yellow-400 text-red-700 text-[11px] font-black rounded-full h-6 w-6 flex items-center justify-center border-2 border-red-600 hidden">0</span>
            </button>
        </div>
        <div class="relative">
            <input type="text" id="search" oninput="handleSearch()" placeholder="¿Qué necesitas hoy?" 
                class="w-full p-4 pl-12 rounded-2xl border-none shadow-inner outline-none text-gray-800 font-bold placeholder:text-gray-400">
            <i data-lucide="search" class="absolute left-4 top-4 text-gray-400 w-5 h-5"></i>
        </div>
    </header>

    <div class="px-6 -mt-6 relative z-50">
        <div id="category-list" class="flex gap-3 overflow-x-auto no-scrollbar py-2">
            <button onclick="filterByCategory('All', this)" class="category-pill active bg-white text-gray-700 px-8 py-3.5 rounded-2xl text-[11px] font-black shadow-xl shrink-0 border border-gray-100 uppercase tracking-tighter">TODO</button>
        </div>
    </div>

    <main class="px-6 mt-8">
        <h2 id="view-title" class="text-2xl font-black text-gray-900 tracking-tight mb-6">Pasillo Principal</h2>
        <div id="product-grid" class="grid grid-cols-2 gap-5">
            <div class="col-span-2 py-24 flex flex-col items-center justify-center">
                <div class="w-14 h-14 border-[5px] border-red-600 border-t-transparent rounded-full animate-spin"></div>
                <p class="mt-5 text-gray-400 font-black italic text-sm tracking-widest animate-pulse uppercase">Conectando Tienda...</p>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-2xl border-t border-gray-100 px-10 py-5 flex justify-between items-center z-50 rounded-t-[2.5rem] shadow-2xl">
        <div onclick="location.reload()" class="flex flex-col items-center text-red-600 cursor-pointer">
            <i data-lucide="home" class="w-7 h-7"></i>
            <span class="text-[10px] font-black mt-1 uppercase tracking-tighter">Inicio</span>
        </div>
        <div onclick="toggleCart()" class="flex flex-col items-center text-gray-300 hover:text-red-600 transition-all cursor-pointer">
            <i data-lucide="shopping-cart" class="w-7 h-7"></i>
            <span class="text-[10px] font-black mt-1 uppercase tracking-tighter">Carrito</span>
        </div>
        <div class="flex flex-col items-center text-gray-300">
            <i data-lucide="user" class="w-7 h-7"></i>
            <span class="text-[10px] font-black mt-1 uppercase tracking-tighter">Perfil</span>
        </div>
    </nav>

    <div id="cart-modal" class="fixed inset-0 bg-black/70 z-[60] hidden backdrop-blur-md p-4">
        <div class="bg-white w-full max-w-md mx-auto h-[88vh] mt-8 rounded-[3.5rem] overflow-hidden flex flex-col animate-slide-in shadow-2xl">
            <div class="p-8 border-b flex justify-between items-center bg-gray-50/50">
                <h2 class="text-2xl font-black text-gray-900 tracking-tighter">Mi Pedido</h2>
                <button onclick="toggleCart()" class="bg-gray-200 p-3 rounded-full text-gray-600">&times;</button>
            </div>
            <div id="cart-items" class="flex-grow overflow-y-auto p-8 space-y-6 no-scrollbar"></div>
            <div class="p-8 bg-white border-t border-gray-100 shadow-[0_-20px_50px_rgba(0,0,0,0.05)]">
                <div class="flex justify-between text-3xl font-black mb-8 text-gray-900">
                    <span>Total</span>
                    <span id="cart-total" class="text-red-600">RD$0</span>
                </div>
                <button id="checkout-btn" onclick="checkout()" class="w-full bg-red-600 hover:bg-red-700 py-6 rounded-[2.5rem] font-black text-white text-xl shadow-2xl shadow-red-100 flex justify-center items-center gap-3 transition-all active:scale-95 disabled:opacity-50">
                    PROCESAR COMPRA <i data-lucide="arrow-right" class="w-6 h-6"></i>
                </button>
            </div>
        </div>
    </div>

    <script>
        const CONFIG = {
            shop: 'q0q09e-cp.myshopify.com',
            token: 'a171ee1eaf68d9b7ca5234b4c45a9b0c'
        };

        let allProducts = [];
        let cart = [];

        async function initApp() {
            const query = `{
                collections(first: 20) { edges { node { title } } }
                products(first: 100) {
                    edges {
                        node {
                            id
                            title
                            productType
                            images(first: 1) { edges { node { url } } }
                            variants(first: 1) { edges { node { id price { amount } } } }
                        }
                    }
                }
            }`;

            try {
                const response = await fetch(`https://${CONFIG.shop}/api/2024-01/graphql.json`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-Shopify-Storefront-Access-Token': CONFIG.token },
                    body: JSON.stringify({ query })
                });
                const { data } = await response.json();
                renderCategories(data.collections.edges.map(e => e.node.title));
                allProducts = data.products.edges.map(e => ({
                    id: e.node.id,
                    variantId: e.node.variants.edges[0].node.id, // ID REAL DE SHOPIFY
                    name: e.node.title,
                    type: e.node.productType || 'General',
                    price: parseFloat(e.node.variants.edges[0].node.price.amount),
                    image: e.node.images.edges[0]?.node.url || 'https://via.placeholder.com/200'
                }));
                renderProducts(allProducts);
            } catch (err) {
                console.error("Error:", err);
            }
        }

        function renderCategories(list) {
            const container = document.getElementById('category-list');
            list.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = "category-pill bg-white text-gray-500 px-8 py-3.5 rounded-2xl text-[11px] font-black shadow-lg border border-gray-100 shrink-0 uppercase tracking-tighter";
                btn.innerText = cat;
                btn.onclick = (e) => {
                    document.querySelectorAll('.category-pill').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    filterByCategory(cat);
                };
                container.appendChild(btn);
            });
        }

        function renderProducts(list) {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = list.map(p => `
                <div class="product-card flex flex-col justify-between">
                    <img src="${p.image}" class="w-full h-40 object-contain mb-4 transform hover:scale-105 transition-transform duration-300">
                    <div>
                        <h3 class="text-[10px] font-black text-gray-800 h-8 overflow-hidden uppercase tracking-tighter mb-3 leading-none">${p.name}</h3>
                        <div class="flex justify-between items-center">
                            <span class="text-red-600 font-extrabold text-sm tracking-tighter">RD$${p.price.toLocaleString()}</span>
                            <button onclick="addToCart('${p.id}')" class="bg-red-600 text-white p-3 rounded-2xl shadow-xl active:scale-75 transition-all">
                                <i data-lucide="plus" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function filterByCategory(cat) {
            document.getElementById('view-title').innerText = cat === 'All' ? 'Pasillo Principal' : cat;
            const filtered = cat === 'All' ? allProducts : allProducts.filter(p => p.type === cat || p.name.includes(cat));
            renderProducts(filtered);
        }

        function handleSearch() {
            const val = document.getElementById('search').value.toLowerCase();
            renderProducts(allProducts.filter(p => p.name.toLowerCase().includes(val)));
        }

        function addToCart(id) {
            const p = allProducts.find(i => i.id === id);
            cart.push({ ...p, cid: Date.now() });
            updateCartUI();
        }

        function updateCartUI() {
            const list = document.getElementById('cart-items');
            const badge = document.getElementById('cart-badge');
            badge.innerText = cart.length;
            badge.classList.toggle('hidden', cart.length === 0);
            list.innerHTML = cart.map(i => `
                <div class="flex items-center gap-6 bg-gray-50 p-6 rounded-[2.5rem] border border-white">
                    <img src="${i.image}" class="w-16 h-16 object-contain rounded-xl">
                    <div class="flex-grow">
                        <p class="text-[11px] font-black text-gray-900 uppercase leading-none tracking-tighter">${i.name}</p>
                        <p class="text-red-600 font-black text-sm mt-2 tracking-tighter">RD$${i.price.toLocaleString()}</p>
                    </div>
                    <button onclick="removeFromCart(${i.cid})" class="text-gray-300 hover:text-red-600 transition-colors"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
                </div>
            `).join('');
            const total = cart.reduce((s, i) => s + i.price, 0);
            document.getElementById('cart-total').innerText = `RD$${total.toLocaleString()}`;
            lucide.createIcons();
        }

        function removeFromCart(cid) {
            cart = cart.filter(i => i.cid !== cid);
            updateCartUI();
        }

        function toggleCart() { document.getElementById('cart-modal').classList.toggle('hidden'); }

        async function checkout() {
            if (!cart.length) return;
            const btn = document.getElementById('checkout-btn');
            btn.disabled = true;
            btn.innerText = "SINCRO CON SHOPIFY...";

            // Shopify necesita Variant IDs, no Product IDs.
            const lineItems = cart.map(item => ({
                variantId: item.variantId,
                quantity: 1
            }));

            const mutation = `
                mutation checkoutCreate($input: CheckoutCreateInput!) {
                    checkoutCreate(input: $input) {
                        checkout { webUrl }
                        checkoutUserErrors { code field message }
                    }
                }
            `;

            try {
                const response = await fetch(`https://${CONFIG.shop}/api/2024-01/graphql.json`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-Shopify-Storefront-Access-Token': CONFIG.token },
                    body: JSON.stringify({ query: mutation, variables: { input: { lineItems } } })
                });
                
                const result = await response.json();
                
                if (result.data?.checkoutCreate?.checkout?.webUrl) {
                    window.location.href = result.data.checkoutCreate.checkout.webUrl;
                } else {
                    const errorMsg = result.data?.checkoutCreate?.checkoutUserErrors[0]?.message || "Error desconocido";
                    alert("Shopify dice: " + errorMsg);
                    btn.disabled = false;
                    btn.innerText = "PROCESAR COMPRA";
                }
            } catch (err) {
                alert("Error de red o configuración.");
                btn.disabled = false;
                btn.innerText = "PROCESAR COMPRA";
            }
        }

        initApp();
        lucide.createIcons();
    </script>
</body>
</html>
