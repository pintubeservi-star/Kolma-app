<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>KOLMA - Supermercado Digital</title>
    
    <!-- Librerías Externas -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        :root {
            --kolma-red: #E60023;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #fcfcfc;
            -webkit-tap-highlight-color: transparent;
        }

        .kolma-logo-container {
            background-color: var(--kolma-red);
            color: white;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            border-radius: 10px;
            font-size: 20px;
            box-shadow: 0 4px 10px rgba(230, 0, 35, 0.2);
        }

        .product-card {
            transition: transform 0.2s ease;
        }
        .product-card:active {
            transform: scale(0.96);
        }

        .safe-bottom {
            padding-bottom: env(safe-area-inset-bottom);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-view { animation: fadeIn 0.4s ease-out; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- CONFIGURACIÓN DE SHOPIFY (TUS TOKENS INCLUIDOS) ---
        const SHOPIFY_CONFIG = {
            domain: 'q0q09e-cp.myshopify.com',
            accessToken: 'a171ee1eaf68d9b7ca5234b4c45a9b0c',
            version: '2024-01'
        };

        const API_URL = `https://${SHOPIFY_CONFIG.domain}/api/${SHOPIFY_CONFIG.version}/graphql.json`;

        // --- COMPONENTE DE ICONOS ---
        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        // --- APP PRINCIPAL ---
        const App = () => {
            const [view, setView] = useState('home');
            const [products, setProducts] = useState([]);
            const [cart, setCart] = useState([]);
            const [loading, setLoading] = useState(true);
            const [isCheckingOut, setIsCheckingOut] = useState(false);

            // Cargar productos de Shopify
            useEffect(() => {
                const getProducts = async () => {
                    const query = `
                    {
                      products(first: 20) {
                        edges {
                          node {
                            id
                            title
                            description
                            images(first: 1) { edges { node { url } } }
                            variants(first: 1) {
                              edges {
                                node {
                                  id
                                  price { amount }
                                }
                              }
                            }
                          }
                        }
                      }
                    }`;

                    try {
                        const response = await fetch(API_URL, {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'X-Shopify-Storefront-Access-Token': SHOPIFY_CONFIG.accessToken,
                            },
                            body: JSON.stringify({ query }),
                        });
                        const json = await response.json();
                        const fetchedProducts = json.data.products.edges.map(edge => ({
                            id: edge.node.id,
                            variantId: edge.node.variants.edges[0].node.id,
                            title: edge.node.title,
                            description: edge.node.description,
                            price: parseFloat(edge.node.variants.edges[0].node.price.amount),
                            image: edge.node.images.edges[0]?.node.url || 'https://via.placeholder.com/150'
                        }));
                        setProducts(fetchedProducts);
                    } catch (error) {
                        console.error("Error al cargar Shopify:", error);
                    } finally {
                        setLoading(false);
                    }
                };

                getProducts();
            }, []);

            // Checkout de Shopify
            const handleCheckout = async () => {
                if (cart.length === 0) return;
                setIsCheckingOut(true);

                const mutation = `
                mutation checkoutCreate($input: CheckoutCreateInput!) {
                  checkoutCreate(input: $input) {
                    checkout { webUrl }
                    checkoutUserErrors { message }
                  }
                }`;

                const variables = {
                    input: {
                        lineItems: cart.map(item => ({
                            variantId: item.variantId,
                            quantity: item.quantity
                        }))
                    }
                };

                try {
                    const response = await fetch(API_URL, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-Shopify-Storefront-Access-Token': SHOPIFY_CONFIG.accessToken,
                        },
                        body: JSON.stringify({ query: mutation, variables }),
                    });
                    const json = await response.json();
                    const checkoutUrl = json.data.checkoutCreate.checkout.webUrl;
                    window.location.href = checkoutUrl; // Redirigir a la pasarela de pago de Shopify
                } catch (error) {
                    console.error("Error en checkout:", error);
                    setIsCheckingOut(false);
                }
            };

            const addToCart = (product) => {
                setCart(prev => {
                    const exists = prev.find(i => i.id === product.id);
                    if (exists) {
                        return prev.map(i => i.id === product.id ? { ...i, quantity: i.quantity + 1 } : i);
                    }
                    return [...prev, { ...product, quantity: 1 }];
                });
            };

            const total = cart.reduce((acc, item) => acc + (item.price * item.quantity), 0);

            return (
                <div className="max-w-md mx-auto min-h-screen bg-white flex flex-col shadow-2xl">
                    
                    {/* Header con Logo KOLMA */}
                    <header className="sticky top-0 bg-white/90 backdrop-blur-md z-50 p-4 border-b border-gray-100 flex justify-between items-center">
                        <div className="flex items-center gap-3" onClick={() => setView('home')}>
                            <div className="kolma-logo-container">K</div>
                            <h1 className="font-extrabold text-xl tracking-tighter text-gray-900">KOLMA</h1>
                        </div>
                        <div className="flex items-center gap-4">
                            <button onClick={() => setView('cart')} className="relative p-2">
                                <Icon name="shopping-cart" className="text-gray-700" />
                                {cart.length > 0 && (
                                    <span className="absolute top-0 right-0 bg-[#E60023] text-white text-[10px] w-4 h-4 rounded-full flex items-center justify-center font-black">
                                        {cart.reduce((a, b) => a + b.quantity, 0)}
                                    </span>
                                )}
                            </button>
                        </div>
                    </header>

                    {/* Vistas */}
                    <main className="flex-grow pb-24">
                        {view === 'home' && (
                            <div className="p-4 animate-view">
                                <div className="bg-[#E60023] rounded-3xl p-6 text-white mb-8 shadow-xl relative overflow-hidden">
                                    <div className="relative z-10">
                                        <h2 className="text-2xl font-black italic uppercase leading-none mb-2">¡Fresco y Rápido!</h2>
                                        <p className="text-xs opacity-90 font-medium mb-4">Pide ahora en Cotuí y recibe en minutos.</p>
                                        <button className="bg-white text-[#E60023] px-5 py-2 rounded-full font-bold text-xs uppercase shadow-sm">Ofertas</button>
                                    </div>
                                    <div className="absolute -right-6 -bottom-6 opacity-10 rotate-12 scale-150">
                                        <div className="text-9xl font-black">K</div>
                                    </div>
                                </div>

                                <h3 className="font-extrabold text-lg mb-4 text-gray-800">Productos Destacados</h3>
                                
                                {loading ? (
                                    <div className="grid grid-cols-2 gap-4">
                                        {[1,2,3,4].map(i => <div key={i} className="h-48 bg-gray-100 animate-pulse rounded-2xl"></div>)}
                                    </div>
                                ) : (
                                    <div className="grid grid-cols-2 gap-4">
                                        {products.map(product => (
                                            <div key={product.id} className="product-card bg-white border border-gray-100 rounded-2xl p-3 shadow-sm flex flex-col">
                                                <div className="aspect-square mb-3 flex items-center justify-center">
                                                    <img src={product.image} className="max-h-full object-contain" alt={product.title} />
                                                </div>
                                                <h4 className="text-[11px] font-bold text-gray-700 line-clamp-2 h-8 leading-tight">{product.title}</h4>
                                                <div className="mt-3 flex justify-between items-center">
                                                    <span className="text-sm font-black text-[#E60023]">RD$ {product.price.toFixed(2)}</span>
                                                    <button 
                                                        onClick={() => addToCart(product)}
                                                        className="w-8 h-8 rounded-full bg-gray-50 flex items-center justify-center text-[#E60023] border border-red-50 active:bg-[#E60023] active:text-white transition-colors"
                                                    >
                                                        <Icon name="plus" size={16} />
                                                    </button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}

                        {view === 'cart' && (
                            <div className="p-4 animate-view">
                                <h2 className="text-xl font-extrabold mb-6">Tu Canasta</h2>
                                {cart.length === 0 ? (
                                    <div className="text-center py-20">
                                        <Icon name="shopping-bag" size={48} className="mx-auto text-gray-200 mb-4" />
                                        <p className="text-gray-400 font-bold">Está vacía por ahora...</p>
                                        <button onClick={() => setView('home')} className="mt-4 text-[#E60023] font-bold text-sm uppercase">Ir a la tienda</button>
                                    </div>
                                ) : (
                                    <div className="space-y-4">
                                        {cart.map(item => (
                                            <div key={item.id} className="flex items-center gap-4 bg-white p-3 rounded-2xl border border-gray-100">
                                                <img src={item.image} className="w-16 h-16 object-contain" />
                                                <div className="flex-grow">
                                                    <h4 className="text-xs font-bold">{item.title}</h4>
                                                    <div className="flex justify-between items-center mt-1">
                                                        <span className="text-[#E60023] font-black">RD$ {item.price.toFixed(2)}</span>
                                                        <span className="text-xs font-bold text-gray-400">Cant: {item.quantity}</span>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}

                                        <div className="mt-10 bg-gray-50 p-6 rounded-3xl border border-gray-100">
                                            <div className="flex justify-between mb-6">
                                                <span className="font-bold text-gray-500 uppercase text-xs tracking-widest">Total Estimado</span>
                                                <span className="text-2xl font-black text-gray-900">RD$ {total.toFixed(2)}</span>
                                            </div>
                                            <button 
                                                onClick={handleCheckout}
                                                disabled={isCheckingOut}
                                                className="w-full bg-[#E60023] text-white py-4 rounded-2xl font-black uppercase tracking-widest text-sm shadow-xl flex items-center justify-center gap-3 active:scale-95 transition-transform"
                                            >
                                                {isCheckingOut ? (
                                                    <div className="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
                                                ) : (
                                                    "Completar Orden"
                                                )}
                                            </button>
                                            <p className="text-[10px] text-center text-gray-400 mt-4 px-4 font-medium italic">
                                                Al completar la orden serás redirigido a la pasarela de pago segura de Shopify.
                                            </p>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}
                    </main>

                    {/* Barra de Navegación Inferior */}
                    <nav className="fixed bottom-0 w-full max-w-md bg-white border-t border-gray-100 p-3 flex justify-around safe-bottom z-50">
                        <button onClick={() => setView('home')} className={`p-2 ${view === 'home' ? 'text-[#E60023]' : 'text-gray-300'}`}>
                            <Icon name="home" />
                        </button>
                        <button onClick={() => setView('cart')} className={`p-2 ${view === 'cart' ? 'text-[#E60023]' : 'text-gray-300'}`}>
                            <Icon name="shopping-bag" />
                        </button>
                        <button className="p-2 text-gray-300">
                            <Icon name="user" />
                        </button>
                    </nav>

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
