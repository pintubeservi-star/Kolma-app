<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KOLMARD | Supermercado</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .active-nav { color: #dc2626; border-top: 3px solid #dc2626; }
        .product-card { transition: transform 0.1s ease; }
        .product-card:active { transform: scale(0.95); }
    </style>
</head>
<body class="bg-[#F8F9FA] pb-24">

    <header class="bg-red-600 pt-4 pb-6 px-5 sticky top-0 z-40 rounded-b-[2.5rem] shadow-xl">
        <div class="flex justify-between items-center mb-4 text-white">
            <div>
                <p class="text-[10px] opacity-80 uppercase tracking-widest font-bold">Bienvenido a</p>
                <h1 class="text-2xl font-extrabold italic">KOLMA<span class="text-yellow-400">RD</span></h1>
            </div>
            <div class="flex gap-3">
                <button onclick="toggleCart()" class="relative p-2 bg-white/20 rounded-full backdrop-blur-md">
                    <i data-lucide="shopping-basket" class="w-6 h-6"></i>
                    <span id="cart-badge" class="absolute -top-1 -right-1 bg-yellow-400 text-red-700 text-[10px] font-black rounded-full h-5 w-5 flex items-center justify-center hidden">0</span>
                </button>
            </div>
        </div>
        <div class="relative group">
            <input type="text" id="search" oninput="filterProducts()" placeholder="Busca arroz, leche, carnes..." 
                class="w-full p-4 pl-12 rounded-2xl border-none shadow-inner focus:ring-4 focus:ring-yellow-400/50 outline-none text-gray-800 font-medium">
            <i data-lucide="search" class="absolute left-4 top-4 text-gray-400"></i>
        </div>
    </header>

    <div class="px-5 mt-4 overflow-x-auto flex gap-3 no-scrollbar py-2">
        <button onclick="filterCategory('All')" class="bg-red-600 text-white px-6 py-2 rounded-full text-sm font-bold shadow-md shrink-0">Todo</button>
        <button onclick="filterCategory('Víveres')" class="bg-white text-gray-600 px-6 py-2 rounded-full text-sm font-bold shadow-sm shrink-0 border border-gray-100">Víveres</button>
        <button onclick="filterCategory('Carnes')" class="bg-white text-gray-600 px-6 py-2 rounded-full text-sm font-bold shadow-sm shrink-0 border border-gray-100">Carnes</button>
        <button onclick="filterCategory('Lácteos')" class="bg-white text-gray-600 px-6 py-2 rounded-full text-sm font-bold shadow-sm shrink-0 border border-gray-100">Lácteos</button>
    </div>

    <main class="px-5 mt-4">
        <h2 class="text-lg font-extrabold text-gray-800 mb-4 flex items-center gap-2">
            <span class="w-1.5 h-6 bg-red-600 rounded-full"></span> Ofertas del día
        </h2>
        <div id="grid" class="grid grid-cols-2 gap-4">
            <div class="col-span-2 text-center py-20">
                <div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-red-600 border-t-transparent"></div>
                <p class="mt-2 text-gray-400 font-bold">Sincronizando con Shopify...</p>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100 px-8 py-3 flex justify-between items-center z-50">
        <div class="flex flex-col items-center text-red-600">
            <i data-lucide="home" class="w-6 h-6"></i>
            <span class="text-[10px] font-bold mt-1">Inicio</span>
        </div>
        <div onclick="toggleCart()" class="flex flex-col items-center text-gray-400 hover:text-red-600 transition-colors">
            <i data-lucide="shopping-cart" class="w-6 h-6"></i>
            <span class="text-[10px] font-bold mt-1">Carrito</span>
        </div>
        <div class="flex flex-col items-center text-gray-400">
            <i data-lucide="user" class="w-6 h-6"></i>
            <span class="text-[10px] font-bold mt-1">Mi Cuenta</span>
        </div>
    </nav>

    <div id="cart-modal" class="fixed inset-0 bg-black/60 z-[60] hidden backdrop-blur-sm">
        <div class="bg-white w-full max-w-md ml-auto h-full flex flex-col animate-slide-in">
            <div class="p-6 bg-red-600 text-white flex justify-between items-center">
                <h2 class="text-xl font-bold flex items-center gap-2"><i data-lucide="package"></i> Mi Orden</h2>
                <button onclick="toggleCart()" class="text-3xl">&times;</button>
            </div>
            <div id="cart-items" class="flex-grow overflow-y-auto p-5 space-y-4"></div>
            <div class="p-6 border-t bg-gray-50 rounded-t-3xl shadow-2xl">
                <div class="flex justify-between text-2xl font-black mb-6 text-gray-800">
                    <span>Total</span>
                    <span id="cart-total" class="text-red-600">RD$0</span>
                </div>
                <button onclick="checkout()" class="w-full bg-green-500 py-5 rounded-2xl font-black text-white text-lg shadow-lg flex justify-center items-center gap-3">
                    COMPRAR POR WHATSAPP <i data-lucide="chevron-right"></i>
                </button>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN DE TU NEGOCIO
        const CONFIG = {
            shop: 'tu-tienda.myshopify.com', // Ej: kolmard.myshopify.com
            token: 'tu_token_aqui', // Tu Storefront Access Token
            whatsapp: '8295609147'
        };

        let products = [];
        let cart = [];

        async function init() {
            const query = `{
                products(first: 20) {
                    edges {
                        node {
                            id
                            title
                            description
                            images(first: 1) { edges { node { url } } }
                            variants(first: 1) { edges { node { price { amount } } } }
                        }
                    }
                }
            }`;

            try {
                const response = await fetch(`https://${CONFIG.shop}/api/2024-01/graphql.json`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-Shopify-Storefront-Access-Token': CONFIG.token },
                    body: JSON.stringify({ query })
                });
                const { data } = await response.json();
                products = data.products.edges.map(e => ({
                    id: e.node.id,
                    name: e.node.title,
                    price: parseFloat(e.node.variants.edges[0].node.price.amount),
                    image: e.node.images.edges[0]?.node.url || 'https://via.placeholder.com/150'
                }));
                render(products);
            } catch (err) {
                document.getElementById('grid').innerHTML = `<p class="col-span-2 text-red-500 font-bold">Error de conexión con Shopify. Revisa el Token.</p>`;
            }
        }

        function render(list) {
            const grid = document.getElementById('grid');
            grid.innerHTML = list.map(p => `
                <div class="product-card bg-white rounded-[2rem] p-4 shadow-sm flex flex-col border border-white">
                    <img src="${p.image}" class="w-full h-32 object-contain mb-3 drop-shadow-md">
                    <h3 class="text-xs font-bold text-gray-700 h-8 overflow-hidden">${p.name}</h3>
                    <div class="mt-3 flex justify-between items-center">
                        <span class="text-red-600 font-black text-sm">RD$${p.price.toLocaleString()}</span>
                        <button onclick="add('${p.id}')" class="bg-red-600 text-white p-2 rounded-xl shadow-lg shadow-red-200">
                            <i data-lucide="plus" class="w-4 h-4"></i>
                        </button>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function filterProducts() {
            const val = document.getElementById('search').value.toLowerCase();
            render(products.filter(p => p.name.toLowerCase().includes(val)));
        }

        function add(id) {
            const p = products.find(i => i.id === id);
            cart.push({ ...p, cid: Date.now() });
            update();
        }

        function update() {
            const list = document.getElementById('cart-items');
            const total = cart.reduce((s, i) => s + i.price, 0);
            const badge = document.getElementById('cart-badge');
            
            badge.innerText = cart.length;
            badge.classList.toggle('hidden', cart.length === 0);
            
            list.innerHTML = cart.map(i => `
                <div class="flex items-center gap-4 bg-gray-50 p-4 rounded-3xl relative">
                    <img src="${i.image}" class="w-16 h-16 object-contain">
                    <div class="flex-grow">
                        <p class="text-xs font-bold text-gray-800">${i.name}</p>
                        <p class="text-red-600 font-black">RD$${i.price}</p>
                    </div>
                    <button onclick="remove(${i.cid})" class="text-gray-300"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
                </div>
            `).join('');
            
            document.getElementById('cart-total').innerText = `RD$${total.toLocaleString()}`;
            lucide.createIcons();
        }

        function remove(cid) {
            cart = cart.filter(i => i.cid !== cid);
            update();
        }

        function toggleCart() { document.getElementById('cart-modal').classList.toggle('hidden'); }

        function checkout() {
            if (!cart.length) return;
            const items = cart.map(i => `• ${i.name} (RD$${i.price})`).join('%0A');
            const total = cart.reduce((s, i) => s + i.price, 0);
            const msg = `🛒 *KOLMARD - NUEVO PEDIDO*%0A%0A${items}%0A%0A💰 *TOTAL: RD$${total}*%0A%0A📍 _Favor confirmar disponibilidad._`;
            window.open(`https://wa.me/${CONFIG.whatsapp}?text=${msg}`, '_blank');
        }

        init();
        lucide.createIcons();
    </script>
</body>
</html>
