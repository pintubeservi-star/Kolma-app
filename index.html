<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOLMARD - Supermercado Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .cart-modal { transition: transform 0.3s ease-in-out; }
    </style>
</head>
<body class="bg-gray-50 pb-20">

    <header class="bg-red-600 text-white p-4 sticky top-0 z-50 shadow-lg">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold italic tracking-tighter">KOLMA<span class="text-yellow-400">RD</span></h1>
            <button onclick="toggleCart()" class="relative p-2 bg-red-700 rounded-full">
                <i data-lucide="shopping-cart"></i>
                <span id="cart-count" class="absolute -top-1 -right-1 bg-yellow-400 text-red-700 text-[10px] font-bold rounded-full h-5 w-5 flex items-center justify-center hidden">0</span>
            </button>
        </div>
    </header>

    <div class="p-4 max-w-4xl mx-auto">
        <div class="relative">
            <input type="text" id="search-input" oninput="filterProducts()" placeholder="¿Qué buscas hoy en Cotuí?" 
                class="w-full p-4 pl-12 rounded-2xl border-none shadow-sm focus:ring-2 focus:ring-red-500 outline-none">
            <i data-lucide="search" class="absolute left-4 top-4 text-gray-400 w-5 h-5"></i>
        </div>
    </div>

    <main id="product-grid" class="max-w-4xl mx-auto p-4 grid grid-cols-2 md:grid-cols-3 gap-4">
        <p class="col-span-2 text-center py-10 text-gray-400 italic">Conectando con el inventario...</p>
    </main>

    <div id="cart-modal" class="fixed inset-0 bg-black bg-opacity-50 z-[60] hidden flex justify-end">
        <div class="bg-white w-full max-w-md h-full flex flex-col shadow-2xl animate-slide-in">
            <div class="p-6 border-b flex justify-between items-center">
                <h2 class="text-xl font-bold text-red-600 flex items-center gap-2">
                    <i data-lucide="package"></i> Mi Carrito
                </h2>
                <button onclick="toggleCart()" class="text-gray-400 text-3xl">&times;</button>
            </div>
            <div id="cart-items" class="flex-grow overflow-y-auto p-6 space-y-4">
                </div>
            <div class="p-6 border-t bg-gray-50">
                <div class="flex justify-between text-xl font-bold mb-6">
                    <span>Total:</span>
                    <span id="cart-total" class="text-red-600">RD$0</span>
                </div>
                <button onclick="sendWhatsApp()" class="w-full bg-green-500 hover:bg-green-600 text-white py-4 rounded-2xl font-bold text-lg flex items-center justify-center gap-3 shadow-lg active:scale-95 transition-transform">
                    <i data-lucide="send"></i> PEDIR POR WHATSAPP
                </button>
            </div>
        </div>
    </div>

    <script>
        // --- CONFIGURACIÓN (Cambia tus datos aquí) ---
        const SHOPIFY_DOMAIN = 'tu-tienda.myshopify.com';
        const ACCESS_TOKEN = 'tu_token_aqui';
        const WHATSAPP_NUM = '8295609147';

        let allProducts = [];
        let cart = [];

        // 1. CARGAR PRODUCTOS DE SHOPIFY
        async function fetchShopify() {
            const query = `{
                products(first: 50) {
                    edges {
                        node {
                            id
                            title
                            images(first: 1) { edges { node { url } } }
                            variants(first: 1) { edges { node { price { amount } } } }
                        }
                    }
                }
            }`;

            try {
                const res = await fetch(`https://${SHOPIFY_DOMAIN}/api/2024-01/graphql.json`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-Shopify-Storefront-Access-Token': ACCESS_TOKEN },
                    body: JSON.stringify({ query })
                });
                const json = await res.json();
                allProducts = json.data.products.edges.map(e => ({
                    id: e.node.id,
                    name: e.node.title,
                    price: parseFloat(e.node.variants.edges[0].node.price.amount),
                    image: e.node.images.edges[0]?.node.url || 'https://via.placeholder.com/150'
                }));
                renderProducts(allProducts);
            } catch (err) {
                console.error("Error:", err);
                document.getElementById('product-grid').innerHTML = '<p class="col-span-2 text-center text-red-500">Error cargando productos. Verifica tus tokens.</p>';
            }
        }

        // 2. MOSTRAR PRODUCTOS
        function renderProducts(list) {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = list.map(p => `
                <div class="bg-white rounded-2xl p-3 shadow-sm border border-gray-100 flex flex-col">
                    <img src="${p.image}" class="w-full h-32 object-contain mb-3">
                    <h3 class="text-xs font-bold text-gray-700 h-8 overflow-hidden mb-1">${p.name}</h3>
                    <p class="text-red-600 font-black text-sm mb-3">RD$${p.price}</p>
                    <button onclick="addToCart('${p.id}')" class="w-full bg-red-600 text-white py-2 rounded-xl text-xs font-bold active:bg-red-800">AGREGAR</button>
                </div>
            `).join('');
            lucide.createIcons();
        }

        // 3. BUSCADOR
        function filterProducts() {
            const term = document.getElementById('search-input').value.toLowerCase();
            const filtered = allProducts.filter(p => p.name.toLowerCase().includes(term));
            renderProducts(filtered);
        }

        // 4. CARRITO
        function addToCart(id) {
            const product = allProducts.find(p => p.id === id);
            cart.push({ ...product, cartId: Date.now() });
            updateCart();
        }

        function removeFromCart(cartId) {
            cart = cart.filter(item => item.cartId !== cartId);
            updateCart();
        }

        function updateCart() {
            const list = document.getElementById('cart-items');
            const totalEl = document.getElementById('cart-total');
            const countEl = document.getElementById('cart-count');
            
            list.innerHTML = cart.map(item => `
                <div class="flex items-center justify-between bg-gray-50 p-3 rounded-xl">
                    <div class="flex items-center gap-3">
                        <img src="${item.image}" class="w-10 h-10 rounded shadow-inner">
                        <div>
                            <p class="text-xs font-bold">${item.name}</p>
                            <p class="text-xs text-red-500 font-bold">RD$${item.price}</p>
                        </div>
                    </div>
                    <button onclick="removeFromCart(${item.cartId})" class="text-gray-300 hover:text-red-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                </div>
            `).join('');

            const total = cart.reduce((sum, item) => sum + item.price, 0);
            totalEl.innerText = `RD$${total}`;
            countEl.innerText = cart.length;
            countEl.classList.toggle('hidden', cart.length === 0);
            lucide.createIcons();
        }

        function toggleCart() {
            document.getElementById('cart-modal').classList.toggle('hidden');
        }

        // 5. ENVIAR A WHATSAPP
        function sendWhatsApp() {
            if (cart.length === 0) return;
            const items = cart.map(i => `- ${i.name} (RD$${i.price})`).join('%0A');
            const total = cart.reduce((sum, item) => sum + item.price, 0);
            const text = `🛍️ *NUEVO PEDIDO - KOLMARD*%0A%0A${items}%0A%0A*TOTAL: RD$${total}*%0A%0A_Enviado desde la web_`;
            window.open(`https://wa.me/${WHATSAPP_NUM}?text=${text}`, '_blank');
        }

        // Iniciar todo
        fetchShopify();
        lucide.createIcons();
    </script>
</body>
</html>
