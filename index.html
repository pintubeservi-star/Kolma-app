<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KOLMARD | Professional Delivery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #F8FAFC; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .nav-dock { bottom: 20px; left: 20px; right: 20px; border-radius: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .side-panel { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); transform: translateX(100%); }
        .side-panel.active { transform: translateX(0); }
        .input-field { transition: all 0.2s ease; border: 2px solid #F1F5F9; }
        .input-field:focus { border-color: #E11D48; background: white; outline: none; }
        .loader { border-top-color: transparent; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="pb-32">

    <header class="sticky top-0 z-40 px-6 pt-12 pb-6 bg-white/80 backdrop-blur-xl border-b border-gray-100">
        <div class="flex justify-between items-center">
            <div>
                <span class="text-[10px] font-bold text-rose-500 uppercase tracking-widest mb-1 block">Cotuí Express</span>
                <h1 class="text-3xl font-black tracking-tighter text-gray-900 italic uppercase">KOLMA<span class="text-rose-600">RD</span></h1>
            </div>
            <div class="flex gap-3">
                <button onclick="toggleProfile()" class="p-3 bg-gray-50 rounded-2xl text-gray-500 relative">
                    <i data-lucide="user" class="w-6 h-6"></i>
                    <span id="user-dot" class="absolute top-2 right-2 w-2.5 h-2.5 bg-green-500 rounded-full border-2 border-white hidden"></span>
                </button>
            </div>
        </div>
    </header>

    <section class="px-6 mt-6">
        <div class="w-full h-36 bg-gradient-to-br from-rose-600 to-rose-500 rounded-[2.5rem] p-8 text-white relative overflow-hidden shadow-lg shadow-rose-100">
            <div class="relative z-10">
                <h2 class="text-2xl font-black leading-tight uppercase italic">Delivery Express</h2>
                <p class="text-white/80 text-xs mt-1 font-bold uppercase tracking-widest">En tu puerta en 30 min</p>
            </div>
            <i data-lucide="zap" class="absolute right-[-10px] top-[-10px] w-32 h-32 text-white/10 rotate-12"></i>
        </div>
    </section>

    <main class="px-6 mt-8">
        <div class="flex items-center justify-between mb-6">
            <h3 class="text-xl font-black text-gray-800 uppercase italic">Catálogo</h3>
            <span class="h-1 w-12 bg-rose-600 rounded-full"></span>
        </div>
        <div id="product-grid" class="grid grid-cols-2 gap-4"></div>
    </main>

    <nav class="fixed nav-dock glass flex justify-around items-center py-4 z-50">
        <button onclick="location.reload()" class="text-rose-600 p-2"><i data-lucide="home" class="w-6 h-6"></i></button>
        <button onclick="toggleCart()" class="bg-rose-600 text-white p-3 rounded-2xl shadow-lg relative -mt-8">
            <i data-lucide="shopping-cart" class="w-7 h-7"></i>
            <span id="cart-badge" class="absolute -top-1 -right-1 bg-yellow-400 text-rose-900 text-[10px] font-black h-5 w-5 rounded-full flex items-center justify-center border-2 border-white hidden">0</span>
        </button>
        <button onclick="toggleProfile()" class="text-gray-400 p-2"><i data-lucide="user" class="w-6 h-6"></i></button>
    </nav>

    <div id="profile-panel" class="fixed inset-0 z-[70] side-panel">
        <div class="absolute inset-0 bg-black/30 backdrop-blur-sm" onclick="toggleProfile()"></div>
        <div class="absolute right-0 top-0 bottom-0 w-[90%] max-w-md bg-white p-8 flex flex-col shadow-2xl">
            <div class="flex justify-between items-center mb-10">
                <h2 class="text-2xl font-black uppercase italic text-gray-900">Mi Cuenta</h2>
                <button onclick="toggleProfile()" class="p-2 bg-gray-50 rounded-xl"><i data-lucide="x" class="w-6 h-6 text-gray-400"></i></button>
            </div>
            
            <div id="auth-container" class="space-y-6">
                <div class="space-y-2">
                    <label class="text-[10px] font-bold uppercase text-gray-400 ml-2 tracking-widest">Correo Electrónico</label>
                    <input type="email" id="auth-email" placeholder="nombre@ejemplo.com" class="w-full p-4 bg-gray-50 rounded-2xl input-field font-bold">
                </div>
                <div class="space-y-2">
                    <label class="text-[10px] font-bold uppercase text-gray-400 ml-2 tracking-widest">Contraseña</label>
                    <input type="password" id="auth-pass" placeholder="••••••••" class="w-full p-4 bg-gray-50 rounded-2xl input-field font-bold">
                </div>
                
                <button onclick="handleAuth()" id="btn-auth" class="w-full bg-rose-600 hover:bg-rose-700 py-5 rounded-2xl text-white font-black uppercase tracking-tighter shadow-xl shadow-rose-100 flex justify-center items-center gap-2">
                    <span>Entrar a KolmaRD</span>
                </button>
                
                <p class="text-[10px] text-gray-400 text-center px-4 font-medium uppercase leading-relaxed">
                    Usa tu cuenta registrada para conectar tus datos de envío automáticamente.
                </p>
            </div>

            <div id="auth-welcome" class="hidden space-y-8">
                <div class="p-8 bg-gray-900 rounded-[2.5rem] text-white relative overflow-hidden">
                    <div class="relative z-10">
                        <p class="text-[10px] font-bold uppercase text-rose-500 mb-2">Cliente Conectado</p>
                        <p id="display-email" class="font-bold text-lg truncate"></p>
                    </div>
                    <i data-lucide="shield-check" class="absolute right-[-10px] bottom-[-10px] w-24 h-24 text-white/5"></i>
                </div>
                <div class="space-y-3">
                    <div class="flex items-center gap-4 p-5 bg-green-50 rounded-2xl border border-green-100">
                        <i data-lucide="check-circle" class="w-6 h-6 text-green-600"></i>
                        <div>
                            <p class="text-[10px] font-black uppercase text-green-700">Pasarela Sincronizada</p>
                            <p class="text-[9px] text-green-600 font-bold uppercase">Tus datos están listos para el pago.</p>
                        </div>
                    </div>
                </div>
                <button onclick="logout()" class="w-full py-4 border-2 border-gray-100 rounded-2xl font-bold text-gray-400 uppercase text-[10px] mt-auto">Cerrar Sesión</button>
            </div>
        </div>
    </div>

    <div id="cart-modal" class="fixed inset-0 bg-black/40 z-[60] hidden backdrop-blur-md flex items-end">
        <div class="absolute inset-0" onclick="toggleCart()"></div>
        <div class="relative bg-white w-full rounded-t-[3.5rem] p-8 max-h-[90vh] flex flex-col z-10 shadow-2xl">
            <div class="w-12 h-1 bg-gray-200 rounded-full mx-auto mb-6"></div>
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-2xl font-black uppercase italic tracking-tight">Mi Pedido</h2>
                <button onclick="toggleCart()" class="p-2 bg-gray-50 rounded-xl"><i data-lucide="x" class="w-6 h-6 text-gray-400"></i></button>
            </div>
            
            <div id="cart-items" class="flex-grow overflow-y-auto space-y-4 mb-8 pr-2"></div>
            
            <div class="flex justify-between items-center mb-6 px-2">
                <span class="text-gray-400 font-bold uppercase text-xs">Total del pedido</span>
                <span id="cart-total" class="text-3xl font-black text-rose-600 tracking-tighter">RD$0</span>
            </div>
            <button onclick="checkout()" id="btn-pay" class="w-full bg-rose-600 py-6 rounded-3xl font-black text-white text-lg uppercase italic shadow-2xl shadow-rose-200 flex justify-center items-center gap-3">
                <span>Completar Pedido</span>
                <i data-lucide="arrow-right" class="w-5 h-5"></i>
            </button>
        </div>
    </div>

    <script>
        const CONFIG = { shop: 'q0q09e-cp.myshopify.com', token: 'a171ee1eaf68d9b7ca5234b4c45a9b0c' };
        let allProducts = [], cart = JSON.parse(localStorage.getItem('kolmard_cart')) || [];

        async function initApp() {
            const query = `{ products(first: 50) { edges { node { id title images(first: 1) { edges { node { url } } } variants(first: 1) { edges { node { id price { amount } } } } } } } }`;
            try {
                const response = await fetch(`https://${CONFIG.shop}/api/2024-01/graphql.json`, { method: 'POST', headers: { 'Content-Type': 'application/json', 'X-Shopify-Storefront-Access-Token': CONFIG.token }, body: JSON.stringify({ query }) });
                const res = await response.json();
                allProducts = res.data.products.edges.map(e => ({ id: e.node.id, variantId: e.node.variants.edges[0].node.id, name: e.node.title, price: parseFloat(e.node.variants.edges[0].node.price.amount), image: e.node.images.edges[0]?.node.url || '' }));
                renderProducts(allProducts);
                updateCartUI();
                checkSession();
            } catch (e) { console.error("Error inicializando:", e); }
        }

        function renderProducts(list) {
            document.getElementById('product-grid').innerHTML = list.map(p => `
                <div class="bg-white p-5 rounded-[2.5rem] shadow-sm border border-gray-100 flex flex-col items-center">
                    <div class="h-28 w-28 flex items-center justify-center mb-4">
                        <img src="${p.image}" class="max-h-full max-w-full object-contain">
                    </div>
                    <div class="w-full">
                        <h3 class="text-[10px] font-black text-gray-800 uppercase truncate mb-2">${p.name}</h3>
                        <div class="flex justify-between items-center">
                            <span class="text-rose-600 font-black text-sm">RD$${p.price.toLocaleString()}</span>
                            <button onclick="addToCart('${p.id}')" class="bg-gray-900 text-white p-2.5 rounded-xl active:scale-90 transition-transform"><i data-lucide="plus" class="w-4 h-4"></i></button>
                        </div>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        // --- SISTEMA DE AUTENTICACIÓN PROFESIONAL ---
        async function handleAuth() {
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-pass').value;
            const btn = document.getElementById('btn-auth');
            
            if(!email.includes('@') || password.length < 5) return alert("Por favor ingresa un email y contraseña válidos.");
            
            btn.innerHTML = `<div class="w-5 h-5 border-2 border-white loader rounded-full"></div>`;
            btn.disabled = true;

            const query = `mutation { customerAccessTokenCreate(input: {email: "${email}", password: "${password}"}) { customerAccessToken { accessToken } customerUserErrors { message } } }`;

            try {
                const response = await fetch(`https://${CONFIG.shop}/api/2024-01/graphql.json`, { method: 'POST', headers: { 'Content-Type': 'application/json', 'X-Shopify-Storefront-Access-Token': CONFIG.token }, body: JSON.stringify({ query }) });
                const res = await response.json();
                const token = res.data.customerAccessTokenCreate.customerAccessToken?.accessToken;

                if(token) {
                    localStorage.setItem('k_token', token);
                    localStorage.setItem('k_email', email);
                    checkSession();
                    toggleProfile();
                } else {
                    alert("No pudimos conectar. Revisa tus credenciales o regístrate en KolmaRD.");
                    btn.innerHTML = "Entrar a KolmaRD";
                    btn.disabled = false;
                }
            } catch (e) { alert("Error de conexión con el servidor."); btn.disabled = false; }
        }

        function checkSession() {
            const token = localStorage.getItem('k_token');
            if(token) {
                document.getElementById('auth-container').classList.add('hidden');
                document.getElementById('auth-welcome').classList.remove('hidden');
                document.getElementById('display-email').innerText = localStorage.getItem('k_email');
                document.getElementById('user-dot').classList.remove('hidden');
            }
        }

        function logout() { localStorage.clear(); location.reload(); }
        function toggleProfile() { document.getElementById('profile-panel').classList.toggle('active'); }
        function toggleCart() { document.getElementById('cart-modal').classList.toggle('hidden'); }

        // --- CARRITO ---
        function addToCart(id) {
            const p = allProducts.find(i => i.id === id);
            cart.push({ ...p, cid: Date.now() });
            localStorage.setItem('kolmard_cart', JSON.stringify(cart));
            updateCartUI();
        }

        function updateCartUI() {
            const badge = document.getElementById('cart-badge');
            badge.innerText = cart.length; badge.classList.toggle('hidden', cart.length === 0);
            document.getElementById('cart-items').innerHTML = cart.map(i => `
                <div class="flex items-center gap-4 bg-gray-50 p-5 rounded-[2rem] border border-white">
                    <div class="flex-grow"><p class="text-[10px] font-black uppercase text-gray-900">${i.name}</p><p class="text-rose-600 font-black text-sm">RD$${i.price.toLocaleString()}</p></div>
                    <button onclick="removeFromCart(${i.cid})" class="text-gray-300 hover:text-rose-500"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
                </div>`).join('');
            document.getElementById('cart-total').innerText = `RD$${cart.reduce((s, i) => s + i.price, 0).toLocaleString()}`;
            lucide.createIcons();
        }

        function removeFromCart(cid) { cart = cart.filter(i => i.cid !== cid); localStorage.setItem('kolmard_cart', JSON.stringify(cart)); updateCartUI(); }

        // --- CHECKOUT PROFESIONAL ---
        async function checkout() {
            const token = localStorage.getItem('k_token');
            if(!token) {
                toggleCart();
                toggleProfile();
                alert("OBLIGATORIO: Inicia sesión para sincronizar tu pedido.");
                return;
            }

            const btn = document.getElementById('btn-pay');
            btn.innerHTML = `<div class="w-5 h-5 border-2 border-white loader rounded-full"></div> Sincronizando...`;
            btn.disabled = true;

            const lines = cart.map(item => ({ merchandiseId: item.variantId, quantity: 1 }));
            const mutation = `mutation { cartCreate(input: {
                buyerIdentity: { customerAccessToken: "${token}" },
                lines: ${JSON.stringify(lines).replace(/"([^"]+)":/g, '$1:')}
            }) { cart { checkoutUrl } } }`;
            
            try {
                const response = await fetch(`https://${CONFIG.shop}/api/2024-01/graphql.json`, { method: 'POST', headers: { 'Content-Type': 'application/json', 'X-Shopify-Storefront-Access-Token': CONFIG.token }, body: JSON.stringify({ query: mutation }) });
                const res = await response.json();
                if(res.data.cartCreate.cart.checkoutUrl) {
                    window.location.href = res.data.cartCreate.cart.checkoutUrl;
                }
            } catch (e) { btn.innerHTML = "Completar Pedido"; btn.disabled = false; }
        }

        initApp();
        lucide.createIcons();
    </script>
</body>
</html>
