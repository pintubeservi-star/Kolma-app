<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KOLMARD | Premium Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #F8FAFC; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(15px); border-top: 1px solid rgba(255, 255, 255, 0.5); }
        .nav-dock { bottom: 20px; left: 20px; right: 20px; border-radius: 28px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        .side-panel { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); transform: translateX(100%); }
        .side-panel.active { transform: translateX(0); }
        .loader { border-top-color: transparent; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        /* BANNER OSCURO PREMIUM */
        .dark-banner { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); position: relative; overflow: hidden; }
        .wallet-card { background: linear-gradient(135deg, #1e293b 0%, #020617 100%); }
    </style>
</head>
<body class="pb-40">

    <header class="sticky top-0 z-40 px-6 pt-10 pb-4 bg-white/90 backdrop-blur-md border-b border-slate-100">
        <div class="flex justify-between items-center mb-5">
            <div>
                <span class="text-[10px] font-black text-rose-600 uppercase tracking-widest block italic">Cotuí Digital</span>
                <h1 class="text-3xl font-black tracking-tighter text-slate-900 italic uppercase">KOLMA<span class="text-rose-600">RD</span></h1>
            </div>
            <div id="user-indicator" class="w-3 h-3 bg-slate-200 rounded-full border-2 border-white shadow-sm transition-colors"></div>
        </div>
        
        <div class="relative">
            <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
            <input type="text" id="search-input" oninput="filterProducts()" placeholder="Busca tu producto..." class="w-full bg-slate-100 p-4 pl-12 rounded-2xl outline-none font-bold text-slate-700 border-2 border-transparent focus:border-rose-200 transition-all">
        </div>
    </header>

    <section class="px-6 mt-6">
        <div class="w-full dark-banner rounded-[2.5rem] p-8 text-white shadow-2xl">
            <div class="relative z-10">
                <h2 class="text-2xl font-black uppercase italic leading-tight">Tu compra<br>en 45 minutos.</h2>
                <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest mt-2">Delivery Express en Cotuí</p>
            </div>
            <i data-lucide="zap" class="absolute right-[-10px] bottom-[-10px] w-32 h-32 text-white/5 rotate-12"></i>
        </div>
    </section>

    <main class="px-6 mt-8">
        <div id="product-grid" class="grid grid-cols-2 gap-4"></div>
    </main>

    <nav class="fixed nav-dock glass flex justify-around items-center py-4 z-[100]">
        <button onclick="location.reload()" class="text-slate-400 active:text-rose-600"><i data-lucide="home" class="w-6 h-6"></i></button>
        
        <button onclick="openWallet()" class="text-slate-400 active:text-rose-600 flex flex-col items-center">
            <i data-lucide="wallet" class="w-6 h-6"></i>
            <span class="text-[8px] font-black uppercase mt-1">Wallet</span>
        </button>

        <button onclick="toggleCart()" class="bg-rose-600 text-white p-4 rounded-2xl shadow-xl relative -mt-14 border-4 border-white active:scale-90 transition-transform">
            <i data-lucide="shopping-cart" class="w-6 h-6"></i>
            <span id="cart-badge" class="absolute -top-1 -right-1 bg-slate-900 text-white text-[10px] font-black h-5 w-5 rounded-full flex items-center justify-center border-2 border-white hidden">0</span>
        </button>

        <button onclick="toggleProfile()" class="text-slate-400 active:text-rose-600"><i data-lucide="user" class="w-6 h-6"></i></button>
    </nav>

    <div id="wallet-panel" class="fixed inset-0 z-[110] side-panel">
        <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onclick="closeWallet()"></div>
        <div class="absolute right-0 top-0 bottom-0 w-[90%] bg-white p-8 flex flex-col shadow-2xl">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-2xl font-black uppercase italic">Mi Billetera</h2>
                <button onclick="closeWallet()" class="text-3xl text-slate-300">&times;</button>
            </div>
            
            <div class="wallet-card p-7 rounded-[2.5rem] text-white shadow-2xl mb-6">
                <p class="text-[10px] font-bold uppercase opacity-50 mb-1 tracking-widest">Balance KolmaCard</p>
                <p class="text-4xl font-black italic tracking-tighter">RD$ 0.00</p>
                <div class="mt-12 flex justify-between items-center">
                    <p id="wallet-email" class="text-[9px] font-bold opacity-40 uppercase truncate w-40">Invitado</p>
                    <div class="w-8 h-5 bg-rose-600 rounded-sm"></div>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <button class="bg-slate-50 p-5 rounded-3xl border border-slate-100"><i data-lucide="plus" class="w-5 h-5 mx-auto mb-1 text-rose-500"></i><span class="text-[9px] font-black uppercase text-slate-500">Recargar</span></button>
                <button class="bg-slate-50 p-5 rounded-3xl border border-slate-100"><i data-lucide="history" class="w-5 h-5 mx-auto mb-1 text-slate-500"></i><span class="text-[9px] font-black uppercase text-slate-500">Movimientos</span></button>
            </div>
        </div>
    </div>

    <div id="profile-panel" class="fixed inset-0 z-[110] side-panel">
        <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onclick="toggleProfile()"></div>
        <div class="absolute right-0 top-0 bottom-0 w-[90%] bg-white p-8 flex flex-col shadow-2xl">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-2xl font-black uppercase italic">Perfil</h2>
                <button onclick="toggleProfile()" class="text-3xl text-slate-300">&times;</button>
            </div>

            <div id="auth-box" class="space-y-4">
                <input type="email" id="auth-email" placeholder="Correo" class="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none border-2 border-transparent focus:border-rose-500">
                <input type="password" id="auth-pass" placeholder="Contraseña" class="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none border-2 border-transparent focus:border-rose-500">
                <button onclick="ejecutarAuth()" id="btn-auth" class="w-full bg-slate-900 py-5 rounded-2xl text-white font-black uppercase shadow-lg">Entrar</button>
            </div>

            <div id="user-info" class="hidden space-y-6 text-center">
                <p id="display-email" class="text-lg font-black italic text-slate-800"></p>
                <button onclick="logout()" class="w-full py-4 border-2 border-slate-100 rounded-2xl font-bold text-slate-400 uppercase text-[10px]">Cerrar Sesión</button>
            </div>
        </div>
    </div>

    <div id="cart-modal" class="fixed inset-0 bg-slate-900/40 z-[120] hidden flex items-end">
        <div class="absolute inset-0" onclick="toggleCart()"></div>
        <div class="relative bg-white w-full rounded-t-[3rem] p-8 max-h-[85vh] flex flex-col">
            <h2 class="text-2xl font-black uppercase italic mb-6">Tu Pedido</h2>
            <div id="cart-items" class="flex-grow overflow-y-auto space-y-4 mb-6"></div>
            <div class="flex justify-between px-2 mb-6">
                <span class="text-slate-400 font-bold uppercase text-xs">Total</span>
                <span id="cart-total" class="text-3xl font-black text-rose-600">RD$0</span>
            </div>
            <button onclick="checkout()" class="w-full bg-rose-600 py-5 rounded-2xl font-black text-white text-lg uppercase shadow-xl">Finalizar</button>
        </div>
    </div>

    <script>
        const CONFIG = { shop: 'q0q09e-cp.myshopify.com', token: 'a171ee1eaf68d9b7ca5234b4c45a9b0c' };
        let allProducts = [], cart = JSON.parse(localStorage.getItem('kolmard_cart')) || [];

        async function loadShop() {
            const query = `{ products(first: 50) { edges { node { id title images(first: 1) { edges { node { url } } } variants(first: 1) { edges { node { id price { amount } } } } } } } }`;
            try {
                const response = await fetch(`https://${CONFIG.shop}/api/2024-01/graphql.json`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-Shopify-Storefront-Access-Token': CONFIG.token },
                    body: JSON.stringify({ query })
                });
                const res = await response.json();
                allProducts = res.data.products.edges.map(e => ({
                    id: e.node.id,
                    variantId: e.node.variants.edges[0].node.id,
                    name: e.node.title,
                    price: parseFloat(e.node.variants.edges[0].node.price.amount),
                    image: e.node.images.edges[0]?.node.url || ''
                }));
                renderProducts(allProducts);
                updateCartUI();
                checkUserStatus();
            } catch (err) { console.error("Error"); }
        }

        function renderProducts(list) {
            document.getElementById('product-grid').innerHTML = list.map(p => `
                <div class="bg-white p-4 rounded-[2.5rem] shadow-sm border border-slate-50 flex flex-col items-center">
                    <img src="${p.image}" class="w-20 h-20 object-contain mb-4">
                    <div class="w-full text-center">
                        <h3 class="text-[9px] font-black text-slate-800 uppercase truncate">${p.name}</h3>
                        <div class="flex justify-between items-center mt-3">
                            <span class="text-rose-600 font-black text-sm">RD$${p.price.toLocaleString()}</span>
                            <button onclick="addToCart('${p.id}')" class="bg-slate-900 text-white p-2 rounded-xl active:scale-90"><i data-lucide="plus" class="w-4 h-4"></i></button>
                        </div>
                    </div>
                </div>`).join('');
            lucide.createIcons();
        }

        function filterProducts() {
            const val = document.getElementById('search-input').value.toLowerCase();
            renderProducts(allProducts.filter(p => p.name.toLowerCase().includes(val)));
        }

        // WALLET LOGIC
        function openWallet() { 
            if(!localStorage.getItem('k_token')) { alert("Inicia sesión para ver tu Wallet"); toggleProfile(); }
            else { document.getElementById('wallet-panel').classList.add('active'); }
        }
        function closeWallet() { document.getElementById('wallet-panel').classList.remove('active'); }

        // PERFIL & AUTH
        function toggleProfile() { document.getElementById('profile-panel').classList.toggle('active'); }

        async function ejecutarAuth() {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;
            if(!email || !pass) return;

            const query = `mutation { customerAccessTokenCreate(input: {email: "${email}", password: "${pass}"}) { customerAccessToken { accessToken } } }`;
            const response = await fetch(`https://${CONFIG.shop}/api/2024-01/graphql.json`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-Shopify-Storefront-Access-Token': CONFIG.token },
                body: JSON.stringify({ query })
            });
            const res = await response.json();
            const token = res.data.customerAccessTokenCreate?.customerAccessToken?.accessToken;
            if(token) { localStorage.setItem('k_token', token); localStorage.setItem('k_email', email); location.reload(); }
            else alert("Error en los datos");
        }

        function checkUserStatus() {
            const token = localStorage.getItem('k_token');
            const email = localStorage.getItem('k_email');
            if(token) {
                document.getElementById('user-indicator').classList.replace('bg-slate-200', 'bg-green-500');
                document.getElementById('auth-box').classList.add('hidden');
                document.getElementById('user-info').classList.remove('hidden');
                document.getElementById('display-email').innerText = email;
                document.getElementById('wallet-email').innerText = email;
            }
        }

        function logout() { localStorage.clear(); location.reload(); }

        // CARRITO LOGIC
        function toggleCart() { document.getElementById('cart-modal').classList.toggle('hidden'); }
        function addToCart(id) {
            const p = allProducts.find(i => i.id === id);
            cart.push({ ...p, cid: Date.now() });
            localStorage.setItem('kolmard_cart', JSON.stringify(cart));
            updateCartUI();
        }
        function updateCartUI() {
            const badge = document.getElementById('cart-badge');
            badge.innerText = cart.length; badge.classList.toggle('hidden', cart.length === 0);
            document.getElementById('cart-items').innerHTML = cart.map(i => `
                <div class="flex items-center gap-4 bg-slate-50 p-4 rounded-3xl">
                    <img src="${i.image}" class="w-10 h-10 object-contain">
                    <div class="flex-grow"><p class="text-[9px] font-black uppercase">${i.name}</p><p class="text-rose-600 font-bold">RD$${i.price}</p></div>
                    <button onclick="removeFromCart(${i.cid})" class="text-slate-300"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
                </div>`).join('');
            document.getElementById('cart-total').innerText = `RD$${cart.reduce((s, i) => s + i.price, 0).toLocaleString()}`;
            lucide.createIcons();
        }
        function removeFromCart(cid) {
            cart = cart.filter(i => i.cid !== cid);
            localStorage.setItem('kolmard_cart', JSON.stringify(cart));
            updateCartUI();
        }

        async function checkout() {
            if(!localStorage.getItem('k_token')) { toggleCart(); toggleProfile(); return; }
            const lines = cart.map(item => ({ merchandiseId: item.variantId, quantity: 1 }));
            const mutation = `mutation { cartCreate(input: { lines: ${JSON.stringify(lines).replace(/"([^"]+)":/g, '$1:')} }) { cart { checkoutUrl } } }`;
            const response = await fetch(`https://${CONFIG.shop}/api/2024-01/graphql.json`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-Shopify-Storefront-Access-Token': CONFIG.token },
                body: JSON.stringify({ query: mutation })
            });
            const res = await response.json();
            if(res.data?.cartCreate?.cart?.checkoutUrl) window.location.href = res.data.cartCreate.cart.checkoutUrl;
        }

        loadShop();
        lucide.createIcons();
    </script>
</body>
</html>
