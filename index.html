<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>KOLMARD | Supermercado Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --rose-primary: #E11D48; }
        body { font-family: 'Outfit', sans-serif; background-color: #F8FAFC; -webkit-tap-highlight-color: transparent; user-select: none; }
        .animate-reveal { animation: fadeInUp 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; opacity: 0; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .glass-header { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); }
        .glass-dock { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(20px); border-top: 1px solid rgba(0,0,0,0.05); }
        .cat-pill.active { background: var(--rose-primary); color: white; box-shadow: 0 4px 12px rgba(225, 29, 72, 0.2); }
        .btn-touch:active { transform: scale(0.95); opacity: 0.8; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .side-panel { transition: transform 0.5s cubic-bezier(0.32, 0.72, 0, 1); }
        .slide-up { animation: slideUpAnim 0.4s cubic-bezier(0.32, 0.72, 0, 1) forwards; }
        @keyframes slideUpAnim { from { transform: translateY(100%); } to { transform: translateY(0); } }
    </style>
</head>
<body class="pb-32">

    <header class="sticky top-0 z-50 glass-header px-6 pt-10 pb-4">
        <div class="flex justify-between items-center mb-5">
            <div class="animate-reveal">
                <span class="text-rose-600 font-bold text-[9px] uppercase tracking-[0.25em] flex items-center gap-1">
                    <span class="w-1.5 h-1.5 bg-rose-600 rounded-full animate-pulse"></span> Supermercado Premium
                </span>
                <h1 class="text-2xl font-black text-gray-900 tracking-tighter italic uppercase">KOLMA<span class="text-rose-600">RD</span></h1>
            </div>
            <button onclick="toggleProfile()" class="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center relative border border-white btn-touch">
                <i data-lucide="user" class="w-5 h-5 text-gray-600"></i>
                <span id="user-dot" class="absolute top-0 right-0 w-2.5 h-2.5 bg-green-500 rounded-full border-2 border-white hidden"></span>
            </button>
        </div>
        <input type="text" id="search-input" oninput="filterProducts()" placeholder="Buscar en el súper..." class="w-full bg-gray-100 p-3.5 pl-5 rounded-xl outline-none font-medium text-sm focus:bg-white transition-all">
    </header>

    <section class="px-6 mt-4 animate-reveal">
        <div class="w-full h-32 bg-gray-900 rounded-[2rem] p-6 text-white relative overflow-hidden shadow-xl">
            <h2 class="text-xl font-black italic uppercase leading-none">Pide ahora mismo</h2>
            <p class="text-rose-500 text-[10px] font-black uppercase tracking-widest mt-1">¿Qué estás esperando?</p>
            <i data-lucide="zap" class="absolute right-6 top-1/2 -translate-y-1/2 w-12 h-12 text-white/5"></i>
        </div>
    </section>

    <main class="px-6 mt-8">
        <div id="product-grid" class="grid grid-cols-2 gap-4"></div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 glass-dock px-6 pt-3 pb-8 flex justify-between items-center z-[60]">
        <button onclick="location.reload()" class="btn-touch flex flex-col items-center gap-1 text-rose-600"><i data-lucide="home" class="w-5 h-5"></i><span class="text-[8px] font-black uppercase">Inicio</span></button>
        <button onclick="toggleWallet()" class="btn-touch flex flex-col items-center gap-1 text-gray-400"><i data-lucide="wallet" class="w-5 h-5"></i><span class="text-[8px] font-black uppercase">Wallet</span></button>
        <button onclick="toggleCart()" class="btn-touch bg-gray-900 text-white w-14 h-14 rounded-2xl shadow-xl relative -mt-10 border-4 border-white flex items-center justify-center"><i data-lucide="shopping-cart" class="w-5 h-5"></i><span id="cart-badge" class="absolute -top-1 -right-1 bg-rose-600 text-white text-[9px] font-black h-5 w-5 rounded-full flex items-center justify-center hidden">0</span></button>
        <button onclick="toggleProfile()" class="btn-touch flex flex-col items-center gap-1 text-gray-400"><i data-lucide="user-cog" class="w-5 h-5"></i><span class="text-[8px] font-black uppercase">Perfil</span></button>
    </nav>

    <div id="wallet-modal" class="fixed inset-0 z-[110] hidden flex-col justify-end">
        <div class="absolute inset-0 bg-black/50 backdrop-blur-sm" onclick="toggleWallet()"></div>
        <div class="relative bg-gray-50 w-full rounded-t-[2.5rem] p-6 shadow-2xl slide-up h-[75vh]">
            <div class="w-12 h-1.5 bg-gray-200 rounded-full mx-auto mb-6"></div>
            <div class="w-full bg-gradient-to-br from-gray-900 via-gray-800 to-black rounded-[2rem] p-6 text-white relative overflow-hidden mb-6 shadow-xl">
                <div class="relative z-10 flex flex-col gap-6">
                    <span class="text-[10px] font-black uppercase tracking-widest text-gray-400">Supermercado <span class="text-rose-500">VIP</span></span>
                    <div>
                        <p class="text-[9px] font-bold text-gray-400 uppercase tracking-widest">Balance Puntos</p>
                        <div class="flex items-end gap-2"><h3 class="text-4xl font-black italic">0</h3><span class="text-sm font-black text-rose-500">PTS</span></div>
                    </div>
                    <p id="wallet-name" class="text-sm font-black uppercase tracking-widest text-gray-200">Usuario Invitado</p>
                </div>
            </div>
            <div class="bg-white p-5 rounded-3xl border border-gray-100 flex items-start gap-4">
                <div class="bg-rose-50 w-10 h-10 rounded-xl flex items-center justify-center"><i data-lucide="gift" class="w-5 h-5 text-rose-600"></i></div>
                <p class="text-[11px] font-medium text-gray-500 leading-tight">Aquí estarán tus puntos. <strong class="text-gray-900">1 Punto = RD$1</strong> para tus compras.</p>
            </div>
        </div>
    </div>

    <div id="profile-panel" class="fixed inset-0 z-[100] side-panel translate-x-full">
        <div class="absolute inset-0 bg-black/40 backdrop-blur-md" onclick="toggleProfile()"></div>
        <div class="absolute right-0 top-0 bottom-0 w-[88%] bg-white p-8 rounded-l-[3rem] shadow-2xl overflow-y-auto">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-2xl font-black uppercase italic italic text-gray-900">Mi Cuenta</h2>
                <button onclick="toggleProfile()" class="w-10 h-10 bg-gray-50 rounded-full flex items-center justify-center text-gray-400"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>

            <div id="auth-box" class="space-y-6">
                <button onclick="loginWithGoogle()" class="btn-touch w-full flex items-center justify-center gap-4 bg-white border-2 border-gray-100 p-5 rounded-[1.8rem] shadow-sm">
                    <img src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png" class="w-5 h-5" alt="Google">
                    <span class="text-sm font-bold text-gray-800 uppercase">Seguir con Google</span>
                </button>

                <div class="flex items-center gap-4 py-2">
                    <div class="flex-grow h-px bg-gray-100"></div>
                    <span class="text-[9px] font-black text-gray-300 uppercase tracking-widest">o con tu email</span>
                    <div class="flex-grow h-px bg-gray-100"></div>
                </div>

                <div class="space-y-4">
                    <div id="reg-name-field" class="hidden"><input type="text" id="auth-fname" placeholder="Nombre" class="w-full p-4 bg-gray-50 rounded-2xl outline-none text-sm font-bold"></div>
                    <input type="email" id="auth-email" placeholder="Email" class="w-full p-4 bg-gray-50 rounded-2xl outline-none text-sm font-bold">
                    <input type="password" id="auth-pass" placeholder="Contraseña" class="w-full p-4 bg-gray-50 rounded-2xl outline-none text-sm font-bold">
                    <button onclick="handleAuthSubmit()" id="btn-main-auth" class="btn-touch w-full bg-rose-600 py-5 rounded-[1.8rem] text-white font-black uppercase italic shadow-lg shadow-rose-200">Iniciar Sesión</button>
                </div>
                <button id="switch-to-reg" onclick="switchAuth('register')" class="w-full text-[10px] font-black text-rose-600 uppercase text-center">¿No tienes cuenta? Regístrate</button>
                <button id="switch-to-login" onclick="switchAuth('login')" class="hidden w-full text-[10px] font-black text-gray-900 uppercase text-center">Volver al Login</button>
            </div>

            <div id="auth-welcome" class="hidden space-y-6">
                <div class="p-8 bg-gray-900 rounded-[2.5rem] text-white">
                    <p class="text-[10px] font-black uppercase text-rose-500 mb-2">Bienvenido</p>
                    <p id="display-name" class="font-black text-xl italic uppercase truncate"></p>
                </div>
                <button onclick="logout()" class="w-full py-5 bg-gray-50 rounded-2xl font-black text-gray-400 uppercase text-[10px]">Cerrar Sesión</button>
            </div>
        </div>
    </div>

    <div id="cart-modal" class="fixed inset-0 bg-black/60 z-[110] hidden flex items-end">
        <div class="absolute inset-0" onclick="toggleCart()"></div>
        <div class="relative bg-white w-full rounded-t-[3rem] p-8 max-h-[85vh] flex flex-col shadow-2xl">
            <div id="cart-items" class="flex-grow overflow-y-auto space-y-4 no-scrollbar mb-6"></div>
            <div class="bg-gray-50 p-6 rounded-[2rem]">
                <div class="flex justify-between items-center mb-4"><span class="font-black uppercase italic">Total</span><span id="cart-total" class="text-2xl font-black text-rose-600">RD$0</span></div>
                <button onclick="checkout()" class="btn-touch w-full bg-rose-600 py-5 rounded-2xl font-black text-white uppercase italic shadow-xl">Pagar Ahora</button>
            </div>
        </div>
    </div>

    <script>
        const CONFIG = { shop: 'q0q09e-cp.myshopify.com', token: 'a171ee1eaf68d9b7ca5234b4c45a9b0c' };
        let allProducts = [], cart = JSON.parse(localStorage.getItem('kolmard_cart')) || [], currentMode = 'login';

        async function initApp() {
            const query = `{ products(first: 50) { edges { node { id title images(first: 1) { edges { node { url } } } variants(first: 1) { edges { node { id price { amount } } } } } } } }`;
            const response = await fetch(`https://${CONFIG.shop}/api/2024-01/graphql.json`, { method: 'POST', headers: { 'Content-Type': 'application/json', 'X-Shopify-Storefront-Access-Token': CONFIG.token }, body: JSON.stringify({ query }) });
            const res = await response.json();
            allProducts = res.data.products.edges.map(e => ({ id: e.node.id, variantId: e.node.variants.edges[0].node.id, name: e.node.title, price: parseFloat(e.node.variants.edges[0].node.price.amount), image: e.node.images.edges[0]?.node.url || '' }));
            renderProducts(allProducts);
            updateCartUI();
            checkSession();
        }

        function renderProducts(list) {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = list.map(p => `
                <div class="bg-white p-3 rounded-3xl border border-gray-50 shadow-sm flex flex-col">
                    <div class="relative aspect-square mb-2 bg-gray-50 rounded-2xl flex items-center justify-center">
                        <img src="${p.image}" class="max-w-full max-h-full object-contain">
                        <button onclick="addToCart('${p.id}')" class="absolute bottom-2 right-2 bg-gray-900 text-white w-8 h-8 rounded-lg flex items-center justify-center btn-touch"><i data-lucide="plus" class="w-4 h-4"></i></button>
                    </div>
                    <h3 class="text-[9px] font-bold text-gray-700 uppercase truncate">${p.name}</h3>
                    <p class="text-rose-600 font-black text-xs italic">RD$${p.price.toLocaleString()}</p>
                </div>
            `).join('');
            lucide.createIcons();
        }

        // --- LÓGICA DE GOOGLE ---
        function loginWithGoogle() {
            // Redirige al login de Shopify pero fuerza el retorno a tu app
            const returnUrl = window.location.href;
            window.location.href = `https://${CONFIG.shop}/account/login?return_to=${encodeURIComponent(returnUrl)}`;
        }

        async function handleAuthSubmit() {
            const email = document.getElementById('auth-email').value, pass = document.getElementById('auth-pass').value;
            if(!email || !pass) return alert("Completa los datos");
            const query = currentMode === 'login' 
                ? `mutation { customerAccessTokenCreate(input: {email: "${email}", password: "${pass}"}) { customerAccessToken { accessToken } customerUserErrors { message } } }`
                : `mutation { customerCreate(input: {firstName: "${document.getElementById('auth-fname').value}", email: "${email}", password: "${pass}"}) { customer { id } customerUserErrors { message } } }`;
            
            const response = await fetch(`https://${CONFIG.shop}/api/2024-01/graphql.json`, { method: 'POST', headers: { 'Content-Type': 'application/json', 'X-Shopify-Storefront-Access-Token': CONFIG.token }, body: JSON.stringify({ query }) });
            const res = await response.json();
            const auth = res.data.customerAccessTokenCreate || res.data.customerCreate;

            if (auth?.customerAccessToken) {
                localStorage.setItem('k_token', auth.customerAccessToken.accessToken);
                await fetchCustomerName(auth.customerAccessToken.accessToken);
                location.reload();
            } else if(currentMode === 'register' && !auth.customerUserErrors.length) {
                alert("¡Cuenta creada!"); switchAuth('login');
            } else alert("Error en los datos.");
        }

        async function fetchCustomerName(token) {
            const query = `query { customer(customerAccessToken: "${token}") { firstName email } }`;
            const response = await fetch(`https://${CONFIG.shop}/api/2024-01/graphql.json`, { method: 'POST', headers: { 'Content-Type': 'application/json', 'X-Shopify-Storefront-Access-Token': CONFIG.token }, body: JSON.stringify({ query }) });
            const res = await response.json();
            if(res.data.customer) {
                localStorage.setItem('k_name', res.data.customer.firstName);
                localStorage.setItem('k_email', res.data.customer.email);
            }
        }

        function checkSession() {
            const token = localStorage.getItem('k_token'), name = localStorage.getItem('k_name');
            if(token) {
                document.getElementById('auth-box').classList.add('hidden');
                document.getElementById('auth-welcome').classList.remove('hidden');
                document.getElementById('display-name').innerText = name || 'Usuario';
                document.getElementById('wallet-name').innerText = name || 'Usuario';
                document.getElementById('user-dot').classList.remove('hidden');
            }
        }

        async function checkout() {
            const token = localStorage.getItem('k_token');
            if(!token) return alert("Inicia sesión para pagar");
            const lines = cart.map(item => ({ merchandiseId: item.variantId, quantity: 1 }));
            const query = `mutation { cartCreate(input: { buyerIdentity: { customerAccessToken: "${token}" }, lines: ${JSON.stringify(lines).replace(/"([^"]+)":/g, '$1:')} }) { cart { checkoutUrl } } }`;
            const response = await fetch(`https://${CONFIG.shop}/api/2024-01/graphql.json`, { method: 'POST', headers: { 'Content-Type': 'application/json', 'X-Shopify-Storefront-Access-Token': CONFIG.token }, body: JSON.stringify({ query }) });
            const res = await response.json();
            if(res.data.cartCreate.cart.checkoutUrl) window.location.href = res.data.cartCreate.cart.checkoutUrl;
        }

        function updateCartUI() {
            const total = cart.reduce((s, i) => s + i.price, 0);
            document.getElementById('cart-badge').innerText = cart.length;
            document.getElementById('cart-badge').classList.toggle('hidden', cart.length === 0);
            document.getElementById('cart-total').innerText = `RD$${total.toLocaleString()}`;
            document.getElementById('cart-items').innerHTML = cart.map(i => `<div class="flex items-center gap-4 bg-gray-50 p-4 rounded-3xl"><img src="${i.image}" class="w-10 h-10 object-contain"><p class="text-[10px] font-black uppercase flex-grow truncate">${i.name}</p><button onclick="removeFromCart(${i.cid})" class="text-gray-300"><i data-lucide="trash-2" class="w-4 h-4"></i></button></div>`).join('');
            lucide.createIcons();
        }

        function addToCart(id) { cart.push({ ...allProducts.find(i => i.id === id), cid: Date.now() }); localStorage.setItem('kolmard_cart', JSON.stringify(cart)); updateCartUI(); }
        function removeFromCart(cid) { cart = cart.filter(i => i.cid !== cid); localStorage.setItem('kolmard_cart', JSON.stringify(cart)); updateCartUI(); }
        function toggleProfile() { document.getElementById('profile-panel').classList.toggle('translate-x-full'); }
        function toggleCart() { document.getElementById('cart-modal').classList.toggle('hidden'); }
        function toggleWallet() { const m = document.getElementById('wallet-modal'); m.classList.toggle('hidden'); m.classList.toggle('flex'); }
        function logout() { localStorage.clear(); location.reload(); }
        function switchAuth(m) { currentMode = m; document.getElementById('reg-name-field').classList.toggle('hidden', m!=='register'); document.getElementById('switch-to-reg').classList.toggle('hidden', m==='register'); document.getElementById('switch-to-login').classList.toggle('hidden', m==='login'); }

        initApp();
    </script>
</body>
</html>
