<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>KOLMA Supermercado</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f9fafb; margin: 0; overflow-x: hidden; }
        .kolma-red { background-color: #E60023; }
        .kolma-text { color: #E60023; }
        .logo-box { background-color: #E60023; color: white; display: flex; align-items: center; justify-content: center; font-weight: 800; border-radius: 8px; width: 35px; height: 35px; }
        .page-enter { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        input:focus { border-color: #E60023; outline: none; box-shadow: 0 0 0 2px rgba(230, 0, 35, 0.1); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Configuración de conexión privada
        const CONFIG = {
            endpoint: 'https://q0q09e-cp.myshopify.com/api/2024-01/graphql.json',
            token: 'a171ee1eaf68d9b7ca5234b4c45a9b0c'
        };

        const Icon = ({ name, size = 22, className = "" }) => {
            useEffect(() => { if(window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const App = () => {
            const [view, setView] = useState('home'); 
            const [authMode, setAuthMode] = useState('login'); // login o register
            const [products, setProducts] = useState([]);
            const [selectedProduct, setSelectedProduct] = useState(null);
            const [cart, setCart] = useState([]);
            const [loading, setLoading] = useState(true);
            const [actionLoading, setActionLoading] = useState(false);
            
            // Datos de Usuario
            const [user, setUser] = useState(null);
            const [formData, setFormData] = useState({ 
                email: '', 
                password: '', 
                firstName: '', 
                lastName: '' 
            });
            const [errorMsg, setErrorMsg] = useState('');

            // Cargar Catálogo
            useEffect(() => {
                const fetchItems = async () => {
                    const query = `{
                        products(first: 25) {
                            edges {
                                node {
                                    id
                                    title
                                    description
                                    images(first: 1) { edges { node { url } } }
                                    variants(first: 1) { edges { node { id, price { amount } } } }
                                }
                            }
                        }
                    }`;
                    try {
                        const res = await fetch(CONFIG.endpoint, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json', 'X-Shopify-Storefront-Access-Token': CONFIG.token },
                            body: JSON.stringify({ query })
                        });
                        const { data } = await res.json();
                        setProducts(data.products.edges.map(e => ({
                            id: e.node.id,
                            variantId: e.node.variants.edges[0].node.id,
                            title: e.node.title,
                            description: e.node.description,
                            price: parseFloat(e.node.variants.edges[0].node.price.amount),
                            image: e.node.images.edges[0]?.node.url
                        })));
                    } catch (e) { console.error("Error de red"); }
                    setLoading(false);
                };
                fetchItems();
                
                const savedUser = localStorage.getItem('kolma_session');
                if (savedUser) setUser(JSON.parse(savedUser));
            }, []);

            // Registro de Usuario
            const handleRegister = async (e) => {
                e.preventDefault();
                setErrorMsg('');
                setActionLoading(true);
                
                const query = `mutation customerCreate($input: CustomerCreateInput!) {
                    customerCreate(input: $input) {
                        customer { id, email }
                        customerUserErrors { message }
                    }
                }`;

                try {
                    const res = await fetch(CONFIG.endpoint, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'X-Shopify-Storefront-Access-Token': CONFIG.token },
                        body: JSON.stringify({ query, variables: { input: {
                            email: formData.email,
                            password: formData.password,
                            firstName: formData.firstName,
                            lastName: formData.lastName
                        }}})
                    });
                    const { data } = await res.json();
                    
                    if (data.customerCreate.customerUserErrors.length > 0) {
                        setErrorMsg(data.customerCreate.customerUserErrors[0].message);
                    } else {
                        // Después de crear, logueamos automáticamente
                        handleLogin(e);
                    }
                } catch (e) { setErrorMsg("Error al conectar con el servidor."); }
                setActionLoading(false);
            };

            // Inicio de Sesión
            const handleLogin = async (e) => {
                e.preventDefault();
                setErrorMsg('');
                setActionLoading(true);

                const query = `mutation customerAccessTokenCreate($input: CustomerAccessTokenCreateInput!) {
                    customerAccessTokenCreate(input: $input) {
                        customerAccessToken { accessToken }
                        customerUserErrors { message }
                    }
                }`;

                try {
                    const res = await fetch(CONFIG.endpoint, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'X-Shopify-Storefront-Access-Token': CONFIG.token },
                        body: JSON.stringify({ query, variables: { input: { email: formData.email, password: formData.password } } })
                    });
                    const { data } = await res.json();
                    
                    if (data.customerAccessTokenCreate.customerAccessToken) {
                        const token = data.customerAccessTokenCreate.customerAccessToken.accessToken;
                        const userDataQuery = `{ customer(customerAccessToken: "${token}") { firstName, lastName, email } }`;
                        const resUser = await fetch(CONFIG.endpoint, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json', 'X-Shopify-Storefront-Access-Token': CONFIG.token },
                            body: JSON.stringify({ query: userDataQuery })
                        });
                        const userRes = await resUser.json();
                        const finalUser = { ...userRes.data.customer, token };
                        setUser(finalUser);
                        localStorage.setItem('kolma_session', JSON.stringify(finalUser));
                        setView('home');
                    } else {
                        setErrorMsg("Los datos no coinciden con nuestros registros.");
                    }
                } catch (e) { setErrorMsg("Error de conexión."); }
                setActionLoading(false);
            };

            const handleLogout = () => {
                setUser(null);
                localStorage.removeItem('kolma_session');
                setView('home');
            };

            // Finalizar Pedido
            const goCheckout = async () => {
                if (cart.length === 0) return;
                setActionLoading(true);
                
                const mutation = `mutation checkoutCreate($input: CheckoutCreateInput!) {
                    checkoutCreate(input: $input) {
                        checkout { webUrl }
                    }
                }`;
                
                const variables = { 
                    input: { 
                        email: user ? user.email : null,
                        lineItems: cart.map(i => ({ variantId: i.variantId, quantity: i.qty })) 
                    } 
                };

                try {
                    const res = await fetch(CONFIG.endpoint, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'X-Shopify-Storefront-Access-Token': CONFIG.token },
                        body: JSON.stringify({ query: mutation, variables })
                    });
                    const { data } = await res.json();
                    if (data?.checkoutCreate?.checkout?.webUrl) {
                        window.location.href = data.checkoutCreate.checkout.webUrl;
                    }
                } catch (e) { setActionLoading(false); }
            };

            return (
                <div className="max-w-md mx-auto min-h-screen bg-white flex flex-col shadow-2xl relative">
                    {/* BARRA SUPERIOR */}
                    <header className="p-4 border-b flex justify-between items-center sticky top-0 bg-white z-50">
                        <div className="flex items-center gap-2 cursor-pointer" onClick={() => setView('home')}>
                            <div className="logo-box">K</div>
                            <span className="font-extrabold text-xl tracking-tighter uppercase">KOLMA</span>
                        </div>
                        <button onClick={() => setView('cart')} className="relative p-2">
                            <Icon name="shopping-basket" />
                            {cart.length > 0 && <span className="absolute top-0 right-0 bg-[#E60023] text-white text-[10px] w-4 h-4 rounded-full flex items-center justify-center font-bold">{cart.reduce((a,b)=>a+b.qty,0)}</span>}
                        </button>
                    </header>

                    <main className="flex-grow pb-24 no-scrollbar">
                        
                        {/* VISTA: INICIO */}
                        {view === 'home' && (
                            <div className="p-4 page-enter">
                                <div className="kolma-red p-6 rounded-3xl text-white mb-6 shadow-lg">
                                    <h2 className="text-2xl font-black italic uppercase leading-none">Cotuí Market</h2>
                                    <p className="text-xs opacity-90 mt-1">Calidad garantizada en cada producto.</p>
                                </div>
                                
                                <div className="grid grid-cols-2 gap-4">
                                    {loading ? [1,2,3,4].map(i => <div key={i} className="h-40 bg-gray-100 animate-pulse rounded-2xl"></div>) : 
                                        products.map(p => (
                                            <div key={p.id} className="bg-white border rounded-2xl p-3 shadow-sm active:scale-95 transition-transform" onClick={() => { setSelectedProduct(p); setView('detail'); }}>
                                                <img src={p.image} className="h-28 mx-auto object-contain mb-2" />
                                                <h4 className="text-[11px] font-bold h-8 line-clamp-2">{p.title}</h4>
                                                <p className="kolma-text font-black text-sm mt-2">RD$ {p.price.toFixed(2)}</p>
                                            </div>
                                        ))
                                    }
                                </div>
                            </div>
                        )}

                        {/* VISTA: DETALLE */}
                        {view === 'detail' && selectedProduct && (
                            <div className="page-enter p-6">
                                <button onClick={() => setView('home')} className="mb-4 flex items-center gap-1 text-sm font-bold text-gray-400"><Icon name="arrow-left" size={16}/> Volver</button>
                                <img src={selectedProduct.image} className="max-h-64 mx-auto object-contain mb-6" />
                                <h2 className="text-2xl font-extrabold">{selectedProduct.title}</h2>
                                <p className="text-3xl font-black kolma-text mt-2">RD$ {selectedProduct.price.toFixed(2)}</p>
                                <div className="mt-6 p-4 bg-gray-50 rounded-2xl text-sm text-gray-600 italic">
                                    {selectedProduct.description || "Producto disponible para entrega rápida en Cotuí."}
                                </div>
                                <button onClick={() => { 
                                    const exists = cart.find(i => i.id === selectedProduct.id);
                                    if (exists) setCart(cart.map(i => i.id === selectedProduct.id ? {...i, qty: i.qty+1} : i));
                                    else setCart([...cart, {...selectedProduct, qty: 1}]);
                                    setView('cart');
                                }} className="w-full kolma-red text-white py-5 rounded-2xl font-extrabold text-lg mt-8 shadow-xl active:opacity-90">
                                    Añadir a la Canasta
                                </button>
                            </div>
                        )}

                        {/* VISTA: CARRITO */}
                        {view === 'cart' && (
                            <div className="p-4 page-enter">
                                <h2 className="text-xl font-extrabold mb-6 flex items-center gap-2"><Icon name="shopping-bag" className="kolma-text"/> Mi Carrito</h2>
                                {cart.length === 0 ? (
                                    <div className="py-20 text-center opacity-20 font-bold uppercase tracking-widest text-xs">Tu canasta está vacía</div>
                                ) : (
                                    <>
                                        {cart.map(item => (
                                            <div key={item.id} className="flex items-center gap-4 bg-white p-3 rounded-2xl border mb-3">
                                                <img src={item.image} className="w-14 h-14 object-contain" />
                                                <div className="flex-grow">
                                                    <h4 className="text-xs font-bold line-clamp-1">{item.title}</h4>
                                                    <p className="kolma-text font-bold text-xs">RD$ {item.price.toFixed(2)}</p>
                                                </div>
                                                <div className="flex items-center gap-2">
                                                    <button onClick={() => setCart(cart.map(i => i.id === item.id ? {...i, qty: Math.max(0, i.qty-1)} : i).filter(i => i.qty > 0))} className="w-7 h-7 bg-gray-100 rounded-full flex items-center justify-center font-bold">-</button>
                                                    <span className="text-xs font-bold w-4 text-center">{item.qty}</span>
                                                    <button onClick={() => setCart(cart.map(i => i.id === item.id ? {...i, qty: i.qty+1} : i))} className="w-7 h-7 bg-gray-100 rounded-full flex items-center justify-center font-bold">+</button>
                                                </div>
                                            </div>
                                        ))}
                                        <div className="mt-8 bg-gray-50 p-6 rounded-3xl">
                                            <div className="flex justify-between font-black text-xl mb-6"><span>Total:</span><span>RD$ {cart.reduce((a,b)=>a+(b.price*b.qty),0).toFixed(2)}</span></div>
                                            <button onClick={goCheckout} disabled={actionLoading} className="w-full kolma-red text-white py-5 rounded-2xl font-black uppercase text-sm shadow-xl flex items-center justify-center gap-2">
                                                {actionLoading ? "Cargando..." : "Realizar Pedido"}
                                            </button>
                                        </div>
                                    </>
                                )}
                            </div>
                        )}

                        {/* VISTA: MI CUENTA / REGISTRO */}
                        {view === 'profile' && (
                            <div className="p-6 page-enter">
                                {user ? (
                                    <div className="text-center">
                                        <div className="w-24 h-24 bg-red-50 rounded-full mx-auto mb-4 flex items-center justify-center border-2 border-[#E60023]">
                                            <Icon name="user" size={40} className="text-[#E60023]" />
                                        </div>
                                        <h2 className="text-2xl font-black">{user.firstName} {user.lastName}</h2>
                                        <p className="text-xs text-gray-400 font-bold uppercase tracking-widest">{user.email}</p>
                                        <div className="mt-10 space-y-3">
                                            <button className="w-full p-5 bg-gray-50 rounded-2xl text-left text-xs font-bold flex justify-between items-center">Historial de Compras <Icon name="chevron-right" size={14}/></button>
                                            <button className="w-full p-5 bg-gray-50 rounded-2xl text-left text-xs font-bold flex justify-between items-center">Direcciones Guardadas <Icon name="chevron-right" size={14}/></button>
                                            <button onClick={handleLogout} className="w-full p-4 text-[#E60023] font-black text-xs uppercase mt-8">Cerrar Sesión</button>
                                        </div>
                                    </div>
                                ) : (
                                    <div>
                                        <h2 className="text-3xl font-black mb-1 uppercase tracking-tighter">Mi Cuenta</h2>
                                        <p className="text-xs text-gray-400 mb-8 italic">Gestione sus pedidos y datos personales.</p>
                                        
                                        <div className="flex gap-2 mb-8 bg-gray-100 p-1 rounded-xl">
                                            <button onClick={() => setAuthMode('login')} classNam
