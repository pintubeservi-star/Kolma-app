<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>KOLMA Supermercado - RD</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        .safe-top { padding-top: env(safe-area-inset-top); }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
        
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .animate-fade-in { animation: fadeIn 0.3s ease-out; }
        
        @keyframes slideUp { 
            from { transform: translateY(20px); opacity: 0; } 
            to { transform: translateY(0); opacity: 1; } 
        }
        .animate-slide-up { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }

        .glass-nav {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .kolma-logo-box {
            background-color: #E60023;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            border-radius: 8px;
        }
    </style>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, createContext, useContext, useMemo } = React;

        // --- CONFIGURACIÓN DE SHOPIFY ---
        const SHOPIFY_DOMAIN = 'q0q09e-cp.myshopify.com';
        const STOREFRONT_ACCESS_TOKEN = 'a171ee1eaf68d9b7ca5234b4c45a9b0c';
        const API_VERSION = '2024-01'; 
        const ENDPOINT = `https://${SHOPIFY_DOMAIN}/api/${API_VERSION}/graphql.json`;

        // --- UTILIDADES ---
        const formatPrice = (amount) => {
            return new Intl.NumberFormat('es-DO', {
                style: 'currency',
                currency: 'DOP',
                minimumFractionDigits: 2
            }).format(amount).replace('DOP', 'RD$');
        };

        const shopifyFetch = async (query, variables = {}) => {
            try {
                const response = await fetch(ENDPOINT, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Shopify-Storefront-Access-Token': STOREFRONT_ACCESS_TOKEN,
                    },
                    body: JSON.stringify({ query, variables }),
                });
                const result = await response.json();
                if (result.errors) throw new Error(result.errors[0].message);
                return result.data;
            } catch (error) {
                console.error('Fetch Error:', error);
                return null;
            }
        };

        const ShopifyAPI = {
            getProducts: async (searchQuery = '') => {
                const query = `
                    query getProducts($query: String) {
                        products(first: 20, query: $query) {
                            edges {
                                node {
                                    id
                                    title
                                    description
                                    availableForSale
                                    images(first: 1) { edges { node { url } } }
                                    variants(first: 1) {
                                        edges { node { id, price { amount } } }
                                    }
                                    collections(first: 1) { edges { node { title } } }
                                }
                            }
                        }
                    }
                `;
                const variables = searchQuery ? { query: `title:*${searchQuery}*` } : {};
                const data = await shopifyFetch(query, variables);
                if (!data) return [];
                return data.products.edges.map(({ node }) => ({
                    id: node.id,
                    variantId: node.variants.edges[0]?.node.id,
                    title: node.title,
                    description: node.description,
                    price: parseFloat(node.variants.edges[0]?.node.price.amount || 0),
                    image: node.images.edges[0]?.node.url || 'https://via.placeholder.com/400',
                    category: node.collections.edges[0]?.node.title || 'General',
                    available: node.availableForSale
                }));
            },
            getCollections: async () => {
                const query = `query { collections(first: 10) { edges { node { id, title } } } }`;
                const data = await shopifyFetch(query);
                return data ? [{ id: 'all', title: 'Todos' }, ...data.collections.edges.map(e => e.node)] : [];
            },
            createCheckout: async (cartItems) => {
                const query = `
                    mutation checkoutCreate($input: CheckoutCreateInput!) {
                        checkoutCreate(input: $input) {
                            checkout { id, webUrl }
                            checkoutUserErrors { message }
                        }
                    }
                `;
                const lineItems = cartItems.map(item => ({ variantId: item.variantId, quantity: item.quantity }));
                const data = await shopifyFetch(query, { input: { lineItems } });
                return data?.checkoutCreate;
            }
        };

        // --- ICON WRAPPERS ---
        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => { lucide.createIcons(); }, [name, size, className]);
            return <i data-lucide={name} className={`${className}`} style={{ width: size, height: size }}></i>;
        };

        const Logo = ({ size = "sm" }) => {
            const dims = size === "lg" ? "w-16 h-16 text-4xl" : "w-8 h-8 text-xl";
            return (
                <div className={`kolma-logo-box ${dims}`}>K</div>
            );
        };

        // --- CONTEXTOS ---
        const AppContext = createContext();
        const CartContext = createContext();

        // --- COMPONENTES ---
        const Header = () => {
            const { navigate, currentView } = useContext(AppContext);
            const { cart } = useContext(CartContext);
            const cartCount = cart.reduce((sum, item) => sum + item.quantity, 0);

            return (
                <header className="sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b border-gray-100 safe-top">
                    <div className="max-w-md mx-auto px-4 h-16 flex items-center justify-between">
                        <div className="flex items-center space-x-2 cursor-pointer" onClick={() => navigate('home')}>
                            <Logo />
                            <h1 className="font-extrabold text-xl tracking-tight text-gray-900">KOLMA</h1>
                        </div>
                        <div className="flex items-center space-x-3">
                            <button onClick={() => navigate('search')} className="p-2 text-gray-600 hover:text-[#E60023]">
                                <Icon name="search" />
                            </button>
                            <button onClick={() => navigate('cart')} className="relative p-2 text-gray-600">
                                <Icon name="shopping-cart" />
                                {cartCount > 0 && (
                                    <span className="absolute top-1 right-1 bg-[#E60023] text-white text-[10px] font-bold h-4 w-4 rounded-full flex items-center justify-center border-2 border-white">
                                        {cartCount}
                                    </span>
                                )}
                            </button>
                        </div>
                    </div>
                </header>
            );
        };

        const BottomNav = () => {
            const { currentView, navigate } = useContext(AppContext);
            const items = [
                { id: 'home', icon: 'home', label: 'Inicio' },
                { id: 'search', icon: 'search', label: 'Buscar' },
                { id: 'cart', icon: 'shopping-cart', label: 'Carrito' },
                { id: 'profile', icon: 'user', label: 'Perfil' },
            ];
            return (
                <nav className="fixed bottom-0 w-full glass-nav border-t border-gray-100 pb-safe z-50 md:max-w-md md:left-1/2 md:-translate-x-1/2">
                    <div className="flex justify-around py-3">
                        {items.map(item => (
                            <button key={item.id} onClick={() => navigate(item.id)} className={`flex flex-col items-center space-y-1 ${currentView === item.id ? 'text-[#E60023]' : 'text-gray-400'}`}>
                                <Icon name={item.icon} size={22} strokeWidth={currentView === item.id ? 2.5 : 2} />
                                <span className="text-[10px] font-bold uppercase tracking-wider">{item.label}</span>
                            </button>
                        ))}
                    </div>
                </nav>
            );
        };

        const ProductCard = ({ product }) => {
            const { navigate } = useContext(AppContext);
            const { addToCart } = useContext(CartContext);
            return (
                <div className="bg-white rounded-2xl overflow-hidden shadow-sm border border-gray-100 flex flex-col active:scale-95 transition-transform">
                    <div className="relative aspect-square p-4 flex items-center justify-center cursor-pointer" onClick={() => navigate('product', { product })}>
                        <img src={product.image} className="max-h-full max-w-full object-contain" alt={product.title} />
                        {!product.available && <div className="absolute inset-0 bg-white/60 backdrop-blur-[2px] flex items-center justify-center font-bold text-xs text-gray-800 uppercase">Agotado</div>}
                    </div>
                    <div className="p-3 pt-0 flex flex-col flex-grow">
                        <span className="text-[9px] font-bold text-gray-400 uppercase tracking-widest mb-1">{product.category}</span>
                        <h3 className="text-xs font-semibold text-gray-800 line-clamp-2 h-8 leading-tight mb-2">{product.title}</h3>
                        <div className="mt-auto flex items-center justify-between">
                            <span className="font-extrabold text-[#E60023]">{formatPrice(product.price)}</span>
                            <button 
                                disabled={!product.available}
                                onClick={() => addToCart(product)} 
                                className="w-8 h-8 rounded-full bg-gray-50 flex items-center justify-center text-[#E60023] border border-gray-100 hover:bg-[#E60023] hover:text-white disabled:opacity-30"
                            >
                                <Icon name="plus" size={18} />
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        // --- VISTAS ---
        const HomeView = () => {
            const [products, setProducts] = useState([]);
            const [loading, setLoading] = useState(true);
            const { navigate } = useContext(AppContext);

            useEffect(() => {
                ShopifyAPI.getProducts().then(data => { setProducts(data); setLoading(false); });
            }, []);

            return (
                <div className="p-4 space-y-6 pb-24 animate-fade-in">
                    <div className="bg-[#E60023] rounded-3xl p-6 text-white relative overflow-hidden shadow-xl shadow-red-100">
                        <div className="relative z-10 pr-20">
                            <h2 className="text-2xl font-black leading-tight mb-2 uppercase italic">¡Fresco y a Tiempo!</h2>
                            <p className="text-xs font-medium opacity-90 mb-4">Pide hoy y recibe en minutos. Calidad garantizada en RD.</p>
                            <button className="bg-white text-[#E60023] px-5 py-2 rounded-full font-bold text-xs uppercase tracking-tighter" onClick={() => navigate('search')}>Comprar ahora</button>
                        </div>
                        <div className="absolute -right-4 -bottom-4 opacity-10 rotate-12 scale-150">
                            <Logo size="lg" />
                        </div>
                    </div>

                    <section>
                        <h3 className="font-extrabold text-lg mb-4 text-gray-900 flex items-center">
                            <span className="w-1.5 h-6 bg-[#E60023] rounded-full mr-2"></span>
                            Destacados
                        </h3>
                        {loading ? (
                            <div className="grid grid-cols-2 gap-4">
                                {[1,2,3,4].map(i => <div key={i} className="h-48 bg-gray-200 animate-pulse rounded-2xl"></div>)}
                            </div>
                        ) : (
                            <div className="grid grid-cols-2 gap-4">
                                {products.map(p => <ProductCard key={p.id} product={p} />)}
                            </div>
                        )}
                    </section>
                </div>
            );
        };

        const SearchView = () => {
            const [query, setQuery] = useState('');
            const [products, setProducts] = useState([]);
            const [loading, setLoading] = useState(false);

            useEffect(() => {
                const handler = setTimeout(async () => {
                    setLoading(true);
                    const data = await ShopifyAPI.getProducts(query);
                    setProducts(data || []);
                    setLoading(false);
                }, 400);
                return () => clearTimeout(handler);
            }, [query]);

            return (
                <div className="p-4 pb-24 animate-fade-in">
                    <div className="relative mb-6">
                        <input 
                            type="text" autoFocus
                            placeholder="¿Qué buscas hoy?" 
                            className="w-full bg-white border border-gray-100 rounded-2xl py-4 pl-12 pr-4 shadow-sm focus:ring-2 focus:ring-[#E60023] outline-none"
                            value={query} onChange={e => setQuery(e.target.value)}
                        />
                        <div className="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">
                            <Icon name="search" size={20} />
                        </div>
                    </div>
                    {loading ? (
                        <div className="flex justify-center py-10">
                            <div className="animate-bounce">
                                <Logo />
                            </div>
                        </div>
                    ) : (
                        <div className="grid grid-cols-2 gap-4">
                            {products.map(p => <ProductCard key={p.id} product={p} />)}
                        </div>
                    )}
                </div>
            );
        };

        const ProductDetailView = () => {
            const { routeParams, navigate } = useContext(AppContext);
            const { addToCart } = useContext(CartContext);
            const [qty, setQty] = useState(1);
            const product = routeParams?.product;

            if (!product) return null;

            return (
                <div className="animate-slide-up pb-24 bg-white min-h-screen">
                    <div className="relative p-6 flex items-center justify-center bg-gray-50/50">
                        <button onClick={() => navigate('home')} className="absolute top-4 left-4 p-2 bg-white rounded-full shadow-md z-10"><Icon name="arrow-left" size={20}/></button>
                        <img src={product.image} className="max-h-[300px] object-contain drop-shadow-xl" alt={product.title} />
                    </div>
                    <div className="p-6">
                        <span className="text-[10px] font-black text-[#E60023] uppercase tracking-widest">{product.category}</span>
                        <h2 className="text-2xl font-bold text-gray-900 mt-1 mb-4 leading-tight">{product.title}</h2>
                        <div className="flex items-center justify-between mb-6">
                            <span className="text-3xl font-black text-gray-900">{formatPrice(product.price)}</span>
                            <div className="flex items-center space-x-4 bg-gray-100 rounded-full px-4 py-2">
                                <button onClick={() => setQty(Math.max(1, qty-1))}><Icon name="minus" size={16}/></button>
                                <span className="font-bold w-4 text-center">{qty}</span>
                                <button onClick={() => setQty(qty+1)}><Icon name="plus" size={16}/></button>
                            </div>
                        </div>
                        <p className="text-sm text-gray-500 leading-relaxed mb-8">{product.description || "Sin descripción disponible."}</p>
                        <button 
                            disabled={!product.available}
                            onClick={() => { addToCart(product, qty); navigate('cart'); }}
                            className="w-full bg-[#E60023] text-white py-5 rounded-2xl font-extrabold text-lg shadow-xl shadow-red-100 active:scale-95 transition-transform disabled:bg-gray-200"
                        >
                            {product.available ? `Agregar ${formatPrice(product.price * qty)}` : 'Agotado'}
                        </button>
                    </div>
                </div>
            );
        };

        const CartView = () => {
            const { cart, updateQuantity, removeFromCart, getCartTotal } = useContext(CartContext);
            const [loading, setLoading] = useState(false);

            const handleCheckout = async () => {
                setLoading(true);
                const res = await ShopifyAPI.createCheckout(cart);
                if (res?.checkout?.webUrl) window.location.href = res.checkout.webUrl;
                setLoading(false);
            };

            if (cart.length === 0) return (
                <div className="h-[70vh] flex flex-col items-center justify-center p-8 text-center animate-fade-in">
                    <div className="opacity-20 mb-4"><Logo size="lg" /></div>
                    <h3 className="text-lg font-bold">Carrito vacío</h3>
                    <p className="text-sm text-gray-400 mt-1">¡Vamos a llenarlo de cosas ricas!</p>
                </div>
            );

            return (
                <div className="p-4 pb-40 animate-fade-in">
                    <h2 className="text-xl font-extrabold mb-6">Mi Canasta</h2>
                    <div className="space-y-4">
                        {cart.map(item => (
                            <div key={item.id} className="flex bg-white p-3 rounded-2xl border border-gray-100 shadow-sm items-center relative">
                                <img src={item.image} className="w-16 h-16 object-contain p-1" />
                                <div className="ml-3 flex-grow pr-8">
                                    <h4 className="text-xs font-bold text-gray-800 line-clamp-1">{item.title}</h4>
                                    <p className="text-sm font-black text-[#E60023] mt-0.5">{formatPrice(item.price)}</p>
                                    <div className="flex items-center space-x-3 mt-2">
                                        <button onClick={() => updateQuantity(item.id, item.quantity - 1)} className="p-1 bg-gray-100 rounded-full"><Icon name="minus" size={12}/></button>
                                        <span className="text-xs font-bold">{item.quantity}</span>
                                        <button onClick={() => updateQuantity(item.id, item.quantity + 1)} className="p-1 bg-gray-100 rounded-full"><Icon name="plus" size={12}/></button>
                                    </div>
                                </div>
                                <button onClick={() => removeFromCart(item.id)} className="absolute top-3 right-3 text-gray-300"><Icon name="trash-2" size={16}/></button>
                            </div>
                        ))}
                    </div>
                    <div className="fixed bottom-20 left-0 w-full p-4 md:max-w-md md:left-1/2 md:-translate-x-1/2">
                        <div className="bg-white rounded-3xl p-6 shadow-2xl border border-gray-100">
                            <div className="flex justify-between items-center mb-4">
                                <span className="font-bold text-gray-400">Total</span>
                                <span className="text-2xl font-black text-gray-900">{formatPrice(getCartTotal())}</span>
                            </div>
                            <button 
                                onClick={handleCheckout} disabled={loading}
                                className="w-full bg-[#E60023] text-white py-4 rounded-2xl font-black uppercase tracking-widest text-sm flex items-center justify-center space-x-2"
                            >
                                {loading ? <div className="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div> : <span>Completar Pedido</span>}
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const ProfileView = () => (
            <div className="p-4 animate-fade-in text-center py-20">
                <div className="mx-auto mb-4 flex justify-center">
                    <Logo size="lg" />
                </div>
                <h2 className="text-xl font-black">Invitado KOLMA</h2>
                <p className="text-sm text-gray-400 mt-2">Inicia sesión al finalizar tu compra.</p>
                <div className="mt-10 space-y-4 text-left">
                    <div className="bg-white p-4 rounded-2xl flex items-center justify-between">
                        <span className="font-bold text-sm text-gray-700">Configuración</span>
                        <Icon name="chevron-right" size={18} className="text-gray-300" />
                    </div>
                    <div className="bg-white p-4 rounded-2xl flex items-center justify-between">
                        <span className="font-bold text-sm text-gray-700">Ayuda & Soporte</span>
                        <Icon name="chevron-right" size={18} className="text-gray-300" />
                    </div>
                </div>
            </div>
        );

        // --- MAIN APP ---
        function App() {
            const [currentView, setCurrentView] = useState('home');
            const [routeParams, setRouteParams] = useState({});
            const [cart, setCart] = useState(() => JSON.parse(localStorage.getItem('kolma_cart_v2') || '[]'));

            useEffect(() => { localStorage.setItem('kolma_cart_v2', JSON.stringify(cart)); }, [cart]);

            const addToCart = (product, quantity = 1) => {
                setCart(prev => {
                    const exists = prev.find(i => i.id === product.id);
                    return exists ? prev.map(i => i.id === product.id ? {...i, quantity: i.quantity + quantity} : i) : [...prev, {...product, quantity}];
                });
            };
            const updateQuantity = (id, q) => q <= 0 ? removeFromCart(id) : setCart(prev => prev.map(i => i.id === id ? {...i, quantity: q} : i));
            const removeFromCart = id => setCart(prev => prev.filter(i => i.id !== id));
            const getCartTotal = () => cart.reduce((s, i) => s + (i.price * i.quantity), 0);

            const navigate = (v, p = {}) => { setCurrentView(v); setRouteParams(p); window.scrollTo(0,0); };

            const views = { 
                home: <HomeView />, 
                search: <SearchView />, 
                product: <ProductDetailView />, 
                cart: <CartView />, 
                profile: <ProfileView /> 
            };

            return (
                <AppContext.Provider value={{ currentView, navigate, routeParams }}>
                    <CartContext.Provider value={{ cart, addToCart, updateQuantity, removeFromCart, getCartTotal }}>
                        <div className="max-w-md mx-auto bg-gray-50 min-h-screen relative shadow-2xl flex flex-col">
                            {currentView !== 'product' && <Header />}
                            <main className="flex-grow">{views[currentView]}</main>
                            {['home', 'search', 'cart', 'profile'].includes(currentView) && <BottomNav />}
                        </div>
                    </CartContext.Provider>
                </AppContext.Provider>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
