<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>KOLMARD | Supermercado Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --rose-primary: #E11D48; }
        body { font-family: 'Outfit', sans-serif; background-color: #F8FAFC; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .animate-reveal { animation: fadeInUp 0.4s ease forwards; opacity: 0; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .glass-header { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border-bottom: 1px solid rgba(0,0,0,0.05); }
        .glass-dock { background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(20px); border-top: 1px solid rgba(0,0,0,0.05); }
        .btn-touch:active { transform: scale(0.95); opacity: 0.8; }
        .side-panel { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .slide-up { animation: slideUp 0.3s ease-out forwards; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-32">

    <header class="sticky top-0 z-50 glass-header px-6 pt-10 pb-4">
        <div class="flex justify-between items-center mb-4">
            <div>
                <span class="text-rose-600 font-bold text-[8px] uppercase tracking-widest flex items-center gap-1">
                    <span class="w-1 h-1 bg-rose-600 rounded-full animate-ping"></span> Pedidos Cotuí
                </span>
                <h1 class="text-2xl font-black text-gray-900 tracking-tighter italic uppercase leading-none">KOLMA<span class="text-rose-600">RD</span></h1>
            </div>
            <button onclick="toggleProfile()" class="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center relative border border-white btn-touch shadow-sm">
                <i data-lucide="user" class="w-5 h-5 text-gray-600"></i>
                <span id="user-dot" class="absolute top-0 right-0 w-2.5 h-2.5 bg-green-500 rounded-full border-2 border-white hidden"></span>
            </button>
        </div>
        <div class="relative">
            <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"></i>
            <input type="text" id="search-input" oninput="filterProducts()" placeholder="¿Qué buscas hoy?" class="w-full bg-gray-100 p-3.5 pl-11 rounded-2xl outline-none font-medium text-sm focus:bg-white shadow-inner">
        </div>
    </header>

    <main class="px-6 mt-6">
        <div id="product-grid" class="grid grid-cols-2 gap-3"></div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 glass-dock px-8 pt-3 pb-8 flex justify-between items-center z-[60]">
        <button onclick="location.reload()" class="btn-touch flex flex-col items-center gap-1 text-rose-600"><i data-lucide="home" class="w-5 h-5"></i><span class="text-[8px] font-black uppercase">Inicio</span></button>
        <button onclick="toggleWallet()" class="btn-touch flex flex-col items-center gap-1 text-gray-400"><i data-lucide="wallet" class="w-5 h-5"></i><span class="text-[8px] font-black uppercase">Wallet</span></button>
        <button onclick="toggleCart()" class="btn-touch bg-gray-900 text-white w-14 h-14 rounded-2xl shadow-2xl relative -mt-10 border-4 border-white flex items-center justify-center"><i data-lucide="shopping-cart" class="w-5 h-5"></i><span id="cart-badge" class="absolute -top-1 -right-1 bg-rose-600 text-white text-[9px] font-black h-5 w-5 rounded-full flex items-center justify-center border-2 border-white hidden">0</span></button>
        <button onclick="toggleProfile()" class="btn-touch flex flex-col items-center gap-1 text-gray-400"><i data-lucide="user-cog" class="w-5 h-5"></i><span class="text-[8px] font-black uppercase">Perfil</span></button>
    </nav>

    <div id="wallet-modal" class="fixed inset-0 z-[110] hidden flex-col justify-end">
        <div class="absolute inset-0 bg-black/40 backdrop-blur-sm" onclick="toggleWallet()"></div>
        <div class="relative bg-gray-50 w-full rounded-t-[2.5rem] p-6 shadow-2xl slide-up h-[60vh]">
            <div class="w-12 h-1.5 bg-gray-200 rounded-full mx-auto mb-8"></div>
            <div class="w-full bg-black rounded-[2rem] p-6 text-white relative shadow-2xl overflow-hidden mb-6">
                <div class="z-10 relative flex flex-col gap-6">
                    <span class="text-[10px] font-black uppercase text-rose-500 tracking-widest">KOLMARD VIP</span>
                    <div><p class="text-[8px] text-gray-400 uppercase font-bold mb-1 italic">Balance de Crédito</p><h3 class="text-4xl font-black italic">RD$ <span id="wallet-amount">0.00</span></h3></div>
                    <p id="wallet-name" class="text-sm font-black uppercase tracking-widest text-gray-300">Invitado</p>
                </div>
            </div>
        </div>
    </div>

    <div id="profile-panel" class="fixed inset-0 z-[100] side-panel translate-x-full">
        <div class="absolute inset-0 bg-black/30 backdrop-blur-md" onclick="toggleProfile()"></div>
        <div class="absolute right-0 top-0 bottom-0 w-[85%] bg-white p-8 rounded-l-[3rem] shadow-2xl flex flex-col">
            <div class="flex justify-between items-center mb-10">
                <h2 class="text-2xl font-black uppercase italic text-gray-900">Acceso VIP</h2>
                <button onclick="toggleProfile()" class="w-12 h-12 bg-gray-50 rounded-full flex items-center justify-center text-gray-400"><i data-lucide="x" class="w-6 h-6"></i></button>
            </div>

            <div id="auth-box" class="space-y-6">
                <div class="space-y-4">
                    <div id="reg-fields" class="hidden"><input type="text" id="auth-name" placeholder="Nombre completo" class="w-full p-5 bg-gray-50 rounded-2xl outline-none text-sm font-bold border-2 border-transparent focus:border-rose-500/10 shadow-inner"></div>
                    <input type="email" id="auth-email" placeholder="Correo Electrónico" class="w-full p-5 bg-gray-50 rounded-2xl outline-none text-sm font-bold border-2 border-transparent focus:border-rose-500/10 shadow-inner">
                    <input type="tel" id="auth-phone" placeholder="WhatsApp / Teléfono" class="w-full p-5 bg-gray-50 rounded-2xl outline-none text-sm font-bold border-2 border-transparent focus:border-rose-500/10 shadow-inner">
                    <button onclick="handleAuthSubmit()" id="btn-auth" class="btn-touch w-full bg-rose-600 py-5 rounded-[2rem] text-white font-black uppercase italic shadow-xl">Entrar ahora</button>
                </div>
                <div class="text-center">
                    <button id="switch-btn" onclick="switchMode()" class="text-[10px] font-black text-rose-600 uppercase tracking-widest">¿Nuevo aquí? Regístrate</button>
                </div>
            </div>

            <div id="auth-welcome" class="hidden space-y-6 flex-grow">
                <div class="p-8 bg-gray-900 rounded-[2.5rem] text-white">
                    <span class="text-[9px] font-black uppercase text-rose-500 tracking-widest">Cliente Identificado</span>
                    <p id="display-name" class="font-black text-xl italic uppercase mt-1 truncate"></p>
                </div>
                <button onclick="logout()" class="w-full py-5 bg-gray-50 rounded-2xl font-black text-gray-400 uppercase text-[10px] tracking-widest btn-touch">Cerrar Sesión</button>
            </div>
        </div>
    </div>

    <div id="cart-modal" class="fixed inset-0 bg-black/60 z-[110] hidden items-end">
        <div class="absolute inset-0" onclick="toggleCart()"></div>
        <div class="relative bg-white w-full rounded-t-[3rem] p-8 max-h-[85vh] flex flex-col shadow-2xl">
            <div id="cart-items" class="flex-grow overflow-y-auto space-y-4 no-scrollbar mb-6"></div>
            <div class="bg-gray-50 p-6 rounded-[2.5rem]">
                <div class="flex justify-between items-center mb-4"><span class="font-black uppercase italic text-gray-400">Total</span><span id="cart-total" class="text-3xl font-black text-rose-600 tracking-tighter">RD$0</span></div>
                <button onclick="placeOrder()" id="btn-order" class="btn-touch w-full bg-rose-600 py-6 rounded-[2rem] font-black text-white uppercase italic shadow-xl">Confirmar Pedido</button>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN SHOPIFY & API
        const CONFIG = { shop: 'q0q09e-cp.myshopify.com', token: 'a171ee1eaf68d9b7ca5234b4c45a9b0c' };
        const API_URL = '/api'; 
        
        let allProducts = [], cart = JSON.parse(localStorage.getItem('kolmard_cart')) || [], mode = 'login';

        // 1. INICIO Y CARGA DE DATOS
        async function initApp() {
            const query = `{ products(first: 50) { edges { node { id title images(first: 1) { edges { node { url } } } variants(first: 1) { edges { node { id price { amount } } } } } } } }`;
            try {
                const response = await fetch(`https://${CONFIG.shop}/api/2024-01/graphql.json`, { method: 'POST', headers: { 'Content-Type': 'application/json', 'X-Shopify-Storefront-Access-Token': CONFIG.token }, body: JSON.stringify({ query }) });
                const res = await response.json();
                allProducts = res.data.products.edges.map(e => ({ id: e.node.id, variantId: e.node.variants.edges[0].node.id, name: e.node.title, price: parseFloat(e.node.variants.edges[0].node.price.amount), image: e.node.images.edges[0]?.node.url || '' }));
                renderProducts(allProducts);
            } catch (e) { console.error("Error productos"); }
            updateCartUI();
            checkSession();
        }

        // 2. LÓGICA DE AUTENTICACIÓN (LOGIN/REGISTRO)
        async function handleAuthSubmit() {
            const email = document.getElementById('auth-email').value.trim();
            const phone = document.getElementById('auth-phone').value.trim();
            const name = document.getElementById('auth-name').value.trim();
            const btn = document.getElementById('btn-auth');

            if(!email || !phone) return alert("Email y Teléfono son obligatorios");

            btn.disabled = true;
            btn.innerText = 'Verificando...';

            const endpoint = mode === 'login' ? '/login' : '/register';
            const body = mode === 'login' ? { email, phone } : { email, phone, name };

            try {
                const res = await fetch(`${API_URL}${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                const data = await res.json();

                if (data.success && data.user) {
                    // TAREA 1: Guardar customer_id en localStorage
                    localStorage.setItem('customer_id', data.user.shopify_customer_id);
                    // Guardar objeto de sesión completo para compatibilidad con la UI
                    localStorage.setItem('k_session', JSON.stringify(data.user));
                    
                    console.log("Login exitoso. Customer ID:", data.user.shopify_customer_id);
                    location.reload();
                } else {
                    alert(data.message || "Error al acceder");
                }
            } catch (e) { 
                console.error("Error de conexión:", e);
                alert("Error de conexión con el servidor"); 
            }
            btn.disabled = false;
        }

        // 3. CONSULTA DE WALLET
        async function fetchWallet(customerId) {
            try {
                // TAREA 2: Fetch a /api/wallet
                const res = await fetch(`${API_URL}/wallet`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ customer_id: customerId })
                });
                const data = await res.json();
                
                // Mostrar saldo en consola (como se solicitó)
                console.log("Saldo Wallet (Shopify):", data.balance);
                
                // Actualizar UI
                if(data.balance !== undefined) {
                    document.getElementById('wallet-amount').innerText = parseFloat(data.balance).toFixed(2);
                }
            } catch (e) { 
                console.log("Error al consultar wallet en consola:", e); 
            }
        }

        // 4. CREACIÓN DE PEDIDO
        async function placeOrder() {
            // TAREA 3: Reutilizar customer_id de localStorage
            const customerId = localStorage.getItem('customer_id');
            const session = JSON.parse(localStorage.getItem('k_session'));
            
            if(!customerId) { toggleCart(); toggleProfile(); return alert("Identifícate para pedir"); }

            const btn = document.getElementById('btn-order');
            btn.disabled = true;
            btn.innerText = 'Procesando...';

            try {
                const res = await fetch(`${API_URL}/order`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        customer_id: customerId,
                        email: session?.email,
                        items: cart.map(i => ({ variant_id: i.variantId, quantity: 1 }))
                    })
                });
                const data = await res.json();

                if(data.success) {
                    alert("¡Pedido realizado con éxito!");
                    cart = [];
                    localStorage.removeItem('kolmard_cart');
                    location.reload();
                } else { alert("Error: " + data.message); }
            } catch (e) { alert("Error al procesar pedido"); }
            btn.disabled = false;
        }

        // 5. SESIÓN Y FUNCIONES DE UI
        function checkSession() {
            // TAREA 3: Mantener sesión usando localStorage
            const customerId = localStorage.getItem('customer_id');
            const session = JSON.parse(localStorage.getItem('k_session'));

            if(customerId && session) {
                document.getElementById('auth-box').classList.add('hidden');
                document.getElementById('auth-welcome').classList.remove('hidden');
                document.getElementById('display-name').innerText = session.name || session.email;
                document.getElementById('wallet-name').innerText = session.name || "Cliente VIP";
                document.getElementById('user-dot').classList.remove('hidden');
                
                // Consultar wallet al detectar sesión activa
                fetchWallet(customerId);
            }
        }

        // --- FUNCIONES DE RENDERIZADO (DISEÑO INTACTO) ---
        function renderProducts(list) {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = list.map(p => `
                <div class="bg-white p-3 rounded-[2rem] border border-gray-50 shadow-sm flex flex-col animate-reveal">
                    <div class="relative aspect-square mb-2 bg-gray-50 rounded-[1.5rem] flex items-center justify-center p-4">
                        <img src="${p.image}" class="max-w-full max-h-full object-contain">
                        <button onclick="addToCart('${p.id}')" class="absolute bottom-2 right-2 bg-gray-900 text-white w-8 h-8 rounded-xl flex items-center justify-center btn-touch shadow-lg"><i data-lucide="plus" class="w-4 h-4"></i></button>
                    </div>
                    <div class="px-2 pb-1">
                        <h3 class="text-[9px] font-bold text-gray-700 uppercase truncate leading-none">${p.name}</h3>
                        <p class="text-rose-600 font-black text-sm italic mt-1">RD$${p.price.toLocaleString()}</p>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function updateCartUI() {
            const total = cart.reduce((s, i) => s + i.price, 0);
            document.getElementById('cart-badge').innerText = cart.length;
            document.getElementById('cart-badge').classList.toggle('hidden', cart.length === 0);
            document.getElementById('cart-total').innerText = `RD$${total.toLocaleString()}`;
            document.getElementById('cart-items').innerHTML = cart.map(i => `<div class="flex items-center gap-4 bg-gray-50 p-4 rounded-3xl"><img src="${i.image}" class="w-12 h-12 object-contain"><div class="flex-grow"><p class="text-[9px] font-black uppercase text-gray-700 truncate">${i.name}</p><p class="text-rose-600 font-black text-xs">RD$${i.price.toLocaleString()}</p></div><button onclick="removeFromCart(${i.cid})" class="text-gray-300"><i data-lucide="trash-2" class="w-4 h-4"></i></button></div>`).join('');
            lucide.createIcons();
        }

        function addToCart(id) { cart.push({ ...allProducts.find(i => i.id === id), cid: Date.now() }); localStorage.setItem('kolmard_cart', JSON.stringify(cart)); updateCartUI(); }
        function removeFromCart(cid) { cart = cart.filter(i => i.cid !== cid); localStorage.setItem('kolmard_cart', JSON.stringify(cart)); updateCartUI(); }
        function toggleProfile() { document.getElementById('profile-panel').classList.toggle('translate-x-full'); }
        function toggleCart() { const c = document.getElementById('cart-modal'); c.classList.toggle('hidden'); c.classList.toggle('flex'); }
        function toggleWallet() { const w = document.getElementById('wallet-modal'); w.classList.toggle('hidden'); w.classList.toggle('flex'); }
        function logout() { localStorage.clear(); location.reload(); }
        function switchMode() { mode = mode === 'login' ? 'reg' : 'login'; document.getElementById('reg-fields').classList.toggle('hidden', mode === 'login'); document.getElementById('switch-btn').innerText = mode === 'login' ? '¿Nuevo aquí? Regístrate' : 'Ya tengo cuenta, entrar'; }
        function filterProducts() { const q = document.getElementById('search-input').value.toLowerCase(); renderProducts(allProducts.filter(p => p.name.toLowerCase().includes(q))); }

        initApp();
    </script>
</body>
</html>
