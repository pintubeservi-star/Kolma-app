<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KOLMARD | Express</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #F9FAFB; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .nav-dock { bottom: 20px; left: 20px; right: 20px; border-radius: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .side-panel { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); transform: translateX(100%); }
        .side-panel.active { transform: translateX(0); }
        /* Fix para que iPhone no haga zoom en inputs */
        input { font-size: 16px !important; }
        .loader { border-top-color: transparent; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="pb-32">

    <header class="sticky top-0 z-40 px-6 pt-10 pb-4 bg-white/80 backdrop-blur-xl border-b border-gray-100">
        <div class="flex justify-between items-center">
            <div>
                <span class="text-[10px] font-bold text-rose-500 uppercase tracking-widest block">Cotuí</span>
                <h1 class="text-3xl font-black tracking-tighter text-gray-900 italic uppercase">KOLMA<span class="text-rose-600">RD</span></h1>
            </div>
            <div class="flex gap-2">
                <button onclick="toggleProfile()" class="p-3 bg-gray-50 rounded-2xl text-gray-500 relative">
                    <i data-lucide="user" class="w-6 h-6"></i>
                    <span id="user-dot" class="absolute top-2 right-2 w-2 h-2 bg-green-500 rounded-full border-2 border-white hidden"></span>
                </button>
            </div>
        </div>
        
        <div class="mt-4 relative">
            <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"></i>
            <input type="text" id="search-input" oninput="filterProducts()" placeholder="Busca productos..." class="w-full bg-gray-100 p-4 pl-12 rounded-2xl outline-none font-bold text-gray-700 border border-transparent focus:border-rose-100">
        </div>
    </header>

    <section class="px-6 mt-6">
        <div class="w-full h-32 bg-gradient-to-br from-rose-600 to-rose-400 rounded-[2.5rem] p-7 text-white relative overflow-hidden">
            <div class="relative z-10">
                <h2 class="text-xl font-bold uppercase italic">Delivery Express</h2>
                <p class="text-white/80 text-[10px] font-bold uppercase tracking-widest">Recibe en casa en 30 min</p>
            </div>
            <i data-lucide="zap" class="absolute right-[-10px] top-[-10px] w-32 h-32 text-white/5 rotate-12"></i>
        </div>
    </section>

    <main class="px-6 mt-8">
        <div id="product-grid" class="grid grid-cols-2 gap-4"></div>
    </main>

    <nav class="fixed nav-dock glass flex justify-around items-center py-4 z-50">
        <button onclick="location.reload()" class="text-rose-600"><i data-lucide="home" class="w-6 h-6"></i></button>
        <button onclick="toggleCart()" class="bg-rose-600 text-white p-3 rounded-2xl shadow-lg relative -mt-8">
            <i data-lucide="shopping-cart" class="w-6 h-6"></i>
            <span id="cart-badge" class="absolute -top-1 -right-1 bg-yellow-400 text-rose-900 text-[10px] font-black h-5 w-5 rounded-full flex items-center justify-center border-2 border-white hidden">0</span>
        </button>
        <button onclick="toggleProfile()" class="text-gray-400"><i data-lucide="user-circle" class="w-6 h-6"></i></button>
    </nav>

    <div id="profile-panel" class="fixed inset-0 z-[70] side-panel">
        <div class="absolute inset-0 bg-black/40 backdrop-blur-sm" onclick="toggleProfile()"></div>
        <div class="absolute right-0 top-0 bottom-0 w-[85%] bg-white p-8 flex flex-col shadow-2xl">
            
            <div class="flex justify-between items-center mb-8">
                <h2 id="auth-title" class="text-2xl font-black uppercase italic">Mi Cuenta</h2>
                <button onclick="toggleProfile()" class="text-3xl text-gray-300">&times;</button>
            </div>

            <div id="auth-box" class="space-y-4">
                <div id="reg-name-field" class="hidden">
                    <label class="text-[10px] font-bold text-gray-400 uppercase ml-2">Nombre</label>
                    <input type="text" id="auth-fname" placeholder="Tu nombre" class="w-full p-4 bg-gray-50 rounded-2xl font-bold border-2 border-transparent focus:border-rose-500 outline-none">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase ml-2">Email</label>
                    <input type="email" id="auth-email" inputmode="email" autocomplete="email" placeholder="ejemplo@gmail.com" class="w-full p-4 bg-gray-50 rounded-2xl font-bold border-2 border-transparent focus:border-rose-500 outline-none">
                </div>
                <div id="reg-pass-field">
                    <label class="text-[10px] font-bold text-gray-400 uppercase ml-2">Contraseña</label>
                    <input type="password" id="auth-pass" autocomplete="current-password" placeholder="••••••••" class="w-full p-4 bg-gray-50 rounded-2xl font-bold border-2 border-transparent focus:border-rose-500 outline-none">
                </div>

                <button onclick="handleAuthSubmit()" id="btn-main-auth" class="w-full bg-black py-5 rounded-2xl text-white font-black uppercase tracking-tighter shadow-xl">Iniciar Sesión</button>
                
                <div class="pt-6 space-y-3 text-center border-t border-gray-100">
                    <button id="switch-to-reg" onclick="switchAuth('register')" class="text-[10px] font-black text-rose-600 uppercase">¿No tienes cuenta? Regístrate aquí</button>
                    <button id="switch-to-login" onclick="switchAuth('login')" class="hidden text-[10px] font-black text-gray-900 uppercase">Ya tengo cuenta • Entrar</button>
                    <button onclick="switchAuth('recover')" class="block w-full text-[10px] font-bold text-gray-400 uppercase">Olvidé mi contraseña</button>
                </div>
            </div>

            <div id="auth-welcome" class="hidden space-y-6">
                <div class="p-8 bg-rose-600 rounded-[2.5rem] text-white shadow-xl relative overflow-hidden">
                    <p class="text-[10px] font-bold uppercase opacity-80">Sesión Iniciada</p>
                    <p id="display-email" class="font-black text-lg truncate uppercase italic"></p>
                    <i data-lucide="shield-check" class="absolute right-[-10px] top-[-10px] w-20 h-20 text-white/10"></i>
                </div>
                <div class="bg-green-50 p-4 rounded-2xl border border-green-100 flex gap-3 items-center">
                    <i data-lucide="check-circle" class="w-5 h-5 text-green-600"></i>
                    <p class="text-[10px] font-black text-green-700 uppercase leading-tight">Tus datos se cargarán automáticamente al pagar.</p>
                </div>
                <button onclick="logout()" class="w-full py-4 border-2 border-gray-100 rounded-2xl font-bold text-gray-400 uppercase text-[10px] mt-auto">Cerrar Sesión</button>
            </div>
        </div>
    </div>

    <div id="cart-modal" class="fixed inset-0 bg-black/40 z-[60] hidden backdrop-blur-md flex items-end">
        <div class="absolute inset-0" onclick="toggleCart()"></div>
        <div class="relative bg-white w-full rounded-t-[3rem] p-8 max-h-[85vh] flex flex-col z-10 shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-black uppercase italic">Mi Pedido</h2>
                <button onclick="toggleCart()" class="text-3xl text-gray-300">&times;</button>
            </div>
            <div id="cart-items" class="flex-grow overflow-y-auto space-y-4 mb-6"></div>
            <div class="flex justify-between items-center mb-6">
                <span class="text-gray-400 font-bold uppercase text-xs">Total</span>
                <span id="cart-total" class="text-3xl font-black text-rose-600 tracking-tighter">RD$0</span>
            </div>
            <button onclick="checkout()" id="btn-pay" class="w-full bg-rose-600 py-5 rounded-2xl font-black text-white text-lg uppercase italic shadow-xl">Completar Pedido</button>
        </div>
    </div>

    <script>
        const CONFIG = { shop: 'q0q09e-cp.myshopify.com', token: 'a171ee1eaf68d9b7ca5234b4c45a9b0c' };
        let allProducts = [], cart = JSON.parse(localStorage.getItem('kolmard_cart')) || [];
        let currentMode = 'login';

        async function initApp() {
            const query = `{ products(first: 50) { edges { node { id title images(first: 1) { edges { node { url } } } variants(first: 1) { edges { node { id price { amount } } } } } } } }`;
            try {
                const response = await fetch(`https://${CONFIG.shop}/api/2024-01/graphql.json`, { method: 'POST', headers: { 'Content-Type': 'application/json', 'X-Shopify-Storefront-Access-Token': CONFIG.token }, body: JSON.stringify({ query }) });
                const res = await response.json();
                allProducts = res.data.products.edges.map(e => ({ id: e.node.id, variantId: e.node.variants.edges[0].node.id, name: e.node.title, price: parseFloat(e.node.variants.edges[0].node.price.amount), image: e.node.images.edges[0]?.node.url || '' }));
                renderProducts(allProducts);
                updateCartUI();
                checkSession();
            } catch (e) { console.log(e); }
        }

        // BUSCADOR REAL
        function filterProducts() {
            const term = document.getElementById('search-input').value.toLowerCase();
            const filtered = allProducts.filter(p => p.name.toLowerCase().includes(term));
            renderProducts(filtered);
        }

        function renderProducts(list) {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = list.map(p => `
                <div class="bg-white p-4 rounded-[2rem] shadow-sm border border-gray-50 flex flex-col items-center">
                    <img src="${p.image}" class="w-24 h-24 object-contain mb-4">
                    <div class="w-full">
                        <h3 class="text-[10px] font-black text-gray-800 uppercase truncate">${p.name}</h3>
                        <div class="flex justify-between items-center mt-3">
                            <span class="text-rose-600 font-black text-sm">RD$${p.price.toLocaleString()}</span>
                            <button onclick="addToCart('${p.id}')" class="bg-gray-900 text-white p-2.5 rounded-xl"><i data-lucide="plus" class="w-4 h-4"></i></button>
                        </div>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        // LÓGICA DE ACCESO SIMPLE
        function switchAuth(mode) {
            currentMode = mode;
            document.getElementById('reg-name-field').classList.toggle('hidden', mode !== 'register');
            document.getElementById('reg-pass-field').classList.toggle('hidden', mode === 'recover');
            document.getElementById('switch-to-reg').classList.toggle('hidden', mode === 'register');
            document.getElementById('switch-to-login').classList.toggle('hidden', mode === 'login');
            
            const titles = { login: 'Mi Cuenta', register: 'Nueva Cuenta', recover: 'Recuperar' };
            const btns = { login: 'Iniciar Sesión', register: 'Crear Mi Cuenta', recover: 'Enviar Enlace' };
            document.getElementById('auth-title').innerText = titles[mode];
            document.getElementById('btn-main-auth').innerText = btns[mode];
        }

        async function handleAuthSubmit() {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;
            const fname = document.getElementById('auth-fname').value;
            const btn = document.getElementById('btn-main-auth');

            if(!email) return alert("Email necesario");
            btn.innerHTML = `<div class="w-5 h-5 border-2 border-white loader rounded-full mx-auto"></div>`;

            let query = "";
            if(currentMode === 'login') {
                query = `mutation { customerAccessTokenCreate(input: {email: "${email}", password: "${pass}"}) { customerAccessToken { accessToken } customerUserErrors { message } } }`;
            } else if(currentMode === 'register') {
                query = `mutation { customerCreate(input: {firstName: "${fname}", email: "${email}", password: "${pass}"}) { customer { id } customerUserErrors { message } } }`;
            } else {
                query = `mutation { customerRecover(email: "${email}") { customerUserErrors { message } } }`;
            }

            try {
                const response = await fetch(`https://${CONFIG.shop}/api/2024-01/graphql.json`, { method: 'POST', headers: { 'Content-Type': 'application/json', 'X-Shopify-Storefront-Access-Token': CONFIG.token }, body: JSON.stringify({ query }) });
                const res = await response.json();

                if(currentMode === 'login') {
                    const token = res.data.customerAccessTokenCreate.customerAccessToken?.accessToken;
                    if(token) { localStorage.setItem('k_token', token); localStorage.setItem('k_email', email); checkSession(); toggleProfile(); }
                    else alert("Datos incorrectos");
                } else if(currentMode === 'register') {
                    if(res.data.customerCreate.customerUserErrors.length > 0) alert(res.data.customerCreate.customerUserErrors[0].message);
                    else { alert("¡Cuenta creada! Ya puedes entrar."); switchAuth('login'); }
                } else {
                    alert("Si el correo es correcto, recibirás un link.");
                }
            } catch(e) { alert("Error de red"); }
            btn.innerText = currentMode === 'login' ? 'Iniciar Sesión' : (currentMode === 'register' ? 'Crear Mi Cuenta' : 'Enviar Enlace');
        }

        function checkSession() {
            const token = localStorage.getItem('k_token');
            if(token) {
                document.getElementById('auth-box').classList.add('hidden');
                document.getElementById('auth-welcome').classList.remove('hidden');
                document.getElementById('display-email').innerText = localStorage.getItem('k_email');
                document.getElementById('user-dot').classList.remove('hidden');
            }
        }

        function logout() { localStorage.clear(); location.reload(); }
        function toggleProfile() { document.getElementById('profile-panel').classList.toggle('active'); }
        function toggleCart() { document.getElementById('cart-modal').classList.toggle('hidden'); }

        // CARRITO
        function addToCart(id) {
            const p = allProducts.find(i => i.id === id);
            cart.push({ ...p, cid: Date.now() });
            localStorage.setItem('kolmard_cart', JSON.stringify(cart));
            updateCartUI();
        }

        function updateCartUI() {
            const badge = document.getElementById('cart-badge');
            badge.innerText = cart.length; badge.classList.toggle('hidden', cart.length === 0);
            document.getElementById('cart-items').innerHTML = cart.map(i => `<div class="flex items-center gap-4 bg-gray-50 p-4 rounded-2xl border border-white">
                <div class="flex-grow"><p class="text-[10px] font-black uppercase text-gray-900">${i.name}</p><p class="text-rose-600 font-black text-sm">RD$${i.price.toLocaleString()}</p></div>
                <button onclick="removeFromCart(${i.cid})" class="text-gray-300"><i data-lucide="trash-2" class="w-4 h-4"></i></button></div>`).join('');
            document.getElementById('cart-total').innerText = `RD$${cart.reduce((s, i) => s + i.price, 0).toLocaleString()}`;
            lucide.createIcons();
        }

        function removeFromCart(cid) { cart = cart.filter(i => i.cid !== cid); localStorage.setItem('kolmard_cart', JSON.stringify(cart)); updateCartUI(); }

        // CHECKOUT AUTOMÁTICO
        async function checkout() {
            const token = localStorage.getItem('k_token');
            if(!token) { toggleCart(); toggleProfile(); return alert("Por favor, inicia sesión para completar tu pedido."); }

            const lines = cart.map(item => ({ merchandiseId: item.variantId, quantity: 1 }));
            const mutation = `mutation { cartCreate(input: { buyerIdentity: { customerAccessToken: "${token}" }, lines: ${JSON.stringify(lines).replace(/"([^"]+)":/g, '$1:')} }) { cart { checkoutUrl } } }`;
            
            try {
                const response = await fetch(`https://${CONFIG.shop}/api/2024-01/graphql.json`, { method: 'POST', headers: { 'Content-Type': 'application/json', 'X-Shopify-Storefront-Access-Token': CONFIG.token }, body: JSON.stringify({ query: mutation }) });
                const res = await response.json();
                if(res.data.cartCreate.cart.checkoutUrl) window.location.href = res.data.cartCreate.cart.checkoutUrl;
            } catch (e) { alert("Error de conexión"); }
        }

        initApp();
        lucide.createIcons();
    </script>
</body>
</html>
