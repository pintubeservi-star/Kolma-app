<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KOLMARD | Wallet Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #F3F4F6; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .nav-dock { bottom: 20px; left: 20px; right: 20px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        .side-panel { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); transform: translateX(100%); }
        .side-panel.active { transform: translateX(0); }
        input { font-size: 16px !important; }
        .loader { border-top-color: transparent; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .dark-card { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); }
        .wallet-gradient { background: linear-gradient(90deg, #f43f5e 0%, #fb7185 100%); }
    </style>
</head>
<body class="pb-36">

    <header class="sticky top-0 z-40 px-6 pt-10 pb-4 bg-white/90 backdrop-blur-xl border-b border-gray-100">
        <div class="flex justify-between items-center mb-5">
            <div>
                <span class="text-[9px] font-bold text-rose-600 uppercase tracking-[0.3em] block">Cotuí Digital</span>
                <h1 class="text-3xl font-black tracking-tighter text-slate-900 italic uppercase">KOLMA<span class="text-rose-600">RD</span></h1>
            </div>
            <button onclick="toggleProfile()" class="p-3 bg-slate-50 rounded-2xl text-slate-400 relative">
                <i data-lucide="wallet" class="w-6 h-6"></i>
                <span id="user-dot" class="absolute top-2 right-2 w-2.5 h-2.5 bg-green-500 rounded-full border-2 border-white hidden"></span>
            </button>
        </div>
        
        <div class="relative">
            <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
            <input type="text" id="search-input" oninput="filterProducts()" placeholder="Busca en el colmado..." class="w-full bg-slate-100 p-4 pl-12 rounded-2xl outline-none font-bold text-slate-700 border-2 border-transparent focus:border-rose-100 focus:bg-white shadow-sm">
        </div>
    </header>

    <section class="px-6 mt-6">
        <div class="w-full dark-card rounded-[2.5rem] p-8 text-white relative overflow-hidden shadow-2xl">
            <div class="relative z-10">
                <h2 class="text-2xl font-black uppercase italic leading-tight">Tu Pedido<br>En 30 Minutos.</h2>
                <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest mt-2">Delivery Express Cotuí</p>
            </div>
            <i data-lucide="zap" class="absolute right-[-10px] bottom-[-10px] w-32 h-32 text-white/5 rotate-12"></i>
        </div>
    </section>

    <main class="px-6 mt-8">
        <div id="product-grid" class="grid grid-cols-2 gap-4"></div>
    </main>

    <nav class="fixed nav-dock glass flex justify-around items-center py-4 z-50 border border-white/50">
        <button onclick="location.reload()" class="text-rose-600"><i data-lucide="home" class="w-6 h-6"></i></button>
        <button onclick="toggleCart()" class="bg-slate-900 text-white p-4 rounded-2xl shadow-xl relative -mt-12 border-4 border-white">
            <i data-lucide="shopping-cart" class="w-6 h-6"></i>
            <span id="cart-badge" class="absolute -top-1 -right-1 bg-rose-600 text-white text-[10px] font-black h-5 w-5 rounded-full flex items-center justify-center border-2 border-white hidden">0</span>
        </button>
        <button onclick="toggleProfile()" class="text-slate-400"><i data-lucide="user" class="w-6 h-6"></i></button>
    </nav>

    <div id="profile-panel" class="fixed inset-0 z-[70] side-panel">
        <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onclick="toggleProfile()"></div>
        <div class="absolute right-0 top-0 bottom-0 w-[88%] bg-white p-8 flex flex-col shadow-2xl overflow-y-auto">
            
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-2xl font-black uppercase italic text-slate-900">Mi Cuenta</h2>
                <button onclick="toggleProfile()" class="text-3xl text-slate-300">&times;</button>
            </div>

            <div id="auth-box" class="space-y-4">
                <button onclick="loginConGoogle()" class="w-full flex items-center justify-center gap-3 border-2 border-slate-100 py-4 rounded-2xl font-bold text-slate-700">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-5 h-5">
                    <span>Entrar con Google</span>
                </button>
                <div class="h-[1px] bg-slate-100 w-full my-4"></div>
                <input type="email" id="auth-email" placeholder="Email" class="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none border-2 border-transparent focus:border-rose-500">
                <input type="password" id="auth-pass" placeholder="Contraseña" class="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none border-2 border-transparent focus:border-rose-500">
                <button onclick="ejecutarAuth()" id="btn-auth" class="w-full bg-slate-900 py-5 rounded-2xl text-white font-black uppercase shadow-lg">Entrar</button>
            </div>

            <div id="auth-welcome" class="hidden space-y-6">
                <div class="dark-card p-6 rounded-[2rem] text-white shadow-2xl relative overflow-hidden">
                    <div class="flex justify-between items-start relative z-10">
                        <div>
                            <p class="text-[10px] font-bold uppercase opacity-60 tracking-tighter">Balance Disponible</p>
                            <p class="text-3xl font-black italic tracking-tighter mt-1">RD$ 0.00</p>
                        </div>
                        <div class="bg-white/10 p-2 rounded-xl">
                            <i data-lucide="plus" class="w-5 h-5 text-rose-400"></i>
                        </div>
                    </div>
                    <div class="mt-8 flex justify-between items-end relative z-10">
                        <p id="user-email-display" class="text-[9px] font-bold opacity-40 truncate w-32 uppercase tracking-widest"></p>
                        <span class="bg-rose-600 text-[8px] px-2 py-1 rounded-md font-black uppercase italic">KolmaCard</span>
                    </div>
                    <div class="absolute top-[-20px] right-[-20px] w-32 h-32 bg-white/5 rounded-full blur-3xl"></div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <button class="bg-slate-50 p-4 rounded-2xl text-center border border-slate-100">
                        <i data-lucide="history" class="w-5 h-5 mx-auto mb-2 text-slate-400"></i>
                        <span class="text-[9px] font-black uppercase text-slate-600">Historial</span>
                    </button>
                    <button class="bg-slate-50 p-4 rounded-2xl text-center border border-slate-100">
                        <i data-lucide="arrow-up-right" class="w-5 h-5 mx-auto mb-2 text-slate-400"></i>
                        <span class="text-[9px] font-black uppercase text-slate-600">Recargar</span>
                    </button>
                </div>

                <button onclick="logout()" class="w-full py-4 border-2 border-slate-100 rounded-2xl font-bold text-slate-300 uppercase text-[10px] mt-10">Cerrar Sesión</button>
            </div>
        </div>
    </div>

    <div id="cart-modal" class="fixed inset-0 bg-slate-900/40 z-[60] hidden flex items-end">
        <div class="absolute inset-0" onclick="toggleCart()"></div>
        <div class="relative bg-white w-full rounded-t-[3rem] p-8 max-h-[85vh] flex flex-col z-10 shadow-2xl">
            <h2 class="text-2xl font-black uppercase italic mb-6">Mi Carrito</h2>
            <div id="cart-items" class="flex-grow overflow-y-auto space-y-4 mb-6"></div>
            <div class="flex justify-between items-center mb-6">
                <span class="text-slate-400 font-bold uppercase text-xs">Total</span>
                <span id="cart-total" class="text-3xl font-black text-rose-600">RD$0</span>
            </div>
            <button onclick="checkout()" class="w-full bg-rose-600 py-5 rounded-2xl font-black text-white text-lg uppercase italic shadow-xl">Pagar Orden</button>
        </div>
    </div>

    <script>
        const CONFIG = { shop: 'q0q09e-cp.myshopify.com', token: 'a171ee1eaf68d9b7ca5234b4c45a9b0c' };
        let allProducts = [], cart = JSON.parse(localStorage.getItem('kolmard_cart')) || [];

        async function loadShop() {
            const query = `{ products(first: 50) { edges { node { id title images(first: 1) { edges { node { url } } } variants(first: 1) { edges { node { id price { amount } } } } } } } }`;
            try {
                const response = await fetch(`https://${CONFIG.shop}/api/2024-01/graphql.json`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-Shopify-Storefront-Access-Token': CONFIG.token },
                    body: JSON.stringify({ query })
                });
                const { data } = await response.json();
                allProducts = data.products.edges.map(e => ({
                    id: e.node.id,
                    variantId: e.node.variants.edges[0].node.id,
                    name: e.node.title,
                    price: parseFloat(e.node.variants.edges[0].node.price.amount),
                    image: e.node.images.edges[0]?.node.url || ''
                }));
                renderProducts(allProducts);
                updateCartUI();
                checkUser();
            } catch (err) { console.error(err); }
        }

        function renderProducts(list) {
            document.getElementById('product-grid').innerHTML = list.map(p => `
                <div class="bg-white p-4 rounded-[2.5rem] shadow-sm border border-slate-50 flex flex-col items-center">
                    <img src="${p.image}" class="w-24 h-24 object-contain mb-4">
                    <div class="w-full">
                        <h3 class="text-[10px] font-black text-slate-800 uppercase truncate mb-1">${p.name}</h3>
                        <div class="flex justify-between items-center">
                            <span class="text-rose-600 font-black text-sm">RD$${p.price.toLocaleString()}</span>
                            <button onclick="addToCart('${p.id}')" class="bg-slate-900 text-white p-2.5 rounded-xl"><i data-lucide="plus" class="w-4 h-4"></i></button>
                        </div>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function filterProducts() {
            const val = document.getElementById('search-input').value.toLowerCase();
            renderProducts(allProducts.filter(p => p.name.toLowerCase().includes(val)));
        }

        // AUTH & WALLET
        async function ejecutarAuth() {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;
            const btn = document.getElementById('btn-auth');
            if(!email || !pass) return alert("Completa los datos");
            
            btn.innerHTML = `<div class="w-5 h-5 border-2 border-white loader rounded-full mx-auto"></div>`;
            const query = `mutation { customerAccessTokenCreate(input: {email: "${email}", password: "${pass}"}) { customerAccessToken { accessToken } customerUserErrors { message } } }`;

            const response = await fetch(`https://${CONFIG.shop}/api/2024-01/graphql.json`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-Shopify-Storefront-Access-Token': CONFIG.token },
                body: JSON.stringify({ query })
            });
            const res = await response.json();
            const token = res.data.customerAccessTokenCreate?.customerAccessToken?.accessToken;
            
            if(token) { localStorage.setItem('k_token', token); localStorage.setItem('k_email', email); location.reload(); }
            else { alert("Error de acceso"); btn.innerText = "Entrar"; }
        }

        function loginConGoogle() { window.location.href = `https://${CONFIG.shop}/account/login`; }

        function checkUser() {
            const token = localStorage.getItem('k_token');
            if(token) {
                document.getElementById('auth-box').classList.add('hidden');
                document.getElementById('auth-welcome').classList.remove('hidden');
                document.getElementById('user-email-display').innerText = localStorage.getItem('k_email');
                document.getElementById('user-dot').classList.remove('hidden');
            }
        }

        function logout() { localStorage.clear(); location.reload(); }
        function toggleProfile() { document.getElementById('profile-panel').classList.toggle('active'); }
        function toggleCart() { document.getElementById('cart-modal').classList.toggle('hidden'); }

        // CART
        function addToCart(id) {
            const p = allProducts.find(i => i.id === id);
            cart.push({ ...p, cid: Date.now() });
            localStorage.setItem('kolmard_cart', JSON.stringify(cart));
            updateCartUI();
        }

        function updateCartUI() {
            const badge = document.getElementById('cart-badge');
            badge.innerText = cart.length;
            badge.classList.toggle('hidden', cart.length === 0);
            document.getElementById('cart-items').innerHTML = cart.map(i => `
                <div class="flex items-center gap-4 bg-slate-50 p-4 rounded-[2rem] border border-white">
                    <div class="flex-grow"><p class="text-[10px] font-black uppercase text-slate-800">${i.name}</p><p class="text-rose-600 font-bold">RD$${i.price.toLocaleString()}</p></div>
                    <button onclick="removeFromCart(${i.cid})" class="text-slate-300"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
                </div>`).join('');
            document.getElementById('cart-total').innerText = `RD$${cart.reduce((s, i) => s + i.price, 0).toLocaleString()}`;
            lucide.createIcons();
        }

        function removeFromCart(cid) {
            cart = cart.filter(i => i.cid !== cid);
            localStorage.setItem('kolmard_cart', JSON.stringify(cart));
            updateCartUI();
        }

        async function checkout() {
            if(!localStorage.getItem('k_token')) { toggleCart(); toggleProfile(); return; }
            const lines = cart.map(item => ({ merchandiseId: item.variantId, quantity: 1 }));
            const mutation = `mutation { cartCreate(input: { lines: ${JSON.stringify(lines).replace(/"([^"]+)":/g, '$1:')} }) { cart { checkoutUrl } } }`;
            const response = await fetch(`https://${CONFIG.shop}/api/2024-01/graphql.json`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-Shopify-Storefront-Access-Token': CONFIG.token },
                body: JSON.stringify({ query: mutation })
            });
            const res = await response.json();
            if(res.data?.cartCreate?.cart?.checkoutUrl) window.location.href = res.data.cartCreate.cart.checkoutUrl;
        }

        loadShop();
        lucide.createIcons();
    </script>
</body>
</html>
