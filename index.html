<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KOLMARD | Express</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; background-color: #F8F9FA; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .product-card { transition: all 0.2s ease; background: white; border-radius: 1.5rem; padding: 1rem; border: 1px solid #eee; }
    </style>
</head>
<body class="pb-24">

    <header class="bg-red-600 pt-6 pb-10 px-6 sticky top-0 z-40 rounded-b-[3rem] shadow-xl border-b-4 border-yellow-400">
        <div class="flex justify-between items-center mb-4 text-white">
            <div>
                <h1 class="text-2xl font-black italic uppercase">KOLMA<span class="text-yellow-400">RD</span></h1>
                <p class="text-[9px] font-bold opacity-80 tracking-widest uppercase text-white">Cotuí, RD</p>
            </div>
            <button onclick="toggleCart()" class="relative p-2 bg-white/20 rounded-xl backdrop-blur-md border border-white/30">
                <i data-lucide="shopping-basket" class="w-6 h-6 text-white"></i>
                <span id="cart-badge" class="absolute -top-1 -right-1 bg-yellow-400 text-red-700 text-[10px] font-black rounded-full h-5 w-5 flex items-center justify-center border-2 border-red-600 hidden">0</span>
            </button>
        </div>
    </header>

    <main class="px-6 mt-6">
        <div id="product-grid" class="grid grid-cols-2 gap-4">
            <div class="col-span-2 py-20 flex justify-center"><div class="w-8 h-8 border-4 border-red-600 border-t-transparent rounded-full animate-spin"></div></div>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-md border-t px-10 py-4 flex justify-between items-center z-50 rounded-t-[2rem] shadow-2xl">
        <div onclick="location.reload()" class="text-red-600 cursor-pointer"><i data-lucide="home" class="w-6 h-6"></i></div>
        <div onclick="toggleCart()" class="text-gray-300 cursor-pointer"><i data-lucide="shopping-cart" class="w-6 h-6"></i></div>
    </nav>

    <div id="cart-modal" class="fixed inset-0 bg-black/60 z-[60] hidden backdrop-blur-sm p-4">
        <div class="bg-white w-full max-w-md mx-auto h-[85vh] mt-10 rounded-[2.5rem] overflow-hidden flex flex-col shadow-2xl">
            <div class="p-6 border-b flex justify-between items-center">
                <h2 class="text-xl font-black text-gray-900">MI PEDIDO</h2>
                <button onclick="toggleCart()" class="text-2xl font-bold text-gray-400">&times;</button>
            </div>
            <div id="cart-items" class="flex-grow overflow-y-auto p-6 space-y-4 no-scrollbar"></div>
            <div class="p-6 border-t bg-gray-50">
                <div class="flex justify-between text-2xl font-black mb-6">
                    <span>Total</span>
                    <span id="cart-total" class="text-red-600 font-bold">RD$0</span>
                </div>
                <button id="checkout-btn" onclick="checkout()" class="w-full bg-red-600 py-5 rounded-2xl font-black text-white text-lg shadow-lg active:scale-95 uppercase">
                    Pagar Ahora
                </button>
            </div>
        </div>
    </div>

    <script>
        const CONFIG = {
            shop: 'q0q09e-cp.myshopify.com',
            token: 'a171ee1eaf68d9b7ca5234b4c45a9b0c'
        };

        let allProducts = [];
        let cart = JSON.parse(localStorage.getItem('kolmard_cart')) || [];

        async function initApp() {
            const query = `{
                products(first: 50) {
                    edges {
                        node {
                            id
                            title
                            images(first: 1) { edges { node { url } } }
                            variants(first: 1) { edges { node { id price { amount } } } }
                        }
                    }
                }
            }`;
            try {
                const response = await fetch(`https://${CONFIG.shop}/api/2024-01/graphql.json`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-Shopify-Storefront-Access-Token': CONFIG.token },
                    body: JSON.stringify({ query })
                });
                const res = await response.json();
                allProducts = res.data.products.edges.map(e => ({
                    id: e.node.id,
                    variantId: e.node.variants.edges[0].node.id,
                    name: e.node.title,
                    price: parseFloat(e.node.variants.edges[0].node.price.amount),
                    image: e.node.images.edges[0]?.node.url || 'https://via.placeholder.com/150'
                }));
                renderProducts(allProducts);
                updateCartUI();
            } catch (e) { console.error(e); }
        }

        function renderProducts(list) {
            document.getElementById('product-grid').innerHTML = list.map(p => `
                <div class="product-card flex flex-col justify-between">
                    <img src="${p.image}" class="w-full h-32 object-contain mb-2">
                    <h3 class="text-[10px] font-bold text-gray-800 uppercase leading-none h-6 overflow-hidden">${p.name}</h3>
                    <div class="flex justify-between items-center mt-2">
                        <span class="text-red-600 font-black text-xs">RD$${p.price}</span>
                        <button onclick="addToCart('${p.id}')" class="bg-red-600 text-white p-2 rounded-lg"><i data-lucide="plus" class="w-4 h-4"></i></button>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function addToCart(id) {
            const p = allProducts.find(i => i.id === id);
            cart.push({ ...p, cid: Date.now() });
            localStorage.setItem('kolmard_cart', JSON.stringify(cart));
            updateCartUI();
        }

        function updateCartUI() {
            const badge = document.getElementById('cart-badge');
            badge.innerText = cart.length;
            badge.classList.toggle('hidden', cart.length === 0);
            const list = document.getElementById('cart-items');
            list.innerHTML = cart.map(i => `
                <div class="flex items-center gap-4 bg-gray-50 p-4 rounded-2xl">
                    <div class="flex-grow">
                        <p class="text-[10px] font-bold uppercase">${i.name}</p>
                        <p class="text-red-600 font-black text-xs">RD$${i.price}</p>
                    </div>
                    <button onclick="removeFromCart(${i.cid})" class="text-gray-300"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                </div>
            `).join('');
            const total = cart.reduce((s, i) => s + i.price, 0);
            document.getElementById('cart-total').innerText = `RD$${total}`;
            lucide.createIcons();
        }

        function removeFromCart(cid) {
            cart = cart.filter(i => i.cid !== cid);
            localStorage.setItem('kolmard_cart', JSON.stringify(cart));
            updateCartUI();
        }

        function toggleCart() { document.getElementById('cart-modal').classList.toggle('hidden'); }

        // --- NUEVO MOTOR: CART API (Sustituye al Checkout API problemático) ---
        async function checkout() {
            if (!cart.length) return;
            const btn = document.getElementById('checkout-btn');
            btn.disabled = true;
            btn.innerText = "PREPARANDO PAGO...";

            // Formato para Cart API (moderno)
            const lines = cart.map(item => ({
                merchandiseId: item.variantId, // Aquí se usa merchandiseId en lugar de variantId
                quantity: 1
            }));

            const mutation = `
                mutation cartCreate($input: CartInput!) {
                    cartCreate(input: $input) {
                        cart { checkoutUrl }
                        userErrors { message field }
                    }
                }
            `;

            try {
                const response = await fetch(`https://${CONFIG.shop}/api/2024-01/graphql.json`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Shopify-Storefront-Access-Token': CONFIG.token
                    },
                    body: JSON.stringify({ 
                        query: mutation,
                        variables: { input: { lines: lines } }
                    })
                });
                
                const result = await response.json();
                
                if (result.errors) {
                    alert("Error de API: " + result.errors[0].message);
                    btn.disabled = false;
                    btn.innerText = "Pagar Ahora";
                    return;
                }

                const data = result.data.cartCreate;
                
                if (data.userErrors && data.userErrors.length > 0) {
                    alert("Aviso: " + data.userErrors[0].message);
                    btn.disabled = false;
                    btn.innerText = "Pagar Ahora";
                } else if (data.cart && data.cart.checkoutUrl) {
                    localStorage.removeItem('kolmard_cart');
                    window.location.href = data.cart.checkoutUrl; // Redirección directa al pago
                }
            } catch (err) {
                alert("Fallo de conexión.");
                btn.disabled = false;
                btn.innerText = "Pagar Ahora";
            }
        }

        initApp();
        lucide.createIcons();
    </script>
</body>
</html>
